<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cookie Clicker</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: linear-gradient(180deg, #8B4513 0%, #D2691E 50%, #DEB887 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
        }
        h1 { font-size: 2.5rem; color: #4a2c0a; text-shadow: 2px 2px 0 #f5deb3; margin-bottom: 10px; }
        .subtitle { color: #5d3a1a; margin-bottom: 20px; font-size: 1.1rem; }

        .stats {
            display: flex; gap: 15px; margin-bottom: 20px; flex-wrap: wrap; justify-content: center;
        }
        .stat {
            background: rgba(255,255,255,0.9); padding: 12px 20px; border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center;
        }
        .stat-label { color: #888; font-size: 0.8rem; }
        .stat-value { color: #8B4513; font-size: 1.3rem; font-weight: bold; }
        .stat-rate { color: #4CAF50; font-size: 0.75rem; }

        .game-container {
            display: flex; gap: 20px; flex-wrap: wrap; justify-content: center;
            align-items: flex-start; max-width: 1200px;
        }

        .click-area {
            background: rgba(255,255,255,0.8); border-radius: 30px; padding: 25px;
            text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,0.15); position: relative;
        }

        #cookie {
            width: 220px; height: 220px; cursor: pointer; transition: transform 0.1s;
            user-select: none; position: relative; display: flex; align-items: center; justify-content: center;
            font-size: 10rem;
        }
        #cookie:hover { transform: scale(1.05); }
        #cookie:active { transform: scale(0.95); }

        .click-text {
            position: absolute; font-weight: bold; color: #8B4513; text-shadow: 1px 1px 2px #fff;
            pointer-events: none; animation: floatUp 1s ease-out forwards; z-index: 100;
            font-size: 1.5rem;
        }
        @keyframes floatUp { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-80px); } }

        .shop {
            background: rgba(255,255,255,0.9); border-radius: 20px; padding: 15px;
            min-width: 320px; max-height: 500px; overflow-y: auto; box-shadow: 0 10px 40px rgba(0,0,0,0.15);
        }
        .shop h2 { color: #8B4513; margin-bottom: 10px; text-align: center; font-size: 1.2rem; }
        .shop-tabs { display: flex; gap: 5px; margin-bottom: 10px; flex-wrap: wrap; }
        .shop-tab {
            flex: 1; padding: 8px; border: none; background: #e0e0e0; border-radius: 10px;
            cursor: pointer; font-weight: bold; color: #666; transition: all 0.2s; font-size: 0.85rem;
        }
        .shop-tab.active { background: #8B4513; color: #fff; }
        .shop-item {
            background: #f5f5f5; border-radius: 12px; padding: 12px; margin-bottom: 8px;
            display: flex; align-items: center; gap: 12px; cursor: pointer; transition: all 0.2s;
            border: 2px solid transparent;
        }
        .shop-item:hover { background: #eeeeee; border-color: #8B4513; }
        .shop-item.disabled { opacity: 0.5; cursor: not-allowed; }
        .shop-item.equipped { background: #E8F5E9; border-color: #4CAF50; }
        .shop-item-icon { font-size: 1.8rem; }
        .shop-item-info { flex: 1; }
        .shop-item-name { font-weight: bold; color: #8B4513; font-size: 0.9rem; }
        .shop-item-desc { font-size: 0.75rem; color: #888; }
        .shop-item-effect { font-size: 0.8rem; color: #4CAF50; }
        .shop-item-cost { background: #FFD700; color: #5D4037; padding: 4px 10px; border-radius: 12px; font-weight: bold; font-size: 0.85rem; }
        .shop-item-count { background: #8B4513; color: #fff; padding: 3px 8px; border-radius: 8px; font-size: 0.8rem; margin-left: 5px; }

        .upgrades {
            background: rgba(255,255,255,0.9); border-radius: 20px; padding: 15px;
            min-width: 280px; box-shadow: 0 10px 40px rgba(0,0,0,0.15); max-height: 500px; overflow-y: auto;
        }
        .upgrades h2 { color: #8B4513; margin-bottom: 10px; text-align: center; font-size: 1.2rem; }

        .achievement {
            display: flex; align-items: center; gap: 8px; padding: 8px; background: #f5f5f5;
            border-radius: 10px; margin-bottom: 6px; opacity: 0.4;
        }
        .achievement.unlocked { opacity: 1; background: #FFF9C4; }
        .achievement-icon { font-size: 1.3rem; }
        .achievement-info { flex: 1; }
        .achievement-name { font-weight: bold; color: #8B4513; font-size: 0.85rem; }
        .achievement-desc { color: #888; font-size: 0.7rem; }

        .golden-cookie {
            position: fixed; font-size: 3rem; cursor: pointer;
            animation: goldenFloat 2s ease-in-out infinite, goldenGlow 0.5s ease-in-out infinite alternate;
            z-index: 200; filter: drop-shadow(0 0 10px gold);
        }
        @keyframes goldenFloat { 0%, 100% { transform: translateY(0) rotate(-5deg); } 50% { transform: translateY(-15px) rotate(5deg); } }
        @keyframes goldenGlow { from { filter: drop-shadow(0 0 10px gold); } to { filter: drop-shadow(0 0 20px gold); } }

        .notification {
            position: fixed; top: 20px; right: 20px; background: #4CAF50; color: #fff;
            padding: 12px 20px; border-radius: 15px; font-weight: bold;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2); animation: slideIn 0.3s ease-out; z-index: 1000;
        }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        .falling-cookie {
            position: fixed; font-size: 1.5rem; pointer-events: none;
            animation: fall linear forwards; z-index: 50;
        }
        @keyframes fall {
            0% { opacity: 1; transform: translateY(0) rotate(0deg); }
            100% { opacity: 0; transform: translateY(100vh) rotate(360deg); }
        }

        .milk {
            position: fixed; bottom: 0; left: 0; right: 0; height: 0;
            background: linear-gradient(to top, rgba(255,255,255,0.9), rgba(255,255,255,0));
            transition: height 2s ease; z-index: 1; pointer-events: none;
        }

        .code-box {
            margin-top: 20px; padding: 15px; background: rgba(139, 69, 19, 0.1);
            border-radius: 15px; border: 2px dashed #8B4513;
        }
        .code-box h3 { color: #8B4513; font-size: 0.9rem; margin-bottom: 10px; }
        .code-input-row { display: flex; gap: 8px; }
        .code-input {
            flex: 1; padding: 8px 12px; border: 2px solid #DEB887; border-radius: 8px;
            font-size: 0.9rem; background: #fff; color: #8B4513;
        }
        .code-input:focus { outline: none; border-color: #8B4513; }
        .code-btn {
            padding: 8px 15px; background: #8B4513; color: #fff; border: none;
            border-radius: 8px; font-weight: bold; cursor: pointer; transition: all 0.2s;
        }
        .code-btn:hover { background: #A0522D; }
        .code-message {
            margin-top: 8px; font-size: 0.8rem; min-height: 1.2em;
        }
        .code-message.success { color: #4CAF50; }
        .code-message.error { color: #e74c3c; }

        .back-btn {
            position: fixed; top: 20px; left: 20px;
            background: rgba(255,255,255,0.9); color: #8B4513; padding: 10px 20px;
            border-radius: 10px; text-decoration: none; font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); transition: transform 0.2s;
        }
        .back-btn:hover { transform: scale(1.05); }

        @media (max-width: 900px) {
            .game-container { flex-direction: column; align-items: center; }
            .shop, .upgrades { width: 100%; max-width: 350px; }
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-btn">← Back</a>
    <h1>🍪 Cookie Clicker</h1>
    <p class="subtitle">Click for cookies, buy upgrades, become the cookie master!</p>

    <div class="stats">
        <div class="stat">
            <div class="stat-label">Cookies</div>
            <div class="stat-value" id="cookies">0</div>
        </div>
        <div class="stat">
            <div class="stat-label">Per Click</div>
            <div class="stat-value" id="perClick">1</div>
        </div>
        <div class="stat">
            <div class="stat-label">Per Second</div>
            <div class="stat-value" id="perSecond">0</div>
        </div>
        <div class="stat">
            <div class="stat-label">Total Baked</div>
            <div class="stat-value" id="totalBaked">0</div>
        </div>
    </div>

    <div class="game-container">
        <div class="upgrades">
            <h2>🏆 Achievements</h2>
            <div id="achievementsList"></div>
        </div>

        <div class="click-area">
            <div id="cookie">🍪</div>
            <p style="margin-top: 15px; color: #8B4513; font-size: 0.9rem;">Click the cookie!</p>

            <div class="code-box">
                <h3>🎁 Redeem Code</h3>
                <div class="code-input-row">
                    <input type="text" class="code-input" id="codeInput" placeholder="Enter code...">
                    <button class="code-btn" onclick="redeemCode()">Redeem</button>
                </div>
                <div class="code-message" id="codeMessage"></div>
            </div>
        </div>

        <div class="shop">
            <h2>🛒 Shop</h2>
            <div class="shop-tabs">
                <button class="shop-tab active" onclick="showTab('clickers')">Clickers</button>
                <button class="shop-tab" onclick="showTab('buildings')">Buildings</button>
                <button class="shop-tab" onclick="showTab('upgrades')">Upgrades</button>
                <button class="shop-tab" onclick="showTab('skins')">Skins</button>
            </div>
            <div id="clickersList"></div>
            <div id="buildingsList" style="display: none;"></div>
            <div id="upgradesList" style="display: none;"></div>
            <div id="skinsList" style="display: none;"></div>
        </div>
    </div>

    <div class="milk" id="milk"></div>

    <script>
        // Audio
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx = null;
        function initAudio() { if (!audioCtx) audioCtx = new AudioContext(); }

        function playSound(type) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            const now = audioCtx.currentTime;

            switch(type) {
                case 'click':
                    osc.frequency.setValueAtTime(800, now);
                    osc.frequency.exponentialRampToValueAtTime(400, now + 0.1);
                    gain.gain.setValueAtTime(0.1, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                    osc.start(now);
                    osc.stop(now + 0.1);
                    break;
                case 'buy':
                    osc.frequency.setValueAtTime(400, now);
                    osc.frequency.exponentialRampToValueAtTime(800, now + 0.15);
                    gain.gain.setValueAtTime(0.1, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
                    osc.start(now);
                    osc.stop(now + 0.15);
                    break;
                case 'golden':
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(523, now);
                    osc.frequency.setValueAtTime(659, now + 0.1);
                    osc.frequency.setValueAtTime(784, now + 0.2);
                    gain.gain.setValueAtTime(0.15, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
                    osc.start(now);
                    osc.stop(now + 0.4);
                    break;
                case 'achievement':
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(440, now);
                    osc.frequency.setValueAtTime(550, now + 0.1);
                    osc.frequency.setValueAtTime(660, now + 0.2);
                    osc.frequency.setValueAtTime(880, now + 0.3);
                    gain.gain.setValueAtTime(0.12, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
                    osc.start(now);
                    osc.stop(now + 0.5);
                    break;
            }
        }

        // Buildings
        const BUILDINGS = [
            { id: 'cursor', name: 'Cursor', icon: '👆', baseCost: 15, baseCps: 0.1, desc: 'Auto-clicks once every 10 seconds' },
            { id: 'grandma', name: 'Grandma', icon: '👵', baseCost: 100, baseCps: 1, desc: 'A nice grandma to bake cookies' },
            { id: 'farm', name: 'Farm', icon: '🌾', baseCost: 1100, baseCps: 8, desc: 'Grows cookie plants from cookie seeds' },
            { id: 'mine', name: 'Mine', icon: '⛏️', baseCost: 12000, baseCps: 47, desc: 'Mines out cookie dough and sugar' },
            { id: 'factory', name: 'Factory', icon: '🏭', baseCost: 130000, baseCps: 260, desc: 'Produces large quantities of cookies' },
            { id: 'bank', name: 'Bank', icon: '🏦', baseCost: 1400000, baseCps: 1400, desc: 'Generates cookies from interest' },
            { id: 'temple', name: 'Temple', icon: '🏛️', baseCost: 20000000, baseCps: 7800, desc: 'Full of worshippers of the cookie' },
            { id: 'wizard', name: 'Wizard Tower', icon: '🧙', baseCost: 330000000, baseCps: 44000, desc: 'Summons cookies with magic' },
            { id: 'shipment', name: 'Shipment', icon: '🚀', baseCost: 5100000000, baseCps: 260000, desc: 'Imports cookies from the cookie planet' },
            { id: 'alchemy', name: 'Alchemy Lab', icon: '⚗️', baseCost: 75000000000, baseCps: 1600000, desc: 'Turns gold into cookies' },
            { id: 'portal', name: 'Portal', icon: '🌀', baseCost: 1000000000000, baseCps: 10000000, desc: 'Opens a door to the cookieverse' },
            { id: 'timemachine', name: 'Time Machine', icon: '⏰', baseCost: 14000000000000, baseCps: 65000000, desc: 'Brings cookies from the past' },
        ];

        // Click Upgrades (for Clickers tab) - cheaper prices
        const CLICK_UPGRADES = [
            { id: 'fingers', name: 'Reinforced Fingers', icon: '💪', cost: 50, mult: 2, desc: '2x click power' },
            { id: 'ambidextrous', name: 'Ambidextrous', icon: '🤲', cost: 200, mult: 2, desc: '4x click power' },
            { id: 'carpal', name: 'Carpal Tunnel', icon: '⌨️', cost: 1000, mult: 2, desc: '8x click power' },
            { id: 'mouseclick', name: 'Thousand Fingers', icon: '🖱️', cost: 5000, mult: 2, desc: '16x click power' },
            { id: 'robofinger', name: 'Robot Fingers', icon: '🤖', cost: 25000, mult: 2, desc: '32x click power' },
            { id: 'laserfinger', name: 'Laser Fingers', icon: '🔫', cost: 100000, mult: 2, desc: '64x click power' },
            { id: 'quantumfinger', name: 'Quantum Fingers', icon: '⚛️', cost: 500000, mult: 2, desc: '128x click power' },
            { id: 'cosmicfinger', name: 'Cosmic Fingers', icon: '🌌', cost: 2500000, mult: 2, desc: '256x click power' },
            { id: 'divinefinger', name: 'Divine Touch', icon: '👼', cost: 10000000, mult: 2, desc: '512x click power' },
            { id: 'infinityfinger', name: 'Infinity Gauntlet', icon: '🧤', cost: 50000000, mult: 2, desc: '1024x click power' },
        ];

        // Building Upgrades (for Upgrades tab)
        const UPGRADES = [
            // Cursor upgrades
            { id: 'cursor1', name: 'Faster Cursors', icon: '👆', cost: 100, effect: 'cursor', mult: 2, desc: 'Cursors are twice as efficient' },
            { id: 'cursor2', name: 'Titanium Mouse', icon: '🖲️', cost: 500, effect: 'cursor', mult: 2, desc: 'Cursors are twice as efficient again' },

            // Grandma upgrades
            { id: 'forwards', name: 'Forwards From Grandma', icon: '📧', cost: 1000, effect: 'grandma', mult: 2, desc: 'Grandmas are twice as efficient' },
            { id: 'grandma2', name: 'Steel Ovens', icon: '🔥', cost: 5000, effect: 'grandma', mult: 2, desc: 'Grandmas are twice as efficient again' },
            { id: 'grandma3', name: 'Secret Recipe', icon: '📜', cost: 50000, effect: 'grandma', mult: 2, desc: 'Grandmas bake even faster' },

            // Farm upgrades
            { id: 'steel', name: 'Steel Plows', icon: '🔧', cost: 11000, effect: 'farm', mult: 2, desc: 'Farms are twice as efficient' },
            { id: 'farm2', name: 'Fertilizer', icon: '💩', cost: 55000, effect: 'farm', mult: 2, desc: 'Farms are twice as efficient again' },
            { id: 'farm3', name: 'Cookie Trees', icon: '🌳', cost: 550000, effect: 'farm', mult: 2, desc: 'Farms grow cookie trees' },

            // Mine upgrades
            { id: 'sugar', name: 'Sugar Gas', icon: '⛽', cost: 120000, effect: 'mine', mult: 2, desc: 'Mines are twice as efficient' },
            { id: 'mine2', name: 'Diamond Drills', icon: '💎', cost: 600000, effect: 'mine', mult: 2, desc: 'Mines are twice as efficient again' },
            { id: 'mine3', name: 'Underground Ovens', icon: '🕳️', cost: 6000000, effect: 'mine', mult: 2, desc: 'Mines bake cookies underground' },

            // Factory upgrades
            { id: 'lubricant', name: 'Lubricant', icon: '🛢️', cost: 1300000, effect: 'factory', mult: 2, desc: 'Factories are twice as efficient' },
            { id: 'factory2', name: 'Child Labor', icon: '👶', cost: 6500000, effect: 'factory', mult: 2, desc: 'Factories are twice as efficient again' },
            { id: 'factory3', name: 'Robot Workers', icon: '🤖', cost: 65000000, effect: 'factory', mult: 2, desc: 'Factories run 24/7' },

            // Bank upgrades
            { id: 'bank1', name: 'Taller Vaults', icon: '🏗️', cost: 14000000, effect: 'bank', mult: 2, desc: 'Banks are twice as efficient' },
            { id: 'bank2', name: 'Compound Interest', icon: '📈', cost: 70000000, effect: 'bank', mult: 2, desc: 'Banks are twice as efficient again' },

            // Temple upgrades
            { id: 'temple1', name: 'Golden Idols', icon: '🗿', cost: 200000000, effect: 'temple', mult: 2, desc: 'Temples are twice as efficient' },
            { id: 'temple2', name: 'Sacrifices', icon: '🔮', cost: 1000000000, effect: 'temple', mult: 2, desc: 'Temples are twice as efficient again' },

            // Wizard upgrades
            { id: 'wizard1', name: 'Arcane Ovens', icon: '✨', cost: 3300000000, effect: 'wizard', mult: 2, desc: 'Wizard Towers are twice as efficient' },
            { id: 'wizard2', name: 'Cookie Spells', icon: '📖', cost: 16500000000, effect: 'wizard', mult: 2, desc: 'Wizard Towers are twice as efficient again' },

            // Shipment upgrades
            { id: 'ship1', name: 'Warp Drive', icon: '💫', cost: 51000000000, effect: 'shipment', mult: 2, desc: 'Shipments are twice as efficient' },
            { id: 'ship2', name: 'Wormholes', icon: '🕳️', cost: 255000000000, effect: 'shipment', mult: 2, desc: 'Shipments are twice as efficient again' },

            // Alchemy upgrades
            { id: 'alchemy1', name: 'Essence Extract', icon: '🧪', cost: 750000000000, effect: 'alchemy', mult: 2, desc: 'Alchemy Labs are twice as efficient' },
            { id: 'alchemy2', name: 'True Gold', icon: '🥇', cost: 3750000000000, effect: 'alchemy', mult: 2, desc: 'Alchemy Labs are twice as efficient again' },

            // Portal upgrades
            { id: 'portal1', name: 'Ancient Tablet', icon: '📋', cost: 10000000000000, effect: 'portal', mult: 2, desc: 'Portals are twice as efficient' },

            // Time Machine upgrades
            { id: 'time1', name: 'Flux Capacitor', icon: '⚡', cost: 140000000000000, effect: 'timemachine', mult: 2, desc: 'Time Machines are twice as efficient' },

            // Golden cookie upgrade
            { id: 'golden', name: 'Lucky Day', icon: '🍀', cost: 777777, effect: 'golden', mult: 2, desc: 'Golden cookies appear more often' },
            { id: 'golden2', name: 'Four Leaf Clover', icon: '☘️', cost: 77777777, effect: 'golden', mult: 2, desc: 'Golden cookies are even luckier' },
        ];

        // Achievements
        const ACHIEVEMENTS = [
            { id: 'first', name: 'First Cookie', icon: '🍪', desc: 'Bake your first cookie', check: s => s.totalClicks >= 1 },
            { id: 'clickFrenzy', name: 'Click Frenzy', icon: '👆', desc: 'Click 100 times', check: s => s.totalClicks >= 100 },
            { id: 'clickMaster', name: 'Click Master', icon: '🖱️', desc: 'Click 1,000 times', check: s => s.totalClicks >= 1000 },
            { id: 'baker', name: 'Apprentice Baker', icon: '👨‍🍳', desc: 'Bake 100 cookies', check: s => s.totalBaked >= 100 },
            { id: 'chef', name: 'Cookie Chef', icon: '👩‍🍳', desc: 'Bake 10,000 cookies', check: s => s.totalBaked >= 10000 },
            { id: 'tycoon', name: 'Cookie Tycoon', icon: '💰', desc: 'Bake 1,000,000 cookies', check: s => s.totalBaked >= 1000000 },
            { id: 'cursor1', name: 'Cursor Collector', icon: '👆', desc: 'Own 10 cursors', check: s => (s.buildings.cursor || 0) >= 10 },
            { id: 'grandma1', name: 'Grandma Army', icon: '👵', desc: 'Own 10 grandmas', check: s => (s.buildings.grandma || 0) >= 10 },
            { id: 'golden1', name: 'Lucky!', icon: '✨', desc: 'Click a golden cookie', check: s => s.goldenClicked >= 1 },
            { id: 'golden10', name: 'Golden Touch', icon: '🌟', desc: 'Click 10 golden cookies', check: s => s.goldenClicked >= 10 },
        ];

        // Cookie Skins
        const SKINS = [
            { id: 'default', name: 'Classic Cookie', icon: '🍪', desc: 'The original cookie' },
            { id: 'bunny', name: 'Bunny Cookie', icon: '🐰', desc: 'A cute bunny cookie!', code: true },
            { id: 'choco', name: 'Chocolate Chip', icon: '🍫', desc: 'Extra chocolatey', price: 5000 },
            { id: 'rainbow', name: 'Rainbow Cookie', icon: '🌈', desc: 'Taste the rainbow', price: 25000 },
            { id: 'gold', name: 'Golden Cookie', icon: '🥇', desc: 'Made of pure gold', price: 100000 },
            { id: 'star', name: 'Star Cookie', icon: '⭐', desc: 'Reach for the stars', price: 500000 },
            { id: 'heart', name: 'Love Cookie', icon: '❤️', desc: 'Baked with love', price: 1000000 },
            { id: 'alien', name: 'Alien Cookie', icon: '👽', desc: 'Out of this world', price: 10000000 },
        ];

        // Codes
        const CODES = {
            'i love cookies': { reward: 200, message: 'You got 200 cookies!' },
            'bluebunny': { reward: 10000, message: 'You got 10,000 cookies!' },
            'cookiebits': { skin: 'bunny', message: 'You unlocked the Bunny Cookie skin!' },
        };

        // Game State
        let saveData = {
            cookies: 0,
            totalBaked: 0,
            totalClicks: 0,
            clickPower: 1,
            buildings: {},
            upgrades: [],
            clickUpgrades: [],
            achievements: [],
            goldenClicked: 0,
            redeemedCodes: [],
            ownedSkins: ['default'],
            equippedSkin: 'default',
            startTime: Date.now()
        };

        // Load/Save
        function loadSaveData() {
            const saved = localStorage.getItem('cookieClicker');
            if (saved) {
                const data = JSON.parse(saved);
                saveData = { ...saveData, ...data };

                // Migrate old click upgrades from upgrades to clickUpgrades
                const clickUpgradeIds = CLICK_UPGRADES.map(u => u.id);
                clickUpgradeIds.forEach(id => {
                    if (saveData.upgrades.includes(id) && !saveData.clickUpgrades.includes(id)) {
                        saveData.clickUpgrades.push(id);
                        saveData.upgrades = saveData.upgrades.filter(u => u !== id);
                    }
                });
            }
        }

        function saveSaveData() {
            localStorage.setItem('cookieClicker', JSON.stringify(saveData));
        }

        // Format numbers
        function formatNumber(n) {
            if (n >= 1e12) return (n / 1e12).toFixed(2) + 'T';
            if (n >= 1e9) return (n / 1e9).toFixed(2) + 'B';
            if (n >= 1e6) return (n / 1e6).toFixed(2) + 'M';
            if (n >= 1e3) return (n / 1e3).toFixed(2) + 'K';
            return Math.floor(n).toString();
        }

        // Calculate CPS
        function calculateCps() {
            let cps = 0;
            BUILDINGS.forEach(b => {
                const count = saveData.buildings[b.id] || 0;
                let mult = 1;
                UPGRADES.forEach(u => {
                    if (saveData.upgrades.includes(u.id) && u.effect === b.id) {
                        mult *= u.mult;
                    }
                });
                cps += count * b.baseCps * mult;
            });
            return cps;
        }

        // Calculate click power
        function calculateClickPower() {
            let power = 1;
            CLICK_UPGRADES.forEach(u => {
                if (saveData.clickUpgrades.includes(u.id)) {
                    power *= u.mult;
                }
            });
            return power;
        }

        // Building cost
        function getBuildingCost(building) {
            const count = saveData.buildings[building.id] || 0;
            return Math.floor(building.baseCost * Math.pow(1.15, count));
        }

        // UI Updates - light version for game loop (doesn't rebuild shop)
        function updateStats() {
            document.getElementById('cookies').textContent = formatNumber(saveData.cookies);
            document.getElementById('perClick').textContent = formatNumber(calculateClickPower());
            document.getElementById('perSecond').textContent = formatNumber(calculateCps());
            document.getElementById('totalBaked').textContent = formatNumber(saveData.totalBaked);
        }

        // Full UI update including shop (call after purchases)
        function updateUI() {
            updateStats();

            // Milk level based on achievements
            const milkLevel = Math.min(saveData.achievements.length * 4, 40);
            document.getElementById('milk').style.height = milkLevel + '%';

            renderClickers();
            renderBuildings();
            renderUpgrades();
            renderSkins();
            renderAchievements();
            updateCookieDisplay();
        }

        function renderClickers() {
            const list = document.getElementById('clickersList');
            const available = CLICK_UPGRADES.filter(u => !saveData.clickUpgrades.includes(u.id));
            list.innerHTML = available.map(u => {
                const canAfford = saveData.cookies >= u.cost;
                return `
                    <div class="shop-item ${canAfford ? '' : 'disabled'}" onclick="buyClicker('${u.id}')">
                        <div class="shop-item-icon">${u.icon}</div>
                        <div class="shop-item-info">
                            <div class="shop-item-name">${u.name}</div>
                            <div class="shop-item-desc">${u.desc}</div>
                        </div>
                        <div class="shop-item-cost">🍪 ${formatNumber(u.cost)}</div>
                    </div>
                `;
            }).join('');

            if (available.length === 0) {
                list.innerHTML = '<p style="text-align: center; color: #888; padding: 20px;">All click upgrades purchased!</p>';
            }
        }

        function renderBuildings() {
            const list = document.getElementById('buildingsList');
            list.innerHTML = BUILDINGS.map(b => {
                const cost = getBuildingCost(b);
                const count = saveData.buildings[b.id] || 0;
                const canAfford = saveData.cookies >= cost;
                return `
                    <div class="shop-item ${canAfford ? '' : 'disabled'}" onclick="buyBuilding('${b.id}')">
                        <div class="shop-item-icon">${b.icon}</div>
                        <div class="shop-item-info">
                            <div class="shop-item-name">${b.name}</div>
                            <div class="shop-item-desc">${b.desc}</div>
                            <div class="shop-item-effect">+${b.baseCps} CpS each</div>
                        </div>
                        <div class="shop-item-cost">🍪 ${formatNumber(cost)}</div>
                        ${count > 0 ? `<div class="shop-item-count">${count}</div>` : ''}
                    </div>
                `;
            }).join('');
        }

        function renderUpgrades() {
            const list = document.getElementById('upgradesList');
            const available = UPGRADES.filter(u => !saveData.upgrades.includes(u.id));
            list.innerHTML = available.map(u => {
                const canAfford = saveData.cookies >= u.cost;
                return `
                    <div class="shop-item ${canAfford ? '' : 'disabled'}" onclick="buyUpgrade('${u.id}')">
                        <div class="shop-item-icon">${u.icon}</div>
                        <div class="shop-item-info">
                            <div class="shop-item-name">${u.name}</div>
                            <div class="shop-item-desc">${u.desc}</div>
                        </div>
                        <div class="shop-item-cost">🍪 ${formatNumber(u.cost)}</div>
                    </div>
                `;
            }).join('');

            if (available.length === 0) {
                list.innerHTML = '<p style="text-align: center; color: #888; padding: 20px;">All upgrades purchased!</p>';
            }
        }

        function renderAchievements() {
            const list = document.getElementById('achievementsList');
            list.innerHTML = ACHIEVEMENTS.map(a => {
                const unlocked = saveData.achievements.includes(a.id);
                return `
                    <div class="achievement ${unlocked ? 'unlocked' : ''}">
                        <div class="achievement-icon">${unlocked ? a.icon : '🔒'}</div>
                        <div class="achievement-info">
                            <div class="achievement-name">${unlocked ? a.name : '???'}</div>
                            <div class="achievement-desc">${unlocked ? a.desc : 'Keep playing to unlock!'}</div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function renderSkins() {
            const list = document.getElementById('skinsList');
            list.innerHTML = SKINS.map(s => {
                const owned = saveData.ownedSkins.includes(s.id);
                const equipped = saveData.equippedSkin === s.id;
                const canAfford = s.price ? saveData.cookies >= s.price : false;
                const isCodeOnly = s.code && !owned;

                let buttonText = '';
                let buttonAction = '';
                if (equipped) {
                    buttonText = '✓ Equipped';
                    buttonAction = '';
                } else if (owned) {
                    buttonText = 'Equip';
                    buttonAction = `onclick="equipSkin('${s.id}')"`;
                } else if (isCodeOnly) {
                    buttonText = '🔒 Code Only';
                    buttonAction = '';
                } else if (s.price) {
                    buttonText = `🍪 ${formatNumber(s.price)}`;
                    buttonAction = canAfford ? `onclick="buySkin('${s.id}')"` : '';
                }

                return `
                    <div class="shop-item ${equipped ? 'equipped' : ''} ${!owned && !canAfford ? 'disabled' : ''}" ${buttonAction}>
                        <div class="shop-item-icon" style="font-size: 2.5rem;">${s.icon}</div>
                        <div class="shop-item-info">
                            <div class="shop-item-name">${s.name}</div>
                            <div class="shop-item-desc">${s.desc}</div>
                        </div>
                        <div class="shop-item-cost" style="${equipped ? 'background: #4CAF50;' : ''}">${buttonText}</div>
                    </div>
                `;
            }).join('');
        }

        function equipSkin(id) {
            if (saveData.ownedSkins.includes(id)) {
                saveData.equippedSkin = id;
                updateCookieDisplay();
                playSound('buy');
                updateUI();
                saveSaveData();
            }
        }

        function buySkin(id) {
            const skin = SKINS.find(s => s.id === id);
            if (skin.price && saveData.cookies >= skin.price && !saveData.ownedSkins.includes(id)) {
                saveData.cookies -= skin.price;
                saveData.ownedSkins.push(id);
                saveData.equippedSkin = id;
                updateCookieDisplay();
                playSound('buy');
                updateUI();
                saveSaveData();
            }
        }

        function updateCookieDisplay() {
            const skin = SKINS.find(s => s.id === saveData.equippedSkin) || SKINS[0];
            document.getElementById('cookie').textContent = skin.icon;
        }

        // Tab switching
        function showTab(tab) {
            document.querySelectorAll('.shop-tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('clickersList').style.display = tab === 'clickers' ? 'block' : 'none';
            document.getElementById('buildingsList').style.display = tab === 'buildings' ? 'block' : 'none';
            document.getElementById('upgradesList').style.display = tab === 'upgrades' ? 'block' : 'none';
            document.getElementById('skinsList').style.display = tab === 'skins' ? 'block' : 'none';
        }

        // Buy clicker upgrade
        function buyClicker(id) {
            initAudio();
            const clicker = CLICK_UPGRADES.find(u => u.id === id);
            if (saveData.cookies >= clicker.cost && !saveData.clickUpgrades.includes(id)) {
                saveData.cookies -= clicker.cost;
                saveData.clickUpgrades.push(id);
                playSound('buy');
                updateUI();
                saveSaveData();
            }
        }

        // Buy building
        function buyBuilding(id) {
            initAudio();
            const building = BUILDINGS.find(b => b.id === id);
            const cost = getBuildingCost(building);
            if (saveData.cookies >= cost) {
                saveData.cookies -= cost;
                saveData.buildings[id] = (saveData.buildings[id] || 0) + 1;
                playSound('buy');
                updateUI();
                saveSaveData();
            }
        }

        // Buy upgrade
        function buyUpgrade(id) {
            initAudio();
            const upgrade = UPGRADES.find(u => u.id === id);
            if (saveData.cookies >= upgrade.cost && !saveData.upgrades.includes(id)) {
                saveData.cookies -= upgrade.cost;
                saveData.upgrades.push(id);
                playSound('buy');
                updateUI();
                saveSaveData();
            }
        }

        // Click cookie
        function clickCookie(e) {
            initAudio();
            const power = calculateClickPower();
            saveData.cookies += power;
            saveData.totalBaked += power;
            saveData.totalClicks++;

            playSound('click');

            // Floating text
            const rect = document.getElementById('cookie').getBoundingClientRect();
            const text = document.createElement('div');
            text.className = 'click-text';
            text.textContent = '+' + formatNumber(power);
            text.style.left = (e.clientX - 20) + 'px';
            text.style.top = (e.clientY - 20) + 'px';
            document.body.appendChild(text);
            setTimeout(() => text.remove(), 1000);

            // Falling cookies
            if (Math.random() < 0.3) {
                spawnFallingCookie(e.clientX);
            }

            checkAchievements();
            updateStats();
        }

        function spawnFallingCookie(x) {
            const cookie = document.createElement('div');
            cookie.className = 'falling-cookie';
            cookie.textContent = '🍪';
            cookie.style.left = (x + (Math.random() - 0.5) * 50) + 'px';
            cookie.style.top = '0px';
            cookie.style.animationDuration = (2 + Math.random() * 2) + 's';
            document.body.appendChild(cookie);
            setTimeout(() => cookie.remove(), 4000);
        }

        // Golden cookie
        let goldenTimeout = null;
        function spawnGoldenCookie() {
            const golden = document.createElement('div');
            golden.className = 'golden-cookie';
            golden.textContent = '🍪';
            golden.style.left = (100 + Math.random() * (window.innerWidth - 200)) + 'px';
            golden.style.top = (100 + Math.random() * (window.innerHeight - 300)) + 'px';
            golden.style.filter = 'hue-rotate(45deg) saturate(2) drop-shadow(0 0 10px gold)';

            golden.onclick = () => {
                initAudio();
                const bonus = Math.floor(calculateCps() * 60 + 100);
                saveData.cookies += bonus;
                saveData.totalBaked += bonus;
                saveData.goldenClicked++;
                playSound('golden');
                showNotification('Golden Cookie! +' + formatNumber(bonus) + ' cookies!');
                golden.remove();
                checkAchievements();
                updateUI();
            };

            document.body.appendChild(golden);
            setTimeout(() => golden.remove(), 10000);

            // Schedule next golden cookie
            const hasLucky = saveData.upgrades.includes('golden');
            const delay = (hasLucky ? 60000 : 120000) + Math.random() * 60000;
            goldenTimeout = setTimeout(spawnGoldenCookie, delay);
        }

        // Notifications
        function showNotification(text) {
            const notif = document.createElement('div');
            notif.className = 'notification';
            notif.textContent = text;
            document.body.appendChild(notif);
            setTimeout(() => notif.remove(), 3000);
        }

        // Check achievements
        function checkAchievements() {
            ACHIEVEMENTS.forEach(a => {
                if (!saveData.achievements.includes(a.id) && a.check(saveData)) {
                    saveData.achievements.push(a.id);
                    playSound('achievement');
                    showNotification('Achievement: ' + a.name + '!');
                }
            });
        }

        // Redeem codes
        function redeemCode() {
            const input = document.getElementById('codeInput');
            const message = document.getElementById('codeMessage');
            const code = input.value.toLowerCase().trim();

            if (!code) {
                message.textContent = 'Please enter a code!';
                message.className = 'code-message error';
                return;
            }

            // Check if code exists
            if (!CODES[code]) {
                message.textContent = 'Invalid code!';
                message.className = 'code-message error';
                input.value = '';
                return;
            }

            // Check if already redeemed
            if (saveData.redeemedCodes.includes(code)) {
                message.textContent = 'Code already redeemed!';
                message.className = 'code-message error';
                input.value = '';
                return;
            }

            // Redeem the code
            const codeData = CODES[code];
            if (codeData.reward) {
                saveData.cookies += codeData.reward;
            }
            if (codeData.skin && !saveData.ownedSkins.includes(codeData.skin)) {
                saveData.ownedSkins.push(codeData.skin);
            }
            saveData.redeemedCodes.push(code);

            playSound('golden');
            message.textContent = codeData.message;
            message.className = 'code-message success';
            input.value = '';

            updateStats();
            saveSaveData();
        }

        // Game loop - only update stats, don't rebuild shop
        function gameLoop() {
            const cps = calculateCps();
            if (cps > 0) {
                saveData.cookies += cps / 30;
                saveData.totalBaked += cps / 30;
            }
            checkAchievements();
            updateStats();
        }

        // Init
        const cookieEl = document.getElementById('cookie');
        let mouseOverCookie = false;
        let lastMousePos = { x: 0, y: 0 };

        cookieEl.addEventListener('click', clickCookie);
        cookieEl.addEventListener('mouseenter', () => mouseOverCookie = true);
        cookieEl.addEventListener('mouseleave', () => mouseOverCookie = false);

        // Track mouse position for spacebar clicks
        document.addEventListener('mousemove', (e) => {
            lastMousePos = { x: e.clientX, y: e.clientY };
        });

        // Spacebar to click cookie when hovering (but not when typing in input)
        document.addEventListener('keydown', (e) => {
            const isTyping = document.activeElement.tagName === 'INPUT';
            if (e.code === 'Space' && mouseOverCookie && !isTyping) {
                e.preventDefault();
                // Create a fake event with the last known mouse position
                clickCookie({ clientX: lastMousePos.x, clientY: lastMousePos.y });
            }
        });

        // Enter key to submit code
        document.getElementById('codeInput').addEventListener('keydown', (e) => {
            if (e.code === 'Enter') {
                redeemCode();
            }
        });

        loadSaveData();
        updateUI();

        setInterval(gameLoop, 1000 / 30);
        setInterval(saveSaveData, 10000);

        // First golden cookie after 30-90 seconds
        setTimeout(spawnGoldenCookie, 30000 + Math.random() * 60000);
    </script>
</body>
</html>
