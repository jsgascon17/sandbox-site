<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Retro Bowl</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1a2e;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #fff;
            overflow: hidden;
            touch-action: none;
        }
        .game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px;
            max-width: 100%;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            max-width: 600px;
            margin-bottom: 10px;
            padding: 0 10px;
        }
        .team-score {
            text-align: center;
        }
        .team-name {
            font-size: 0.9rem;
            color: #888;
        }
        .score {
            font-size: 2rem;
            font-weight: bold;
        }
        .my-score { color: #4ecdc4; }
        .opp-score { color: #ff6b6b; }
        .game-info {
            text-align: center;
        }
        .quarter {
            font-size: 1rem;
            color: #ffd700;
        }
        .time {
            font-size: 1.5rem;
            font-weight: bold;
        }
        .down-info {
            background: rgba(0,0,0,0.5);
            padding: 8px 15px;
            border-radius: 20px;
            margin-bottom: 10px;
            font-size: 1rem;
        }
        #gameCanvas {
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(78, 205, 196, 0.2);
            touch-action: none;
        }
        .controls-info {
            margin-top: 10px;
            color: #888;
            font-size: 0.85rem;
            text-align: center;
        }
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
        .overlay.hidden { display: none; }
        .overlay h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            color: #4ecdc4;
        }
        .overlay h2 {
            font-size: 2rem;
            margin-bottom: 20px;
        }
        .overlay p {
            font-size: 1.1rem;
            margin: 5px 0;
            color: #aaa;
        }
        .btn {
            margin: 10px;
            padding: 15px 40px;
            font-size: 1.2rem;
            background: linear-gradient(135deg, #4ecdc4, #44a08d);
            color: #fff;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn:hover { transform: scale(1.05); }
        .btn-secondary {
            background: linear-gradient(135deg, #667eea, #764ba2);
        }
        .play-select {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            margin: 20px 0;
        }
        .play-btn {
            padding: 12px 20px;
            font-size: 1rem;
            background: rgba(78, 205, 196, 0.2);
            border: 2px solid #4ecdc4;
            color: #fff;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .play-btn:hover {
            background: rgba(78, 205, 196, 0.4);
        }
        .home-link {
            position: fixed;
            top: 10px;
            left: 10px;
            color: #fff;
            text-decoration: none;
            font-size: 0.9rem;
            opacity: 0.7;
            z-index: 200;
        }
        .home-link:hover { opacity: 1; }
        .roster {
            max-width: 400px;
            width: 100%;
        }
        .roster h3 {
            margin: 15px 0 10px;
            color: #4ecdc4;
        }
        .player-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 15px;
            background: rgba(255,255,255,0.05);
            border-radius: 5px;
            margin: 5px 0;
        }
        .player-pos { color: #888; width: 40px; }
        .player-name { flex: 1; }
        .player-rating { color: #4ecdc4; font-weight: bold; }
        .result-text {
            font-size: 1.8rem;
            margin: 10px 0;
            font-weight: bold;
        }
        .td-text { color: #4ecdc4; }
        .int-text { color: #ff6b6b; }
        .schedule {
            max-width: 350px;
            width: 100%;
            margin: 15px 0;
        }
        .schedule-game {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 15px;
            background: rgba(255,255,255,0.05);
            border-radius: 8px;
            margin: 5px 0;
        }
        .schedule-game.current {
            border: 2px solid #4ecdc4;
            background: rgba(78, 205, 196, 0.1);
        }
        .schedule-game.won { border-left: 4px solid #4ecdc4; }
        .schedule-game.lost { border-left: 4px solid #ff6b6b; }
        .week-num { color: #888; font-size: 0.9rem; }
        .opponent { flex: 1; margin-left: 10px; }
        .game-result { font-weight: bold; min-width: 60px; text-align: right; }
    </style>
</head>
<body>
    <a href="index.html" class="home-link">< Back</a>

    <div class="game-container">
        <div class="header">
            <div class="team-score">
                <div class="team-name" id="myTeamName">MY TEAM</div>
                <div class="score my-score" id="myScore">0</div>
            </div>
            <div class="game-info">
                <div class="quarter" id="quarter">Q1</div>
                <div class="time" id="time">2:00</div>
            </div>
            <div class="team-score">
                <div class="team-name" id="oppTeamName">OPPONENT</div>
                <div class="score opp-score" id="oppScore">0</div>
            </div>
        </div>

        <div class="down-info" id="downInfo">1st & 10 at YOUR 25</div>

        <canvas id="gameCanvas" width="600" height="400"></canvas>

        <div class="controls-info">
            Drag to aim pass • Tap receiver to throw • Or run with the ball!
        </div>
    </div>

    <!-- Main Menu -->
    <div class="overlay" id="menuOverlay">
        <h1>🏈 Retro Bowl</h1>
        <p>Lead your team to victory!</p>
        <button class="btn" id="playBtn">Play Season</button>
        <button class="btn btn-secondary" id="quickPlayBtn">Quick Game</button>
    </div>

    <!-- Play Selection -->
    <div class="overlay hidden" id="playOverlay">
        <h2>Choose Your Play</h2>
        <div class="play-select" id="playSelect"></div>
    </div>

    <!-- Result Overlay -->
    <div class="overlay hidden" id="resultOverlay">
        <div class="result-text" id="resultText"></div>
        <p id="resultDetails"></p>
        <button class="btn" id="continueBtn">Continue</button>
    </div>

    <!-- Game Over -->
    <div class="overlay hidden" id="gameOverOverlay">
        <h2 id="gameOverTitle">Game Over</h2>
        <p id="finalScore"></p>
        <p id="seasonRecord"></p>
        <button class="btn" id="nextGameBtn">Next Game</button>
        <button class="btn btn-secondary" id="menuBtn">Main Menu</button>
    </div>

    <!-- Season Schedule -->
    <div class="overlay hidden" id="scheduleOverlay">
        <h2>Season Schedule</h2>
        <div class="schedule" id="schedule"></div>
        <button class="btn" id="startSeasonBtn">Start Game</button>
    </div>

    <script>
        // ============================================
        // GAME SETUP
        // ============================================
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const W = canvas.width;
        const H = canvas.height;

        // Responsive canvas
        function resizeCanvas() {
            const maxW = Math.min(600, window.innerWidth - 20);
            const scale = maxW / 600;
            canvas.style.width = maxW + 'px';
            canvas.style.height = (400 * scale) + 'px';
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // ============================================
        // TEAMS DATA
        // ============================================
        const TEAMS = [
            { name: 'Rockets', color: '#e74c3c', abbr: 'RKT' },
            { name: 'Thunder', color: '#3498db', abbr: 'THN' },
            { name: 'Wolves', color: '#9b59b6', abbr: 'WLV' },
            { name: 'Eagles', color: '#27ae60', abbr: 'EGL' },
            { name: 'Bears', color: '#e67e22', abbr: 'BRS' },
            { name: 'Sharks', color: '#1abc9c', abbr: 'SHK' },
            { name: 'Lions', color: '#f1c40f', abbr: 'LNS' },
            { name: 'Hawks', color: '#c0392b', abbr: 'HWK' }
        ];

        const PLAYS = [
            { name: 'Short Pass', routes: ['short', 'short', 'curl'] },
            { name: 'Long Bomb', routes: ['deep', 'deep', 'short'] },
            { name: 'Spread', routes: ['out', 'slant', 'out'] },
            { name: 'Run Play', routes: ['block', 'block', 'block'], isRun: true }
        ];

        // ============================================
        // GAME STATE
        // ============================================
        let gameState = 'menu'; // menu, playing, playSelect, result, gameOver
        let seasonMode = false;
        let currentWeek = 0;
        let seasonRecord = { wins: 0, losses: 0 };
        let schedule = [];

        let myTeam = { ...TEAMS[0] };
        let oppTeam = { ...TEAMS[1] };
        let myScore = 0;
        let oppScore = 0;
        let quarter = 1;
        let timeLeft = 120; // seconds (2 min quarters)
        let down = 1;
        let yardsToGo = 10;
        let ballPosition = 25; // yard line (0-100, 100 = opponent end zone)
        let lineOfScrimmage = 25;
        let possession = 'player'; // player or cpu
        let playRunning = false;

        // Players on field
        let qb = null;
        let receivers = [];
        let defenders = [];
        let ball = null;
        let throwTarget = null;
        let throwPower = 0;

        // Input
        let isDragging = false;
        let dragStart = { x: 0, y: 0 };
        let dragEnd = { x: 0, y: 0 };
        let aimLine = null;

        // ============================================
        // UI ELEMENTS
        // ============================================
        const menuOverlay = document.getElementById('menuOverlay');
        const playOverlay = document.getElementById('playOverlay');
        const resultOverlay = document.getElementById('resultOverlay');
        const gameOverOverlay = document.getElementById('gameOverOverlay');
        const scheduleOverlay = document.getElementById('scheduleOverlay');

        // ============================================
        // FIELD DRAWING
        // ============================================
        function drawField() {
            // Green field
            ctx.fillStyle = '#2d5a27';
            ctx.fillRect(0, 0, W, H);

            // Yard lines
            ctx.strokeStyle = 'rgba(255,255,255,0.3)';
            ctx.lineWidth = 1;
            for (let i = 0; i <= 100; i += 10) {
                const x = yardToX(i);
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, H);
                ctx.stroke();

                // Yard numbers
                if (i > 0 && i < 100) {
                    ctx.fillStyle = 'rgba(255,255,255,0.4)';
                    ctx.font = '14px Arial';
                    ctx.textAlign = 'center';
                    const num = i <= 50 ? i : 100 - i;
                    ctx.fillText(num, x, 20);
                    ctx.fillText(num, x, H - 10);
                }
            }

            // End zones
            ctx.fillStyle = '#4ecdc4';
            ctx.globalAlpha = 0.3;
            ctx.fillRect(0, 0, yardToX(0) - yardToX(-10), H);
            ctx.fillStyle = '#ff6b6b';
            ctx.fillRect(yardToX(100), 0, yardToX(110) - yardToX(100), H);
            ctx.globalAlpha = 1;

            // Line of scrimmage
            ctx.strokeStyle = '#ffd700';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(yardToX(lineOfScrimmage), 0);
            ctx.lineTo(yardToX(lineOfScrimmage), H);
            ctx.stroke();

            // First down line
            const firstDownLine = lineOfScrimmage + yardsToGo;
            if (firstDownLine <= 100) {
                ctx.strokeStyle = '#ff6b6b';
                ctx.lineWidth = 2;
                ctx.setLineDash([5, 5]);
                ctx.beginPath();
                ctx.moveTo(yardToX(firstDownLine), 0);
                ctx.lineTo(yardToX(firstDownLine), H);
                ctx.stroke();
                ctx.setLineDash([]);
            }
        }

        function yardToX(yard) {
            // Field goes from yard 0 (our end zone) to 100 (their end zone)
            // Map to canvas width with some padding
            const padding = 30;
            return padding + (yard / 100) * (W - padding * 2);
        }

        function xToYard(x) {
            const padding = 30;
            return ((x - padding) / (W - padding * 2)) * 100;
        }

        // ============================================
        // PLAYERS
        // ============================================
        function setupPlay(playType) {
            const play = PLAYS[playType];
            const scrimmageX = yardToX(lineOfScrimmage);

            // QB
            qb = {
                x: scrimmageX - 30,
                y: H / 2,
                radius: 15,
                color: myTeam.color,
                hasBall: true,
                vx: 0,
                vy: 0,
                isQB: true
            };

            // Receivers
            receivers = [];
            const startY = H / 2 - 80;
            play.routes.forEach((route, i) => {
                receivers.push({
                    x: scrimmageX + 10,
                    y: startY + i * 80,
                    radius: 12,
                    color: myTeam.color,
                    route: route,
                    routeProgress: 0,
                    startX: scrimmageX + 10,
                    startY: startY + i * 80,
                    targeted: false,
                    caught: false
                });
            });

            // Defenders
            defenders = [];
            const defenseStart = scrimmageX + 60;
            for (let i = 0; i < 4; i++) {
                defenders.push({
                    x: defenseStart + Math.random() * 80,
                    y: 50 + i * 85 + Math.random() * 30,
                    radius: 13,
                    color: oppTeam.color,
                    speed: 2 + Math.random(),
                    target: null
                });
            }

            ball = null;
            throwTarget = null;
            playRunning = true;
            gameState = 'playing';

            hideAllOverlays();
        }

        function updatePlayers() {
            if (!playRunning) return;

            // Update receivers running routes
            receivers.forEach(r => {
                if (r.caught) return;
                r.routeProgress += 0.02;

                const depth = r.route === 'deep' ? 200 : (r.route === 'short' ? 80 : 120);
                let targetX = r.startX + depth * r.routeProgress;
                let targetY = r.startY;

                if (r.route === 'out') {
                    targetY = r.startY + (r.startY > H/2 ? 60 : -60) * Math.min(r.routeProgress * 2, 1);
                } else if (r.route === 'slant') {
                    targetY = H / 2;
                } else if (r.route === 'curl' && r.routeProgress > 0.5) {
                    targetX = r.startX + 80;
                }

                r.x += (targetX - r.x) * 0.1;
                r.y += (targetY - r.y) * 0.1;

                // Keep in bounds
                r.x = Math.max(30, Math.min(W - 30, r.x));
                r.y = Math.max(30, Math.min(H - 30, r.y));
            });

            // Update defenders
            defenders.forEach(d => {
                // Find closest receiver or QB with ball
                let target = qb.hasBall ? qb : null;
                let minDist = target ? distance(d, qb) : Infinity;

                receivers.forEach(r => {
                    if (ball && r.targeted) {
                        const dist = distance(d, ball);
                        if (dist < minDist) {
                            target = ball;
                            minDist = dist;
                        }
                    } else if (!r.caught) {
                        const dist = distance(d, r);
                        if (dist < minDist * 0.7) {
                            target = r;
                            minDist = dist;
                        }
                    }
                });

                if (target) {
                    const angle = Math.atan2(target.y - d.y, target.x - d.x);
                    d.x += Math.cos(angle) * d.speed;
                    d.y += Math.sin(angle) * d.speed;
                }
            });

            // Update ball if thrown
            if (ball) {
                ball.x += ball.vx;
                ball.y += ball.vy;
                ball.vx *= 0.99;
                ball.vy *= 0.99;

                // Check if receiver catches
                receivers.forEach(r => {
                    if (r.targeted && !r.caught && distance(ball, r) < 25) {
                        r.caught = true;
                        ball = null;
                        r.hasBall = true;
                    }
                });

                // Check for interception
                defenders.forEach(d => {
                    if (ball && distance(ball, d) < 20) {
                        endPlay('interception');
                    }
                });

                // Ball out of bounds or incomplete
                if (ball && (ball.x < 0 || ball.x > W || ball.y < 0 || ball.y > H)) {
                    endPlay('incomplete');
                }

                // Ball stopped
                if (ball && Math.abs(ball.vx) < 0.5 && Math.abs(ball.vy) < 0.5) {
                    endPlay('incomplete');
                }
            }

            // QB movement (if dragging to run)
            if (qb.hasBall && !ball) {
                qb.x += qb.vx;
                qb.y += qb.vy;
                qb.vx *= 0.95;
                qb.vy *= 0.95;

                // Keep in bounds
                qb.y = Math.max(20, Math.min(H - 20, qb.y));

                // Check for sack
                defenders.forEach(d => {
                    if (qb.hasBall && distance(qb, d) < qb.radius + d.radius) {
                        endPlay('sack');
                    }
                });

                // Check if QB scores
                if (xToYard(qb.x) >= 100) {
                    endPlay('touchdown');
                }
            }

            // Receiver with ball running
            receivers.forEach(r => {
                if (r.hasBall) {
                    r.x += 3; // Run forward

                    // Check for tackle
                    defenders.forEach(d => {
                        if (distance(r, d) < r.radius + d.radius) {
                            endPlay('tackle', xToYard(r.x));
                        }
                    });

                    // Check for touchdown
                    if (xToYard(r.x) >= 100) {
                        endPlay('touchdown');
                    }

                    // Out of bounds
                    if (r.y < 10 || r.y > H - 10) {
                        endPlay('tackle', xToYard(r.x));
                    }
                }
            });
        }

        function drawPlayers() {
            // Draw receivers
            receivers.forEach((r, i) => {
                ctx.beginPath();
                ctx.arc(r.x, r.y, r.radius, 0, Math.PI * 2);
                ctx.fillStyle = r.caught ? '#ffd700' : r.color;
                ctx.fill();
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 2;
                ctx.stroke();

                // Receiver number
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 10px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(80 + i, r.x, r.y);
            });

            // Draw defenders
            defenders.forEach(d => {
                ctx.beginPath();
                ctx.arc(d.x, d.y, d.radius, 0, Math.PI * 2);
                ctx.fillStyle = d.color;
                ctx.fill();
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 2;
                ctx.stroke();
            });

            // Draw QB
            if (qb) {
                ctx.beginPath();
                ctx.arc(qb.x, qb.y, qb.radius, 0, Math.PI * 2);
                ctx.fillStyle = qb.hasBall ? '#ffd700' : qb.color;
                ctx.fill();
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 3;
                ctx.stroke();

                ctx.fillStyle = '#000';
                ctx.font = 'bold 11px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('QB', qb.x, qb.y);
            }

            // Draw ball
            if (ball) {
                ctx.beginPath();
                ctx.ellipse(ball.x, ball.y, 10, 6, Math.atan2(ball.vy, ball.vx), 0, Math.PI * 2);
                ctx.fillStyle = '#8B4513';
                ctx.fill();
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 1;
                ctx.stroke();
            }

            // Draw aim line
            if (isDragging && qb && qb.hasBall) {
                ctx.beginPath();
                ctx.moveTo(qb.x, qb.y);
                ctx.lineTo(dragEnd.x, dragEnd.y);
                ctx.strokeStyle = 'rgba(255,255,255,0.5)';
                ctx.lineWidth = 2;
                ctx.setLineDash([5, 5]);
                ctx.stroke();
                ctx.setLineDash([]);

                // Power indicator
                const power = Math.min(distance(dragStart, dragEnd) / 100, 1);
                ctx.fillStyle = `hsl(${120 * (1 - power)}, 80%, 50%)`;
                ctx.fillRect(10, H - 30, power * 100, 15);
                ctx.strokeStyle = '#fff';
                ctx.strokeRect(10, H - 30, 100, 15);
            }
        }

        // ============================================
        // GAME LOGIC
        // ============================================
        function endPlay(result, yardLine = null) {
            playRunning = false;

            let resultText = '';
            let details = '';
            let yardsGained = 0;

            switch (result) {
                case 'touchdown':
                    myScore += 7; // TD + extra point auto
                    resultText = '🏈 TOUCHDOWN!';
                    details = '+7 points!';
                    updateScoreDisplay();
                    break;

                case 'tackle':
                    yardsGained = Math.floor(yardLine - lineOfScrimmage);
                    resultText = 'TACKLED';
                    details = yardsGained >= 0 ? `+${yardsGained} yards` : `${yardsGained} yards`;
                    advanceDown(yardsGained);
                    break;

                case 'incomplete':
                    resultText = 'INCOMPLETE';
                    details = 'Pass fell incomplete';
                    advanceDown(0);
                    break;

                case 'interception':
                    resultText = '😱 INTERCEPTED!';
                    details = 'Turnover on downs';
                    // CPU gets ball, we simulate their drive
                    simulateCPUDrive();
                    return;

                case 'sack':
                    yardsGained = -7;
                    resultText = 'SACKED!';
                    details = '-7 yards';
                    advanceDown(yardsGained);
                    break;
            }

            showResult(resultText, details);
        }

        function advanceDown(yards) {
            ballPosition = lineOfScrimmage + yards;
            lineOfScrimmage = ballPosition;
            yardsToGo -= yards;

            if (yardsToGo <= 0) {
                // First down!
                down = 1;
                yardsToGo = 10;
            } else {
                down++;
            }

            if (down > 4) {
                // Turnover on downs
                turnover();
            }

            // Update time
            timeLeft -= 20;
            if (timeLeft <= 0) {
                advanceQuarter();
            }

            updateGameInfo();
        }

        function turnover() {
            simulateCPUDrive();
        }

        function simulateCPUDrive() {
            // Simple CPU simulation
            const cpuYards = Math.floor(Math.random() * 60);
            const cpuScores = cpuYards > 50 && Math.random() > 0.5;

            if (cpuScores) {
                oppScore += 7;
                showResult('Opponent Scored', 'They scored a touchdown! +7 for them');
            } else {
                showResult('Defense Holds!', 'Your defense stopped them!');
            }

            // Reset for our possession
            lineOfScrimmage = 25;
            ballPosition = 25;
            down = 1;
            yardsToGo = 10;
            timeLeft -= 45;

            if (timeLeft <= 0) {
                advanceQuarter();
            }

            updateScoreDisplay();
            updateGameInfo();
        }

        function advanceQuarter() {
            quarter++;
            timeLeft = 120;

            if (quarter > 4) {
                endGame();
            }

            document.getElementById('quarter').textContent = 'Q' + Math.min(quarter, 4);
        }

        function endGame() {
            gameState = 'gameOver';

            const won = myScore > oppScore;
            if (seasonMode) {
                if (won) seasonRecord.wins++;
                else seasonRecord.losses++;
                schedule[currentWeek].result = `${myScore}-${oppScore}`;
                schedule[currentWeek].won = won;
            }

            document.getElementById('gameOverTitle').textContent = won ? '🏆 Victory!' : 'Defeat';
            document.getElementById('finalScore').textContent = `Final Score: ${myScore} - ${oppScore}`;
            document.getElementById('seasonRecord').textContent = seasonMode ?
                `Season Record: ${seasonRecord.wins}-${seasonRecord.losses}` : '';

            document.getElementById('nextGameBtn').style.display =
                (seasonMode && currentWeek < 7) ? 'inline-block' : 'none';

            gameOverOverlay.classList.remove('hidden');

            // Track stats
            trackGameEnd();
        }

        function showResult(text, details) {
            document.getElementById('resultText').innerHTML = text;
            document.getElementById('resultDetails').textContent = details;
            resultOverlay.classList.remove('hidden');
            gameState = 'result';
        }

        function showPlaySelect() {
            const container = document.getElementById('playSelect');
            container.innerHTML = '';

            PLAYS.forEach((play, i) => {
                const btn = document.createElement('button');
                btn.className = 'play-btn';
                btn.textContent = play.name;
                btn.onclick = () => setupPlay(i);
                container.appendChild(btn);
            });

            playOverlay.classList.remove('hidden');
            gameState = 'playSelect';
        }

        function updateGameInfo() {
            const yardStr = lineOfScrimmage <= 50 ?
                `YOUR ${lineOfScrimmage}` :
                `OPP ${100 - lineOfScrimmage}`;

            document.getElementById('downInfo').textContent =
                `${down}${getOrdinal(down)} & ${yardsToGo} at ${yardStr}`;

            const mins = Math.floor(timeLeft / 60);
            const secs = timeLeft % 60;
            document.getElementById('time').textContent =
                `${mins}:${secs.toString().padStart(2, '0')}`;
        }

        function updateScoreDisplay() {
            document.getElementById('myScore').textContent = myScore;
            document.getElementById('oppScore').textContent = oppScore;
        }

        function getOrdinal(n) {
            if (n === 1) return 'st';
            if (n === 2) return 'nd';
            if (n === 3) return 'rd';
            return 'th';
        }

        function hideAllOverlays() {
            menuOverlay.classList.add('hidden');
            playOverlay.classList.add('hidden');
            resultOverlay.classList.add('hidden');
            gameOverOverlay.classList.add('hidden');
            scheduleOverlay.classList.add('hidden');
        }

        // ============================================
        // INPUT HANDLING
        // ============================================
        function getCanvasPos(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = W / rect.width;
            const scaleY = H / rect.height;
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return {
                x: (clientX - rect.left) * scaleX,
                y: (clientY - rect.top) * scaleY
            };
        }

        canvas.addEventListener('mousedown', handleStart);
        canvas.addEventListener('mousemove', handleMove);
        canvas.addEventListener('mouseup', handleEnd);
        canvas.addEventListener('touchstart', handleStart);
        canvas.addEventListener('touchmove', handleMove);
        canvas.addEventListener('touchend', handleEnd);

        function handleStart(e) {
            e.preventDefault();
            if (!playRunning || !qb || !qb.hasBall) return;

            const pos = getCanvasPos(e);
            isDragging = true;
            dragStart = pos;
            dragEnd = pos;
        }

        function handleMove(e) {
            e.preventDefault();
            if (!isDragging) return;

            dragEnd = getCanvasPos(e);
        }

        function handleEnd(e) {
            e.preventDefault();
            if (!isDragging || !qb || !qb.hasBall) return;
            isDragging = false;

            const power = Math.min(distance(dragStart, dragEnd) / 100, 1);

            if (power < 0.1) {
                // Tap - find nearest receiver and throw to them
                const pos = dragEnd;
                let nearest = null;
                let minDist = Infinity;

                receivers.forEach(r => {
                    const d = distance(pos, r);
                    if (d < minDist) {
                        minDist = d;
                        nearest = r;
                    }
                });

                if (nearest && minDist < 100) {
                    throwTo(nearest, 0.7);
                }
            } else {
                // Drag throw
                const angle = Math.atan2(dragEnd.y - dragStart.y, dragEnd.x - dragStart.x);

                // Find receiver near throw direction
                let target = null;
                let bestScore = -Infinity;

                receivers.forEach(r => {
                    const recAngle = Math.atan2(r.y - qb.y, r.x - qb.x);
                    const angleDiff = Math.abs(angle - recAngle);
                    const dist = distance(qb, r);

                    if (angleDiff < 0.5 && dist < 400) {
                        const score = (0.5 - angleDiff) * 100 + (400 - dist) * 0.5;
                        if (score > bestScore) {
                            bestScore = score;
                            target = r;
                        }
                    }
                });

                if (target) {
                    throwTo(target, power);
                } else {
                    // Throw anyway (probably incomplete)
                    ball = {
                        x: qb.x,
                        y: qb.y,
                        vx: Math.cos(angle) * power * 15,
                        vy: Math.sin(angle) * power * 15
                    };
                    qb.hasBall = false;
                }
            }
        }

        function throwTo(receiver, power) {
            receiver.targeted = true;
            qb.hasBall = false;

            // Lead the receiver
            const leadX = receiver.x + receiver.vx * 10;
            const leadY = receiver.y;

            const angle = Math.atan2(leadY - qb.y, leadX - qb.x);
            const speed = 8 + power * 8;

            ball = {
                x: qb.x,
                y: qb.y,
                vx: Math.cos(angle) * speed,
                vy: Math.sin(angle) * speed
            };

            throwTarget = receiver;
        }

        function distance(a, b) {
            return Math.sqrt((a.x - b.x) ** 2 + (a.y - b.y) ** 2);
        }

        // ============================================
        // GAME LOOP
        // ============================================
        function gameLoop() {
            ctx.clearRect(0, 0, W, H);

            drawField();

            if (gameState === 'playing') {
                updatePlayers();
                drawPlayers();
            }

            requestAnimationFrame(gameLoop);
        }

        // ============================================
        // SEASON MODE
        // ============================================
        function generateSchedule() {
            schedule = [];
            const opponents = TEAMS.filter(t => t.name !== myTeam.name);

            for (let i = 0; i < 8; i++) {
                schedule.push({
                    week: i + 1,
                    opponent: opponents[i % opponents.length],
                    result: null,
                    won: null
                });
            }
        }

        function showSchedule() {
            generateSchedule();
            const container = document.getElementById('schedule');
            container.innerHTML = '';

            schedule.forEach((game, i) => {
                const div = document.createElement('div');
                div.className = 'schedule-game' +
                    (i === currentWeek ? ' current' : '') +
                    (game.won === true ? ' won' : '') +
                    (game.won === false ? ' lost' : '');

                div.innerHTML = `
                    <span class="week-num">Week ${game.week}</span>
                    <span class="opponent">${game.opponent.name}</span>
                    <span class="game-result">${game.result || '-'}</span>
                `;
                container.appendChild(div);
            });

            scheduleOverlay.classList.remove('hidden');
        }

        // ============================================
        // BUTTON HANDLERS
        // ============================================
        document.getElementById('playBtn').addEventListener('click', () => {
            seasonMode = true;
            currentWeek = 0;
            seasonRecord = { wins: 0, losses: 0 };
            myTeam = { ...TEAMS[0] };
            showSchedule();
        });

        document.getElementById('quickPlayBtn').addEventListener('click', () => {
            seasonMode = false;
            myTeam = { ...TEAMS[0] };
            oppTeam = { ...TEAMS[Math.floor(Math.random() * (TEAMS.length - 1)) + 1] };
            startGame();
        });

        document.getElementById('startSeasonBtn').addEventListener('click', () => {
            oppTeam = schedule[currentWeek].opponent;
            startGame();
        });

        document.getElementById('continueBtn').addEventListener('click', () => {
            resultOverlay.classList.add('hidden');

            if (quarter > 4) {
                endGame();
            } else {
                showPlaySelect();
            }
        });

        document.getElementById('nextGameBtn').addEventListener('click', () => {
            currentWeek++;
            if (currentWeek < 8) {
                showSchedule();
            } else {
                // Season over
                hideAllOverlays();
                menuOverlay.classList.remove('hidden');
            }
        });

        document.getElementById('menuBtn').addEventListener('click', () => {
            hideAllOverlays();
            menuOverlay.classList.remove('hidden');
        });

        function startGame() {
            hideAllOverlays();
            myScore = 0;
            oppScore = 0;
            quarter = 1;
            timeLeft = 120;
            down = 1;
            yardsToGo = 10;
            lineOfScrimmage = 25;
            ballPosition = 25;

            document.getElementById('myTeamName').textContent = myTeam.abbr;
            document.getElementById('oppTeamName').textContent = oppTeam.abbr;
            document.getElementById('quarter').textContent = 'Q1';

            updateScoreDisplay();
            updateGameInfo();

            trackGameStart();
            showPlaySelect();
        }

        // ============================================
        // STATS TRACKING
        // ============================================
        let gameStartTime = 0;

        function loadArcadeStats() {
            const saved = localStorage.getItem('arcadeStats');
            return saved ? JSON.parse(saved) : {
                totalGamesPlayed: 0, totalTimePlayed: 0, totalCoinsEarned: 0,
                games: {}
            };
        }

        function saveArcadeStats(stats) {
            localStorage.setItem('arcadeStats', JSON.stringify(stats));
        }

        function trackGameStart() {
            gameStartTime = Date.now();
        }

        function trackGameEnd() {
            const stats = loadArcadeStats();
            const gameTime = Math.floor((Date.now() - gameStartTime) / 1000);

            stats.totalGamesPlayed++;
            stats.totalTimePlayed += gameTime;

            if (!stats.games['retro-bowl']) {
                stats.games['retro-bowl'] = {
                    gamesPlayed: 0,
                    timePlayed: 0,
                    wins: 0,
                    losses: 0,
                    totalPoints: 0,
                    highScore: 0
                };
            }

            const g = stats.games['retro-bowl'];
            g.gamesPlayed++;
            g.timePlayed += gameTime;
            g.totalPoints += myScore;
            if (myScore > g.highScore) g.highScore = myScore;
            if (myScore > oppScore) g.wins++;
            else g.losses++;

            saveArcadeStats(stats);
        }

        // Start game loop
        gameLoop();
    </script>
</body>
</html>
