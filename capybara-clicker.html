<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Capybara Clicker - Chill & Click</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: linear-gradient(180deg, #87CEEB 0%, #98D8AA 50%, #64CCC5 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
        }
        h1 { font-size: 2.5rem; color: #5D4037; text-shadow: 2px 2px 0 #fff; margin-bottom: 10px; }
        .subtitle { color: #6D4C41; margin-bottom: 20px; font-size: 1.1rem; }

        .stats {
            display: flex; gap: 15px; margin-bottom: 20px; flex-wrap: wrap; justify-content: center;
        }
        .stat {
            background: rgba(255,255,255,0.9); padding: 12px 20px; border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center;
        }
        .stat-label { color: #888; font-size: 0.8rem; }
        .stat-value { color: #5D4037; font-size: 1.3rem; font-weight: bold; }
        .stat-rate { color: #4CAF50; font-size: 0.75rem; }

        .game-container {
            display: flex; gap: 20px; flex-wrap: wrap; justify-content: center;
            align-items: flex-start; max-width: 1200px;
        }

        .click-area {
            background: rgba(255,255,255,0.8); border-radius: 30px; padding: 25px;
            text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,0.15); position: relative;
        }

        #capybara {
            width: 220px; height: 220px; cursor: pointer; transition: transform 0.1s;
            user-select: none; position: relative; display: flex; align-items: center; justify-content: center;
        }
        #capybara:hover { transform: scale(1.05); }
        #capybara:active { transform: scale(0.95); }

        .hat-display { position: absolute; top: -40px; left: 50%; transform: translateX(-50%); font-size: 2.5rem; z-index: 10; }

        .click-text {
            position: absolute; font-weight: bold; color: #FFD700; text-shadow: 1px 1px 2px #000;
            pointer-events: none; animation: floatUp 1s ease-out forwards; z-index: 100;
        }
        @keyframes floatUp { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-80px); } }

        .shop {
            background: rgba(255,255,255,0.9); border-radius: 20px; padding: 15px;
            min-width: 300px; max-height: 450px; overflow-y: auto; box-shadow: 0 10px 40px rgba(0,0,0,0.15);
        }
        .shop h2 { color: #5D4037; margin-bottom: 10px; text-align: center; font-size: 1.2rem; }
        .shop-tabs { display: flex; gap: 5px; margin-bottom: 10px; flex-wrap: wrap; }
        .shop-tab {
            flex: 1; padding: 8px; border: none; background: #e0e0e0; border-radius: 10px;
            cursor: pointer; font-weight: bold; color: #666; transition: all 0.2s; font-size: 0.85rem;
        }
        .shop-tab.active { background: #8D6E63; color: #fff; }
        .shop-item {
            background: #f5f5f5; border-radius: 12px; padding: 12px; margin-bottom: 8px;
            display: flex; align-items: center; gap: 12px; cursor: pointer; transition: all 0.2s;
            border: 2px solid transparent;
        }
        .shop-item:hover { background: #eeeeee; border-color: #8D6E63; }
        .shop-item.owned { background: #C8E6C9; }
        .shop-item.equipped { background: #FFECB3; border-color: #FFC107; }
        .shop-item.disabled { opacity: 0.5; cursor: not-allowed; }
        .shop-item-icon { font-size: 1.8rem; }
        .shop-item-info { flex: 1; }
        .shop-item-name { font-weight: bold; color: #5D4037; font-size: 0.9rem; }
        .shop-item-desc { font-size: 0.75rem; color: #888; }
        .shop-item-effect { font-size: 0.8rem; color: #4CAF50; }
        .shop-item-cost { background: #FFD700; color: #5D4037; padding: 4px 10px; border-radius: 12px; font-weight: bold; font-size: 0.85rem; }
        .shop-item-count { background: #8D6E63; color: #fff; padding: 3px 8px; border-radius: 8px; font-size: 0.8rem; }

        .achievements {
            background: rgba(255,255,255,0.9); border-radius: 20px; padding: 15px;
            min-width: 260px; box-shadow: 0 10px 40px rgba(0,0,0,0.15); max-height: 450px; overflow-y: auto;
        }
        .achievements h2 { color: #5D4037; margin-bottom: 10px; text-align: center; font-size: 1.2rem; }
        .achievement-count { text-align: center; color: #888; font-size: 0.85rem; margin-bottom: 10px; }
        .achievement {
            display: flex; align-items: center; gap: 8px; padding: 8px; background: #f5f5f5;
            border-radius: 10px; margin-bottom: 6px; opacity: 0.4;
        }
        .achievement.unlocked { opacity: 1; background: #FFF9C4; }
        .achievement-icon { font-size: 1.3rem; }
        .achievement-info { flex: 1; }
        .achievement-name { font-weight: bold; color: #5D4037; font-size: 0.85rem; }
        .achievement-desc { color: #888; font-size: 0.7rem; }
        .achievement-reward { color: #FFD700; font-size: 0.7rem; }

        .orange-friend {
            position: fixed; font-size: 2rem; animation: float 3s ease-in-out infinite;
            pointer-events: none; z-index: 5;
        }
        @keyframes float { 0%, 100% { transform: translateY(0) rotate(-5deg); } 50% { transform: translateY(-15px) rotate(5deg); } }

        .notification {
            position: fixed; top: 20px; right: 20px; background: #4CAF50; color: #fff;
            padding: 12px 20px; border-radius: 15px; font-weight: bold;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2); animation: slideIn 0.3s ease-out; z-index: 1000;
        }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        .prestige-btn {
            margin-top: 15px; padding: 10px 20px;
            background: linear-gradient(135deg, #9C27B0, #673AB7); color: #fff; border: none;
            border-radius: 15px; font-size: 0.9rem; font-weight: bold; cursor: pointer;
            box-shadow: 0 4px 15px rgba(156, 39, 176, 0.4); transition: all 0.2s;
        }
        .prestige-btn:hover { transform: scale(1.05); }
        .prestige-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .mini-game-btn {
            margin-top: 10px; padding: 8px 15px;
            background: linear-gradient(135deg, #FF9800, #F57C00); color: #fff; border: none;
            border-radius: 12px; font-size: 0.85rem; font-weight: bold; cursor: pointer;
            box-shadow: 0 3px 10px rgba(255, 152, 0, 0.4); transition: all 0.2s;
        }
        .mini-game-btn:hover { transform: scale(1.05); }

        .splash {
            position: absolute; width: 10px; height: 10px; background: #4FC3F7; border-radius: 50%;
            pointer-events: none; animation: splash 0.6s ease-out forwards;
        }
        @keyframes splash { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(0); opacity: 0; } }

        .mini-game-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 500;
        }
        .mini-game-overlay.hidden { display: none; }
        .mini-game-overlay h2 { color: #fff; margin-bottom: 20px; }
        .mini-game-canvas { border: 4px solid #8D6E63; border-radius: 15px; background: #f5f5f5; }
        .mini-game-close {
            margin-top: 15px; padding: 10px 25px; background: #f44336; color: #fff;
            border: none; border-radius: 10px; font-size: 1rem; cursor: pointer;
        }

        .event-banner {
            background: linear-gradient(135deg, #FFD700, #FFA000); padding: 8px 15px;
            border-radius: 10px; margin-bottom: 15px; text-align: center; color: #5D4037;
            font-weight: bold; font-size: 0.9rem; animation: pulse 2s infinite;
        }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.02); } }

        .skin-preview {
            position: absolute; top: 10px; right: 10px; background: rgba(255,255,255,0.9);
            padding: 5px 10px; border-radius: 10px; font-size: 0.8rem; color: #5D4037;
        }

        @media (max-width: 900px) {
            .game-container { flex-direction: column; align-items: center; }
            .shop, .achievements { width: 100%; max-width: 350px; }
        }
    </style>
</head>
<body>
    <h1>🦫 Capybara Clicker</h1>
    <p class="subtitle">The chillest clicker game ever</p>

    <div class="stats">
        <div class="stat">
            <div class="stat-label">Chill Points</div>
            <div class="stat-value" id="points">0</div>
        </div>
        <div class="stat">
            <div class="stat-label">Per Click</div>
            <div class="stat-value" id="perClick">1</div>
        </div>
        <div class="stat">
            <div class="stat-label">Per Second</div>
            <div class="stat-value" id="perSecond">0</div>
        </div>
        <div class="stat">
            <div class="stat-label">Total Clicks</div>
            <div class="stat-value" id="totalClicks">0</div>
        </div>
        <div class="stat">
            <div class="stat-label">Prestige</div>
            <div class="stat-value" id="prestigeLevel">0</div>
        </div>
    </div>

    <div class="game-container">
        <div class="click-area">
            <div id="eventBanner" class="event-banner" style="display: none;"></div>
            <div id="capybara">
                <div class="hat-display" id="hatDisplay"></div>
                <canvas id="capyCanvas" width="220" height="220"></canvas>
            </div>
            <div class="skin-preview" id="skinPreview">Classic Capy</div>
            <p style="color: #8D6E63; margin-top: 10px; font-size: 0.9rem;">Click the capybara!</p>
            <button class="mini-game-btn" id="miniGameBtn">🎮 Mini-Game</button>
            <button class="prestige-btn" id="prestigeBtn" disabled>✨ Prestige (1M points)</button>
            <p id="prestigeInfo" style="color: #9C27B0; font-size: 0.8rem; margin-top: 8px;"></p>
        </div>

        <div class="shop">
            <h2>🛒 Shop</h2>
            <div class="shop-tabs">
                <button class="shop-tab active" data-tab="upgrades">Upgrades</button>
                <button class="shop-tab" data-tab="hats">Hats</button>
                <button class="shop-tab" data-tab="skins">Skins</button>
                <button class="shop-tab" data-tab="friends">Friends</button>
            </div>
            <div id="shopContent"></div>
        </div>

        <div class="achievements">
            <h2>🏆 Achievements</h2>
            <div class="achievement-count" id="achieveCount">0/20 Unlocked</div>
            <div id="achievementsList"></div>
        </div>
    </div>

    <!-- Mini-Game Overlay -->
    <div class="mini-game-overlay hidden" id="miniGameOverlay">
        <h2 id="miniGameTitle">🍊 Orange Catch!</h2>
        <canvas id="miniGameCanvas" class="mini-game-canvas" width="400" height="400"></canvas>
        <p id="miniGameScore" style="color: #FFD700; font-size: 1.5rem; margin-top: 10px;">Score: 0</p>
        <p id="miniGameTimer" style="color: #fff; font-size: 1rem;">Time: 30s</p>
        <button class="mini-game-close" id="miniGameClose">Close</button>
    </div>

    <script>
        // ============================================
        // AUDIO
        // ============================================
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx = null;

        function initAudio() { if (!audioCtx) audioCtx = new AudioContext(); }

        function playSound(type) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            const now = audioCtx.currentTime;

            const sounds = {
                click: () => { osc.type = 'sine'; osc.frequency.setValueAtTime(400, now); osc.frequency.exponentialRampToValueAtTime(600, now + 0.05); gain.gain.setValueAtTime(0.1, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.05); osc.start(now); osc.stop(now + 0.05); },
                crit: () => { osc.type = 'sine'; osc.frequency.setValueAtTime(600, now); osc.frequency.exponentialRampToValueAtTime(1200, now + 0.15); gain.gain.setValueAtTime(0.15, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.15); osc.start(now); osc.stop(now + 0.15); },
                buy: () => { osc.type = 'sine'; osc.frequency.setValueAtTime(523, now); osc.frequency.setValueAtTime(659, now + 0.1); gain.gain.setValueAtTime(0.1, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.15); osc.start(now); osc.stop(now + 0.15); },
                achieve: () => { osc.type = 'sine'; [523, 659, 784, 1047].forEach((f, i) => osc.frequency.setValueAtTime(f, now + i * 0.1)); gain.gain.setValueAtTime(0.15, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.5); osc.start(now); osc.stop(now + 0.5); },
                prestige: () => { osc.type = 'sine'; [262, 330, 392, 523, 659, 784].forEach((f, i) => osc.frequency.setValueAtTime(f, now + i * 0.1)); gain.gain.setValueAtTime(0.2, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.8); osc.start(now); osc.stop(now + 0.8); },
                collect: () => { osc.type = 'sine'; osc.frequency.setValueAtTime(800, now); osc.frequency.setValueAtTime(1000, now + 0.05); gain.gain.setValueAtTime(0.1, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.08); osc.start(now); osc.stop(now + 0.08); }
            };
            if (sounds[type]) sounds[type]();
        }

        // ============================================
        // GAME DATA
        // ============================================
        const UPGRADES = [
            { id: 'click1', name: 'Better Vibes', desc: 'More chill per click', effect: '+1 per click', cost: 15, clickBonus: 1 },
            { id: 'click2', name: 'Relaxation Master', desc: 'Even more chill', effect: '+5 per click', cost: 100, clickBonus: 5 },
            { id: 'click3', name: 'Zen Mode', desc: 'Maximum chill', effect: '+25 per click', cost: 1000, clickBonus: 25 },
            { id: 'click4', name: 'Enlightenment', desc: 'Transcend chillness', effect: '+100 per click', cost: 10000, clickBonus: 100 },
            { id: 'click5', name: 'Chill God', desc: 'Ultimate power', effect: '+500 per click', cost: 100000, clickBonus: 500 },
            { id: 'mult1', name: 'Double Chill', desc: 'Multiply your vibes', effect: 'x2 all points', cost: 5000, multiplier: 2 },
            { id: 'mult2', name: 'Triple Chill', desc: 'Even more multiplication', effect: 'x3 all points', cost: 50000, multiplier: 3 },
            { id: 'crit1', name: 'Lucky Capybara', desc: '10% chance for 5x', effect: 'Critical clicks!', cost: 2500, critChance: 0.1 },
            { id: 'crit2', name: 'Super Lucky', desc: '+10% crit chance', effect: 'More crits!', cost: 25000, critChance: 0.1 },
            { id: 'auto1', name: 'Auto Clicker', desc: 'Clicks automatically', effect: '+1 auto click/sec', cost: 15000, autoClick: 1 }
        ];

        const FRIENDS = [
            { id: 'orange1', name: 'Orange Friend', desc: 'An orange that loves capybaras', effect: '+1/sec', cost: 50, perSec: 1, icon: '🍊' },
            { id: 'duck1', name: 'Duck Buddy', desc: 'Quack quack!', effect: '+5/sec', cost: 300, perSec: 5, icon: '🦆' },
            { id: 'turtle1', name: 'Turtle Pal', desc: 'Slow and steady', effect: '+20/sec', cost: 1500, perSec: 20, icon: '🐢' },
            { id: 'bird1', name: 'Bird Friend', desc: 'Sits on capybara head', effect: '+50/sec', cost: 5000, perSec: 50, icon: '🐦' },
            { id: 'cat1', name: 'Cat Companion', desc: 'Unlikely friendship', effect: '+150/sec', cost: 20000, perSec: 150, icon: '🐱' },
            { id: 'monkey1', name: 'Monkey Mate', desc: 'Grooming buddies', effect: '+500/sec', cost: 75000, perSec: 500, icon: '🐒' },
            { id: 'croc1', name: 'Croc Friend', desc: 'Dangerous but chill', effect: '+2000/sec', cost: 300000, perSec: 2000, icon: '🐊' },
            { id: 'elephant1', name: 'Elephant Pal', desc: 'Big friend energy', effect: '+8000/sec', cost: 1000000, perSec: 8000, icon: '🐘' }
        ];

        const HATS = [
            { id: 'none', name: 'No Hat', desc: 'Natural capybara', icon: '', cost: 0 },
            { id: 'flower', name: 'Flower Crown', desc: 'Pretty and peaceful', icon: '🌸', cost: 100 },
            { id: 'orange', name: 'Orange Hat', desc: 'The classic look', icon: '🍊', cost: 250 },
            { id: 'crown', name: 'Royal Crown', desc: 'King of chill', icon: '👑', cost: 1000 },
            { id: 'party', name: 'Party Hat', desc: 'Celebration time!', icon: '🎉', cost: 2500 },
            { id: 'cowboy', name: 'Cowboy Hat', desc: 'Yeehaw!', icon: '🤠', cost: 5000 },
            { id: 'chef', name: 'Chef Hat', desc: 'Cooking up vibes', icon: '👨‍🍳', cost: 10000 },
            { id: 'wizard', name: 'Wizard Hat', desc: 'Magical capybara', icon: '🧙', cost: 25000 },
            { id: 'astronaut', name: 'Space Helmet', desc: 'To infinity!', icon: '👨‍🚀', cost: 100000 },
            { id: 'halo', name: 'Halo', desc: 'Angelic capy', icon: '😇', cost: 250000 },
            { id: 'devil', name: 'Devil Horns', desc: 'Mischievous', icon: '😈', cost: 500000 }
        ];

        const SKINS = [
            { id: 'classic', name: 'Classic Capy', desc: 'The original', bodyColor: '#8B7355', faceColor: '#9C8565', cost: 0 },
            { id: 'golden', name: 'Golden Capy', desc: 'Shiny and special', bodyColor: '#FFD700', faceColor: '#FFC107', cost: 5000 },
            { id: 'pink', name: 'Pink Capy', desc: 'Cute and cuddly', bodyColor: '#FFB6C1', faceColor: '#FFC0CB', cost: 7500 },
            { id: 'blue', name: 'Blue Capy', desc: 'Cool and calm', bodyColor: '#6495ED', faceColor: '#87CEEB', cost: 7500 },
            { id: 'green', name: 'Forest Capy', desc: 'One with nature', bodyColor: '#228B22', faceColor: '#32CD32', cost: 10000 },
            { id: 'purple', name: 'Mystic Capy', desc: 'Mysterious vibes', bodyColor: '#9370DB', faceColor: '#BA55D3', cost: 15000 },
            { id: 'rainbow', name: 'Rainbow Capy', desc: 'All the colors!', bodyColor: 'rainbow', faceColor: 'rainbow', cost: 50000 },
            { id: 'ghost', name: 'Ghost Capy', desc: 'Spooky chill', bodyColor: '#E8E8E8', faceColor: '#F5F5F5', cost: 75000, alpha: 0.7 },
            { id: 'lava', name: 'Lava Capy', desc: 'Hot but cool', bodyColor: '#FF4500', faceColor: '#FF6347', cost: 100000 },
            { id: 'cosmic', name: 'Cosmic Capy', desc: 'From the stars', bodyColor: '#191970', faceColor: '#483D8B', cost: 250000, stars: true }
        ];

        const ACHIEVEMENTS = [
            { id: 'click10', name: 'First Steps', desc: 'Click 10 times', icon: '👆', reward: 10, check: s => s.totalClicks >= 10 },
            { id: 'click100', name: 'Getting Started', desc: 'Click 100 times', icon: '✌️', reward: 50, check: s => s.totalClicks >= 100 },
            { id: 'click1000', name: 'Dedicated Clicker', desc: 'Click 1,000 times', icon: '💪', reward: 200, check: s => s.totalClicks >= 1000 },
            { id: 'click10000', name: 'Click Master', desc: 'Click 10,000 times', icon: '🏆', reward: 1000, check: s => s.totalClicks >= 10000 },
            { id: 'click100000', name: 'Click Legend', desc: 'Click 100,000 times', icon: '⭐', reward: 10000, check: s => s.totalClicks >= 100000 },
            { id: 'points1000', name: 'Thousand Chills', desc: 'Earn 1,000 points', icon: '💰', reward: 25, check: s => s.totalEarned >= 1000 },
            { id: 'points100000', name: 'Chill Millionaire', desc: 'Earn 100,000 points', icon: '💎', reward: 500, check: s => s.totalEarned >= 100000 },
            { id: 'points1000000', name: 'Chill Billionaire', desc: 'Earn 1,000,000 points', icon: '🌟', reward: 5000, check: s => s.totalEarned >= 1000000 },
            { id: 'points10000000', name: 'Chill Trillionaire', desc: 'Earn 10M points', icon: '🚀', reward: 50000, check: s => s.totalEarned >= 10000000 },
            { id: 'friend1', name: 'First Friend', desc: 'Buy your first friend', icon: '🤝', reward: 25, check: s => Object.values(s.friends).some(v => v > 0) },
            { id: 'friend10', name: 'Popular Capybara', desc: 'Have 10 total friends', icon: '👥', reward: 250, check: s => Object.values(s.friends).reduce((a,b) => a+b, 0) >= 10 },
            { id: 'friend50', name: 'Friend Magnet', desc: 'Have 50 total friends', icon: '🧲', reward: 2500, check: s => Object.values(s.friends).reduce((a,b) => a+b, 0) >= 50 },
            { id: 'hat1', name: 'Fashion Forward', desc: 'Buy a hat', icon: '🎩', reward: 50, check: s => s.ownedHats.length > 1 },
            { id: 'hat5', name: 'Hat Collector', desc: 'Own 5 hats', icon: '👒', reward: 500, check: s => s.ownedHats.length >= 5 },
            { id: 'skin1', name: 'New Look', desc: 'Buy a skin', icon: '🎨', reward: 100, check: s => s.ownedSkins.length > 1 },
            { id: 'skin5', name: 'Fashionista', desc: 'Own 5 skins', icon: '✨', reward: 1000, check: s => s.ownedSkins.length >= 5 },
            { id: 'prestige1', name: 'Rebirth', desc: 'Prestige once', icon: '🔄', reward: 1000, check: s => s.prestiges >= 1 },
            { id: 'prestige5', name: 'Eternal Capy', desc: 'Prestige 5 times', icon: '♾️', reward: 10000, check: s => s.prestiges >= 5 },
            { id: 'crit1', name: 'Lucky!', desc: 'Get a critical click', icon: '🍀', reward: 100, check: s => s.critHits >= 1 },
            { id: 'crit100', name: 'Crit Master', desc: 'Get 100 critical clicks', icon: '💥', reward: 2500, check: s => s.critHits >= 100 },
            { id: 'minigame1', name: 'Gamer', desc: 'Play a mini-game', icon: '🎮', reward: 100, check: s => s.miniGamesPlayed >= 1 },
            { id: 'minigame10', name: 'Pro Gamer', desc: 'Play 10 mini-games', icon: '🕹️', reward: 1000, check: s => s.miniGamesPlayed >= 10 }
        ];

        // ============================================
        // GAME STATE
        // ============================================
        let state = {
            points: 0, totalEarned: 0, totalClicks: 0, critHits: 0,
            clickPower: 1, multiplier: 1, critChance: 0, perSecond: 0, autoClicks: 0,
            upgrades: {}, friends: {},
            ownedHats: ['none'], equippedHat: 'none',
            ownedSkins: ['classic'], equippedSkin: 'classic',
            achievements: [], prestiges: 0, prestigeBonus: 1,
            miniGamesPlayed: 0, miniGameHighScore: 0
        };

        // ============================================
        // DOM ELEMENTS
        // ============================================
        const pointsEl = document.getElementById('points');
        const perClickEl = document.getElementById('perClick');
        const perSecondEl = document.getElementById('perSecond');
        const totalClicksEl = document.getElementById('totalClicks');
        const prestigeLevelEl = document.getElementById('prestigeLevel');
        const shopContent = document.getElementById('shopContent');
        const hatDisplay = document.getElementById('hatDisplay');
        const skinPreview = document.getElementById('skinPreview');
        const achievementsList = document.getElementById('achievementsList');
        const achieveCount = document.getElementById('achieveCount');
        const prestigeBtn = document.getElementById('prestigeBtn');
        const prestigeInfo = document.getElementById('prestigeInfo');
        const capyCanvas = document.getElementById('capyCanvas');
        const capyCtx = capyCanvas.getContext('2d');

        let currentTab = 'upgrades';
        let floatingFriends = [];
        let frameCount = 0;

        // ============================================
        // DRAWING THE CAPYBARA
        // ============================================
        function drawCapybara() {
            const ctx = capyCtx;
            const w = capyCanvas.width;
            const h = capyCanvas.height;
            ctx.clearRect(0, 0, w, h);

            const cx = w / 2;
            const cy = h / 2 + 15;
            const skin = SKINS.find(s => s.id === state.equippedSkin) || SKINS[0];

            ctx.globalAlpha = skin.alpha || 1;

            // Get colors
            let bodyColor = skin.bodyColor;
            let faceColor = skin.faceColor;

            if (bodyColor === 'rainbow') {
                const hue = (frameCount * 2) % 360;
                bodyColor = `hsl(${hue}, 70%, 60%)`;
                faceColor = `hsl(${(hue + 30) % 360}, 70%, 65%)`;
            }

            // Cosmic stars
            if (skin.stars) {
                ctx.fillStyle = '#fff';
                for (let i = 0; i < 20; i++) {
                    const sx = (cx + Math.sin(i * 0.7 + frameCount * 0.02) * 60) % w;
                    const sy = (cy + Math.cos(i * 0.9 + frameCount * 0.02) * 50) % h;
                    ctx.beginPath();
                    ctx.arc(sx, sy, 1 + Math.sin(frameCount * 0.1 + i) * 0.5, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            // Body
            ctx.fillStyle = bodyColor;
            ctx.beginPath();
            ctx.ellipse(cx, cy + 15, 60, 40, 0, 0, Math.PI * 2);
            ctx.fill();

            // Head
            ctx.fillStyle = faceColor;
            ctx.beginPath();
            ctx.ellipse(cx, cy - 25, 45, 35, 0, 0, Math.PI * 2);
            ctx.fill();

            // Snout
            ctx.fillStyle = faceColor;
            ctx.beginPath();
            ctx.ellipse(cx, cy - 5, 28, 20, 0, 0, Math.PI * 2);
            ctx.fill();

            // Nose
            ctx.fillStyle = '#5D4037';
            ctx.beginPath();
            ctx.ellipse(cx, cy - 12, 10, 7, 0, 0, Math.PI * 2);
            ctx.fill();

            // Nostrils
            ctx.fillStyle = '#3E2723';
            ctx.beginPath();
            ctx.ellipse(cx - 4, cy - 12, 2.5, 1.5, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.ellipse(cx + 4, cy - 12, 2.5, 1.5, 0, 0, Math.PI * 2);
            ctx.fill();

            // Eyes
            ctx.fillStyle = '#000';
            ctx.beginPath();
            ctx.arc(cx - 18, cy - 38, 7, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(cx + 18, cy - 38, 7, 0, Math.PI * 2);
            ctx.fill();

            // Eye shine
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.arc(cx - 16, cy - 40, 2.5, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(cx + 20, cy - 40, 2.5, 0, Math.PI * 2);
            ctx.fill();

            // Ears
            ctx.fillStyle = bodyColor;
            ctx.beginPath();
            ctx.ellipse(cx - 35, cy - 48, 10, 7, -0.5, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.ellipse(cx + 35, cy - 48, 10, 7, 0.5, 0, Math.PI * 2);
            ctx.fill();

            // Inner ears
            ctx.fillStyle = '#D7CCC8';
            ctx.beginPath();
            ctx.ellipse(cx - 35, cy - 48, 5, 3, -0.5, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.ellipse(cx + 35, cy - 48, 5, 3, 0.5, 0, Math.PI * 2);
            ctx.fill();

            // Legs
            const legColor = bodyColor === 'rainbow' ? `hsl(${(frameCount * 2 + 180) % 360}, 70%, 50%)` : '#7A6550';
            ctx.fillStyle = skin.bodyColor === 'rainbow' ? legColor : (skin.id === 'classic' ? '#7A6550' : bodyColor);
            ctx.fillRect(cx - 42, cy + 42, 22, 25);
            ctx.fillRect(cx + 20, cy + 42, 22, 25);
            ctx.fillRect(cx - 30, cy + 47, 18, 20);
            ctx.fillRect(cx + 12, cy + 47, 18, 20);

            // Blush
            ctx.fillStyle = 'rgba(255, 150, 150, 0.4)';
            ctx.beginPath();
            ctx.ellipse(cx - 30, cy - 22, 10, 5, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.ellipse(cx + 30, cy - 22, 10, 5, 0, 0, Math.PI * 2);
            ctx.fill();

            // Smile
            ctx.strokeStyle = '#5D4037';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(cx, cy - 5, 12, 0.2, Math.PI - 0.2);
            ctx.stroke();

            ctx.globalAlpha = 1;
        }

        // ============================================
        // GAME LOGIC
        // ============================================
        function formatNumber(n) {
            if (n >= 1e12) return (n / 1e12).toFixed(1) + 'T';
            if (n >= 1e9) return (n / 1e9).toFixed(1) + 'B';
            if (n >= 1e6) return (n / 1e6).toFixed(1) + 'M';
            if (n >= 1e3) return (n / 1e3).toFixed(1) + 'K';
            return Math.floor(n).toString();
        }

        function calculateClickPower() {
            let power = 1;
            UPGRADES.forEach(u => {
                if (u.clickBonus && state.upgrades[u.id]) {
                    power += u.clickBonus * state.upgrades[u.id];
                }
            });
            return power;
        }

        function calculateMultiplier() {
            let mult = state.prestigeBonus;
            UPGRADES.forEach(u => {
                if (u.multiplier && state.upgrades[u.id]) {
                    mult *= u.multiplier;
                }
            });
            return mult;
        }

        function calculateCritChance() {
            let crit = 0;
            UPGRADES.forEach(u => {
                if (u.critChance && state.upgrades[u.id]) {
                    crit += u.critChance * state.upgrades[u.id];
                }
            });
            return Math.min(crit, 0.5);
        }

        function calculateAutoClicks() {
            let auto = 0;
            UPGRADES.forEach(u => {
                if (u.autoClick && state.upgrades[u.id]) {
                    auto += u.autoClick * state.upgrades[u.id];
                }
            });
            return auto;
        }

        function calculatePerSecond() {
            let ps = 0;
            FRIENDS.forEach(f => {
                if (state.friends[f.id]) {
                    ps += f.perSec * state.friends[f.id];
                }
            });
            return ps * state.multiplier;
        }

        function updateStats() {
            state.clickPower = calculateClickPower();
            state.multiplier = calculateMultiplier();
            state.critChance = calculateCritChance();
            state.autoClicks = calculateAutoClicks();
            state.perSecond = calculatePerSecond();

            pointsEl.textContent = formatNumber(state.points);
            perClickEl.textContent = formatNumber(state.clickPower * state.multiplier);
            perSecondEl.textContent = formatNumber(state.perSecond + state.autoClicks * state.clickPower * state.multiplier);
            totalClicksEl.textContent = formatNumber(state.totalClicks);
            prestigeLevelEl.textContent = state.prestiges;

            const hat = HATS.find(h => h.id === state.equippedHat);
            hatDisplay.textContent = hat ? hat.icon : '';

            const skin = SKINS.find(s => s.id === state.equippedSkin);
            skinPreview.textContent = skin ? skin.name : 'Classic Capy';

            prestigeBtn.disabled = state.points < 1000000;
            const nextBonus = (state.prestiges + 1) * 0.5 + 1;
            prestigeInfo.textContent = state.prestiges > 0
                ? `Bonus: x${state.prestigeBonus.toFixed(1)} | Next: x${nextBonus.toFixed(1)}`
                : 'Reach 1M points to prestige!';

            achieveCount.textContent = `${state.achievements.length}/${ACHIEVEMENTS.length} Unlocked`;
        }

        function click(e) {
            initAudio();
            state.totalClicks++;

            let amount = state.clickPower * state.multiplier;
            let isCrit = false;

            if (Math.random() < state.critChance) {
                amount *= 5;
                isCrit = true;
                state.critHits++;
                playSound('crit');
            } else {
                playSound('click');
            }

            state.points += amount;
            state.totalEarned += amount;
            clicksThisSession++;
            capybarasThisSession += amount;

            spawnClickText(e, amount, isCrit);
            spawnSplash(e);

            updateStats();
            checkAchievements();
            saveGame();
        }

        function spawnClickText(e, amount, isCrit) {
            const rect = capyCanvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            const text = document.createElement('div');
            text.className = 'click-text';
            text.textContent = (isCrit ? '🌟 ' : '+') + formatNumber(amount);
            text.style.left = x + 'px';
            text.style.top = y + 'px';
            text.style.fontSize = isCrit ? '1.4rem' : '1rem';
            text.style.color = isCrit ? '#FFD700' : '#4CAF50';

            document.querySelector('.click-area').appendChild(text);
            setTimeout(() => text.remove(), 1000);
        }

        function spawnSplash(e) {
            const rect = capyCanvas.getBoundingClientRect();
            for (let i = 0; i < 4; i++) {
                const splash = document.createElement('div');
                splash.className = 'splash';
                splash.style.left = (e.clientX - rect.left + (Math.random() - 0.5) * 35) + 'px';
                splash.style.top = (e.clientY - rect.top + (Math.random() - 0.5) * 35) + 'px';
                document.querySelector('.click-area').appendChild(splash);
                setTimeout(() => splash.remove(), 600);
            }
        }

        // ============================================
        // SHOP
        // ============================================
        function renderShop() {
            shopContent.innerHTML = '';

            if (currentTab === 'upgrades') {
                UPGRADES.forEach(u => {
                    const owned = state.upgrades[u.id] || 0;
                    const cost = Math.floor(u.cost * Math.pow(1.5, owned));
                    const canAfford = state.points >= cost;

                    const item = document.createElement('div');
                    item.className = 'shop-item' + (canAfford ? '' : ' disabled');
                    item.innerHTML = `
                        <div class="shop-item-icon">⬆️</div>
                        <div class="shop-item-info">
                            <div class="shop-item-name">${u.name}</div>
                            <div class="shop-item-desc">${u.desc}</div>
                            <div class="shop-item-effect">${u.effect}</div>
                        </div>
                        <div class="shop-item-count">${owned}</div>
                        <div class="shop-item-cost">${formatNumber(cost)}</div>
                    `;
                    item.onclick = () => buyUpgrade(u, cost);
                    shopContent.appendChild(item);
                });
            } else if (currentTab === 'friends') {
                FRIENDS.forEach(f => {
                    const owned = state.friends[f.id] || 0;
                    const cost = Math.floor(f.cost * Math.pow(1.15, owned));
                    const canAfford = state.points >= cost;

                    const item = document.createElement('div');
                    item.className = 'shop-item' + (canAfford ? '' : ' disabled');
                    item.innerHTML = `
                        <div class="shop-item-icon">${f.icon}</div>
                        <div class="shop-item-info">
                            <div class="shop-item-name">${f.name}</div>
                            <div class="shop-item-desc">${f.desc}</div>
                            <div class="shop-item-effect">${f.effect}</div>
                        </div>
                        <div class="shop-item-count">${owned}</div>
                        <div class="shop-item-cost">${formatNumber(cost)}</div>
                    `;
                    item.onclick = () => buyFriend(f, cost);
                    shopContent.appendChild(item);
                });
            } else if (currentTab === 'hats') {
                HATS.forEach(h => {
                    const owned = state.ownedHats.includes(h.id);
                    const equipped = state.equippedHat === h.id;
                    const canAfford = state.points >= h.cost;

                    const item = document.createElement('div');
                    item.className = 'shop-item' + (equipped ? ' equipped' : owned ? ' owned' : !canAfford ? ' disabled' : '');
                    item.innerHTML = `
                        <div class="shop-item-icon">${h.icon || '❌'}</div>
                        <div class="shop-item-info">
                            <div class="shop-item-name">${h.name}</div>
                            <div class="shop-item-desc">${h.desc}</div>
                        </div>
                        ${owned ? `<div class="shop-item-count">${equipped ? 'Worn' : 'Owned'}</div>` : `<div class="shop-item-cost">${formatNumber(h.cost)}</div>`}
                    `;
                    item.onclick = () => owned ? equipHat(h) : buyHat(h);
                    shopContent.appendChild(item);
                });
            } else if (currentTab === 'skins') {
                SKINS.forEach(s => {
                    const owned = state.ownedSkins.includes(s.id);
                    const equipped = state.equippedSkin === s.id;
                    const canAfford = state.points >= s.cost;

                    const item = document.createElement('div');
                    item.className = 'shop-item' + (equipped ? ' equipped' : owned ? ' owned' : !canAfford ? ' disabled' : '');
                    item.innerHTML = `
                        <div class="shop-item-icon">🦫</div>
                        <div class="shop-item-info">
                            <div class="shop-item-name">${s.name}</div>
                            <div class="shop-item-desc">${s.desc}</div>
                        </div>
                        ${owned ? `<div class="shop-item-count">${equipped ? 'Active' : 'Owned'}</div>` : `<div class="shop-item-cost">${formatNumber(s.cost)}</div>`}
                    `;
                    item.onclick = () => owned ? equipSkin(s) : buySkin(s);
                    shopContent.appendChild(item);
                });
            }
        }

        function buyUpgrade(u, cost) {
            if (state.points < cost) return;
            state.points -= cost;
            state.upgrades[u.id] = (state.upgrades[u.id] || 0) + 1;
            playSound('buy');
            updateStats();
            renderShop();
            checkAchievements();
            saveGame();
        }

        function buyFriend(f, cost) {
            if (state.points < cost) return;
            state.points -= cost;
            state.friends[f.id] = (state.friends[f.id] || 0) + 1;
            spawnFloatingFriend(f);
            playSound('buy');
            updateStats();
            renderShop();
            checkAchievements();
            saveGame();
        }

        function buyHat(h) {
            if (state.points < h.cost || state.ownedHats.includes(h.id)) return;
            state.points -= h.cost;
            state.ownedHats.push(h.id);
            state.equippedHat = h.id;
            playSound('buy');
            updateStats();
            renderShop();
            checkAchievements();
            saveGame();
        }

        function equipHat(h) {
            state.equippedHat = h.id;
            updateStats();
            renderShop();
            saveGame();
        }

        function buySkin(s) {
            if (state.points < s.cost || state.ownedSkins.includes(s.id)) return;
            state.points -= s.cost;
            state.ownedSkins.push(s.id);
            state.equippedSkin = s.id;
            playSound('buy');
            updateStats();
            renderShop();
            checkAchievements();
            saveGame();
        }

        function equipSkin(s) {
            state.equippedSkin = s.id;
            updateStats();
            renderShop();
            saveGame();
        }

        function spawnFloatingFriend(f) {
            const friend = document.createElement('div');
            friend.className = 'orange-friend';
            friend.textContent = f.icon;
            friend.style.left = Math.random() * (window.innerWidth - 50) + 'px';
            friend.style.top = Math.random() * (window.innerHeight - 50) + 'px';
            friend.style.animationDelay = Math.random() * 2 + 's';
            document.body.appendChild(friend);
            floatingFriends.push(friend);

            if (floatingFriends.length > 15) {
                floatingFriends[0].remove();
                floatingFriends.shift();
            }
        }

        // ============================================
        // ACHIEVEMENTS
        // ============================================
        function renderAchievements() {
            achievementsList.innerHTML = '';
            ACHIEVEMENTS.forEach(a => {
                const unlocked = state.achievements.includes(a.id);
                const div = document.createElement('div');
                div.className = 'achievement' + (unlocked ? ' unlocked' : '');
                div.innerHTML = `
                    <div class="achievement-icon">${unlocked ? a.icon : '🔒'}</div>
                    <div class="achievement-info">
                        <div class="achievement-name">${a.name}</div>
                        <div class="achievement-desc">${a.desc}</div>
                        ${unlocked ? '' : `<div class="achievement-reward">+${formatNumber(a.reward)} points</div>`}
                    </div>
                `;
                achievementsList.appendChild(div);
            });
        }

        function checkAchievements() {
            ACHIEVEMENTS.forEach(a => {
                if (!state.achievements.includes(a.id) && a.check(state)) {
                    state.achievements.push(a.id);
                    state.points += a.reward;
                    state.totalEarned += a.reward;
                    showNotification(`🏆 ${a.name}! +${formatNumber(a.reward)}`);
                    playSound('achieve');
                    renderAchievements();
                }
            });
        }

        function showNotification(text) {
            const notif = document.createElement('div');
            notif.className = 'notification';
            notif.textContent = text;
            document.body.appendChild(notif);
            setTimeout(() => notif.remove(), 3000);
        }

        // ============================================
        // PRESTIGE
        // ============================================
        function prestige() {
            if (state.points < 1000000) return;

            state.prestiges++;
            state.prestigeBonus = state.prestiges * 0.5 + 1;

            state.points = 0;
            state.totalClicks = 0;
            state.upgrades = {};
            state.friends = {};

            floatingFriends.forEach(f => f.remove());
            floatingFriends = [];

            showNotification(`✨ Prestige ${state.prestiges}! Bonus: x${state.prestigeBonus.toFixed(1)}`);
            playSound('prestige');

            updateStats();
            renderShop();
            checkAchievements();
            saveGame();
        }

        // ============================================
        // MINI-GAME
        // ============================================
        let miniGameRunning = false;
        let miniGameScore = 0;
        let miniGameTime = 30;
        let miniGameObjects = [];
        let miniGamePlayerX = 200; // Player X position (center of canvas)
        const miniGameCanvas = document.getElementById('miniGameCanvas');
        const miniGameCtx = miniGameCanvas.getContext('2d');

        function startMiniGame() {
            initAudio();
            state.miniGamesPlayed++;
            miniGameRunning = true;
            miniGameScore = 0;
            miniGameTime = 30;
            miniGameObjects = [];
            miniGamePlayerX = miniGameCanvas.width / 2; // Reset player to center
            document.getElementById('miniGameOverlay').classList.remove('hidden');
            document.getElementById('miniGameScore').textContent = 'Score: 0';
            document.getElementById('miniGameTimer').textContent = 'Time: 30s';

            checkAchievements();
            saveGame();
            miniGameLoop();
        }

        function endMiniGame() {
            miniGameRunning = false;
            const reward = miniGameScore * 10;
            state.points += reward;
            state.totalEarned += reward;
            if (miniGameScore > state.miniGameHighScore) {
                state.miniGameHighScore = miniGameScore;
            }
            showNotification(`🎮 Mini-game complete! +${formatNumber(reward)} points`);
            document.getElementById('miniGameOverlay').classList.add('hidden');
            updateStats();
            saveGame();
        }

        function miniGameLoop() {
            if (!miniGameRunning) return;

            frameCount++;

            // Timer
            if (frameCount % 60 === 0) {
                miniGameTime--;
                document.getElementById('miniGameTimer').textContent = `Time: ${miniGameTime}s`;
                if (miniGameTime <= 0) {
                    endMiniGame();
                    return;
                }
            }

            // Spawn oranges
            if (frameCount % 30 === 0) {
                miniGameObjects.push({
                    x: Math.random() * (miniGameCanvas.width - 40) + 20,
                    y: -30,
                    type: Math.random() < 0.15 ? 'golden' : 'orange',
                    speed: 2 + Math.random() * 3
                });
            }

            // Update oranges
            miniGameObjects.forEach(obj => {
                obj.y += obj.speed;
            });

            // Check collision with player (capybara catches oranges)
            const playerY = miniGameCanvas.height - 30;
            for (let i = miniGameObjects.length - 1; i >= 0; i--) {
                const obj = miniGameObjects[i];
                const dist = Math.sqrt((miniGamePlayerX - obj.x) ** 2 + (playerY - obj.y) ** 2);
                if (dist < 40) { // Catch radius
                    miniGameObjects.splice(i, 1);
                    miniGameScore += obj.type === 'golden' ? 5 : 1;
                    document.getElementById('miniGameScore').textContent = `Score: ${miniGameScore}`;
                    playSound('collect');
                }
            }

            // Remove oranges that fell off screen
            miniGameObjects = miniGameObjects.filter(obj => obj.y < miniGameCanvas.height + 30);

            // Draw background
            miniGameCtx.fillStyle = '#87CEEB';
            miniGameCtx.fillRect(0, 0, miniGameCanvas.width, miniGameCanvas.height);

            // Draw oranges
            miniGameObjects.forEach(obj => {
                miniGameCtx.font = '30px Arial';
                miniGameCtx.textAlign = 'center';
                miniGameCtx.fillText(obj.type === 'golden' ? '🌟' : '🍊', obj.x, obj.y);
            });

            // Draw capybara at player position
            miniGameCtx.font = '50px Arial';
            miniGameCtx.fillText('🦫', miniGamePlayerX, miniGameCanvas.height - 30);

            requestAnimationFrame(miniGameLoop);
        }

        // Mouse movement to control capybara
        miniGameCanvas.addEventListener('mousemove', (e) => {
            if (!miniGameRunning) return;
            const rect = miniGameCanvas.getBoundingClientRect();
            miniGamePlayerX = e.clientX - rect.left;
            // Clamp to canvas bounds
            miniGamePlayerX = Math.max(25, Math.min(miniGameCanvas.width - 25, miniGamePlayerX));
        });

        // Touch movement for mobile
        miniGameCanvas.addEventListener('touchmove', (e) => {
            if (!miniGameRunning) return;
            e.preventDefault();
            const rect = miniGameCanvas.getBoundingClientRect();
            const touch = e.touches[0];
            miniGamePlayerX = touch.clientX - rect.left;
            miniGamePlayerX = Math.max(25, Math.min(miniGameCanvas.width - 25, miniGamePlayerX));
        });

        // Click to collect oranges (bonus feature - can still click to catch)
        miniGameCanvas.addEventListener('click', (e) => {
            if (!miniGameRunning) return;
            const rect = miniGameCanvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            for (let i = miniGameObjects.length - 1; i >= 0; i--) {
                const obj = miniGameObjects[i];
                const dist = Math.sqrt((x - obj.x) ** 2 + (y - obj.y) ** 2);
                if (dist < 25) {
                    miniGameObjects.splice(i, 1);
                    miniGameScore += obj.type === 'golden' ? 5 : 1;
                    document.getElementById('miniGameScore').textContent = `Score: ${miniGameScore}`;
                    playSound('collect');
                    break;
                }
            }
        });

        document.getElementById('miniGameBtn').addEventListener('click', startMiniGame);
        document.getElementById('miniGameClose').addEventListener('click', () => {
            if (miniGameRunning) endMiniGame();
            else document.getElementById('miniGameOverlay').classList.add('hidden');
        });

        // ============================================
        // AUTO GENERATION
        // ============================================
        function autoGenerate() {
            // Friends passive income
            if (state.perSecond > 0) {
                const gain = state.perSecond / 20;
                state.points += gain;
                state.totalEarned += gain;
            }

            // Auto clicker
            if (state.autoClicks > 0 && frameCount % 60 === 0) {
                const gain = state.autoClicks * state.clickPower * state.multiplier;
                state.points += gain;
                state.totalEarned += gain;
            }

            updateStats();
        }

        // ============================================
        // SAVE/LOAD
        // ============================================
        function saveGame() {
            localStorage.setItem('capybaraClicker', JSON.stringify(state));
        }

        // ============================================
        // ARCADE STATS TRACKING
        // ============================================
        let gameStartTime = Date.now();
        let clicksThisSession = 0;
        let capybarasThisSession = 0;
        function loadArcadeStats() { return JSON.parse(localStorage.getItem('arcadeStats')) || { totalGamesPlayed: 0, totalTimePlayed: 0, totalCoinsEarned: 0, games: {} }; }
        function saveArcadeStats(stats) { localStorage.setItem('arcadeStats', JSON.stringify(stats)); }
        function trackGameEnd() {
            const stats = loadArcadeStats();
            const gameId = 'capybara-clicker';
            if (!stats.games[gameId]) stats.games[gameId] = { gamesPlayed: 0, timePlayed: 0, highScore: 0, totalScore: 0, coinsEarned: 0, clicks: 0 };
            const gameStats = stats.games[gameId];
            const sessionTime = (Date.now() - gameStartTime) / 1000;
            gameStats.gamesPlayed++; gameStats.timePlayed += sessionTime; gameStats.totalScore += Math.floor(capybarasThisSession); gameStats.clicks += clicksThisSession;
            if (capybarasThisSession > gameStats.highScore) gameStats.highScore = Math.floor(capybarasThisSession);
            stats.totalGamesPlayed++; stats.totalTimePlayed += sessionTime;
            saveArcadeStats(stats);
        }
        window.addEventListener('beforeunload', trackGameEnd);

        function loadGame() {
            const saved = localStorage.getItem('capybaraClicker');
            if (saved) {
                const loaded = JSON.parse(saved);
                state = { ...state, ...loaded };

                FRIENDS.forEach(f => {
                    const count = state.friends[f.id] || 0;
                    for (let i = 0; i < Math.min(count, 2); i++) {
                        spawnFloatingFriend(f);
                    }
                });
            }
        }

        // ============================================
        // GAME LOOP
        // ============================================
        function gameLoop() {
            frameCount++;
            drawCapybara();
            autoGenerate();
            requestAnimationFrame(gameLoop);
        }

        // ============================================
        // INIT
        // ============================================
        function init() {
            loadGame();
            drawCapybara();
            updateStats();
            renderShop();
            renderAchievements();

            document.getElementById('capybara').addEventListener('click', click);

            document.querySelectorAll('.shop-tab').forEach(tab => {
                tab.addEventListener('click', () => {
                    document.querySelectorAll('.shop-tab').forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    currentTab = tab.dataset.tab;
                    renderShop();
                });
            });

            prestigeBtn.addEventListener('click', prestige);

            setInterval(saveGame, 10000);
            setInterval(checkAchievements, 2000);

            gameLoop();
        }

        init();
    </script>
</body>
</html>
