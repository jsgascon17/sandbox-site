<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Capybara Clicker - Chill & Click</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: linear-gradient(180deg, #87CEEB 0%, #98D8AA 50%, #64CCC5 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
        }
        h1 {
            font-size: 2.5rem;
            color: #5D4037;
            text-shadow: 2px 2px 0 #fff;
            margin-bottom: 10px;
        }
        .subtitle { color: #6D4C41; margin-bottom: 20px; font-size: 1.1rem; }

        /* Stats Bar */
        .stats {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .stat {
            background: rgba(255,255,255,0.9);
            padding: 15px 25px;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
        }
        .stat-label { color: #888; font-size: 0.85rem; }
        .stat-value { color: #5D4037; font-size: 1.5rem; font-weight: bold; }
        .stat-rate { color: #4CAF50; font-size: 0.8rem; }

        /* Main Game Area */
        .game-container {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
            justify-content: center;
            align-items: flex-start;
            max-width: 1200px;
        }

        /* Capybara Click Area */
        .click-area {
            background: rgba(255,255,255,0.8);
            border-radius: 30px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
            position: relative;
        }

        #capybara {
            width: 250px;
            height: 250px;
            cursor: pointer;
            transition: transform 0.1s;
            user-select: none;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #capybara:hover { transform: scale(1.05); }
        #capybara:active { transform: scale(0.95); }

        .capy-body {
            position: relative;
            width: 180px;
            height: 120px;
        }

        /* Hat display */
        .hat-display {
            position: absolute;
            top: -50px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 3rem;
            z-index: 10;
        }

        .click-text {
            position: absolute;
            font-weight: bold;
            color: #FFD700;
            text-shadow: 1px 1px 2px #000;
            pointer-events: none;
            animation: floatUp 1s ease-out forwards;
            z-index: 100;
        }
        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-80px); }
        }

        /* Shop */
        .shop {
            background: rgba(255,255,255,0.9);
            border-radius: 20px;
            padding: 20px;
            min-width: 320px;
            max-height: 500px;
            overflow-y: auto;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
        }
        .shop h2 {
            color: #5D4037;
            margin-bottom: 15px;
            text-align: center;
            font-size: 1.3rem;
        }
        .shop-tabs {
            display: flex;
            gap: 5px;
            margin-bottom: 15px;
        }
        .shop-tab {
            flex: 1;
            padding: 8px;
            border: none;
            background: #e0e0e0;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            color: #666;
            transition: all 0.2s;
        }
        .shop-tab.active {
            background: #8D6E63;
            color: #fff;
        }
        .shop-item {
            background: #f5f5f5;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 15px;
            cursor: pointer;
            transition: all 0.2s;
            border: 2px solid transparent;
        }
        .shop-item:hover { background: #eeeeee; border-color: #8D6E63; }
        .shop-item.owned { background: #C8E6C9; }
        .shop-item.equipped { background: #FFECB3; border-color: #FFC107; }
        .shop-item.disabled { opacity: 0.5; cursor: not-allowed; }
        .shop-item-icon { font-size: 2rem; }
        .shop-item-info { flex: 1; }
        .shop-item-name { font-weight: bold; color: #5D4037; }
        .shop-item-desc { font-size: 0.8rem; color: #888; }
        .shop-item-effect { font-size: 0.85rem; color: #4CAF50; }
        .shop-item-cost {
            background: #FFD700;
            color: #5D4037;
            padding: 5px 12px;
            border-radius: 15px;
            font-weight: bold;
            font-size: 0.9rem;
        }
        .shop-item-count {
            background: #8D6E63;
            color: #fff;
            padding: 3px 10px;
            border-radius: 10px;
            font-size: 0.85rem;
        }

        /* Achievements */
        .achievements {
            background: rgba(255,255,255,0.9);
            border-radius: 20px;
            padding: 20px;
            min-width: 280px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
        }
        .achievements h2 {
            color: #5D4037;
            margin-bottom: 15px;
            text-align: center;
            font-size: 1.3rem;
        }
        .achievement {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px;
            background: #f5f5f5;
            border-radius: 10px;
            margin-bottom: 8px;
            opacity: 0.4;
        }
        .achievement.unlocked { opacity: 1; background: #FFF9C4; }
        .achievement-icon { font-size: 1.5rem; }
        .achievement-info { flex: 1; }
        .achievement-name { font-weight: bold; color: #5D4037; font-size: 0.9rem; }
        .achievement-desc { color: #888; font-size: 0.75rem; }

        /* Orange friends floating */
        .orange-friend {
            position: fixed;
            font-size: 2rem;
            animation: float 3s ease-in-out infinite;
            pointer-events: none;
            z-index: 5;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(-5deg); }
            50% { transform: translateY(-15px) rotate(5deg); }
        }

        /* Notification */
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #4CAF50;
            color: #fff;
            padding: 15px 25px;
            border-radius: 15px;
            font-weight: bold;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
            animation: slideIn 0.3s ease-out;
            z-index: 1000;
        }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        /* Prestige button */
        .prestige-btn {
            margin-top: 20px;
            padding: 12px 25px;
            background: linear-gradient(135deg, #9C27B0, #673AB7);
            color: #fff;
            border: none;
            border-radius: 15px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(156, 39, 176, 0.4);
            transition: all 0.2s;
        }
        .prestige-btn:hover { transform: scale(1.05); }
        .prestige-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        /* Water splash particles */
        .splash {
            position: absolute;
            width: 10px;
            height: 10px;
            background: #4FC3F7;
            border-radius: 50%;
            pointer-events: none;
            animation: splash 0.6s ease-out forwards;
        }
        @keyframes splash {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(0); opacity: 0; }
        }

        /* Mobile responsive */
        @media (max-width: 900px) {
            .game-container { flex-direction: column; align-items: center; }
            .shop, .achievements { width: 100%; max-width: 350px; }
        }
    </style>
</head>
<body>
    <h1>🦫 Capybara Clicker</h1>
    <p class="subtitle">The chillest clicker game ever</p>

    <div class="stats">
        <div class="stat">
            <div class="stat-label">Chill Points</div>
            <div class="stat-value" id="points">0</div>
        </div>
        <div class="stat">
            <div class="stat-label">Per Click</div>
            <div class="stat-value" id="perClick">1</div>
        </div>
        <div class="stat">
            <div class="stat-label">Per Second</div>
            <div class="stat-value" id="perSecond">0</div>
            <div class="stat-rate" id="autoRate"></div>
        </div>
        <div class="stat">
            <div class="stat-label">Total Clicks</div>
            <div class="stat-value" id="totalClicks">0</div>
        </div>
    </div>

    <div class="game-container">
        <!-- Click Area -->
        <div class="click-area">
            <div id="capybara">
                <div class="hat-display" id="hatDisplay"></div>
                <canvas id="capyCanvas" width="250" height="250"></canvas>
            </div>
            <p style="color: #8D6E63; margin-top: 15px;">Click the capybara!</p>
            <button class="prestige-btn" id="prestigeBtn" disabled>
                ✨ Prestige (1M points)
            </button>
            <p id="prestigeInfo" style="color: #9C27B0; font-size: 0.85rem; margin-top: 10px;"></p>
        </div>

        <!-- Shop -->
        <div class="shop">
            <h2>🛒 Shop</h2>
            <div class="shop-tabs">
                <button class="shop-tab active" data-tab="upgrades">Upgrades</button>
                <button class="shop-tab" data-tab="hats">Hats</button>
                <button class="shop-tab" data-tab="friends">Friends</button>
            </div>
            <div id="shopContent"></div>
        </div>

        <!-- Achievements -->
        <div class="achievements">
            <h2>🏆 Achievements</h2>
            <div id="achievementsList"></div>
        </div>
    </div>

    <script>
        // ============================================
        // GAME DATA
        // ============================================
        const UPGRADES = [
            { id: 'click1', name: 'Better Vibes', desc: 'More chill per click', effect: '+1 per click', cost: 15, clickBonus: 1 },
            { id: 'click2', name: 'Relaxation Master', desc: 'Even more chill', effect: '+5 per click', cost: 100, clickBonus: 5 },
            { id: 'click3', name: 'Zen Mode', desc: 'Maximum chill', effect: '+25 per click', cost: 1000, clickBonus: 25 },
            { id: 'click4', name: 'Enlightenment', desc: 'Transcend chillness', effect: '+100 per click', cost: 10000, clickBonus: 100 },
            { id: 'click5', name: 'Chill God', desc: 'Ultimate power', effect: '+500 per click', cost: 100000, clickBonus: 500 },
            { id: 'mult1', name: 'Double Chill', desc: 'Multiply your vibes', effect: 'x2 all points', cost: 5000, multiplier: 2 },
            { id: 'mult2', name: 'Triple Chill', desc: 'Even more multiplication', effect: 'x3 all points', cost: 50000, multiplier: 3 },
            { id: 'crit1', name: 'Lucky Capybara', desc: '10% chance for 5x', effect: 'Critical clicks!', cost: 2500, critChance: 0.1 },
        ];

        const FRIENDS = [
            { id: 'orange1', name: 'Orange Friend', desc: 'An orange that loves capybaras', effect: '+1/sec', cost: 50, perSec: 1, icon: '🍊' },
            { id: 'duck1', name: 'Duck Buddy', desc: 'Quack quack!', effect: '+5/sec', cost: 300, perSec: 5, icon: '🦆' },
            { id: 'turtle1', name: 'Turtle Pal', desc: 'Slow and steady', effect: '+20/sec', cost: 1500, perSec: 20, icon: '🐢' },
            { id: 'bird1', name: 'Bird Friend', desc: 'Sits on capybara head', effect: '+50/sec', cost: 5000, perSec: 50, icon: '🐦' },
            { id: 'cat1', name: 'Cat Companion', desc: 'Unlikely friendship', effect: '+150/sec', cost: 20000, perSec: 150, icon: '🐱' },
            { id: 'monkey1', name: 'Monkey Mate', desc: 'Grooming buddies', effect: '+500/sec', cost: 75000, perSec: 500, icon: '🐒' },
            { id: 'croc1', name: 'Croc Friend', desc: 'Dangerous but chill', effect: '+2000/sec', cost: 300000, perSec: 2000, icon: '🐊' },
        ];

        const HATS = [
            { id: 'none', name: 'No Hat', desc: 'Natural capybara', icon: '', cost: 0 },
            { id: 'flower', name: 'Flower Crown', desc: 'Pretty and peaceful', icon: '🌸', cost: 100 },
            { id: 'orange', name: 'Orange Hat', desc: 'The classic look', icon: '🍊', cost: 250 },
            { id: 'crown', name: 'Royal Crown', desc: 'King of chill', icon: '👑', cost: 1000 },
            { id: 'party', name: 'Party Hat', desc: 'Celebration time!', icon: '🎉', cost: 2500 },
            { id: 'cowboy', name: 'Cowboy Hat', desc: 'Yeehaw!', icon: '🤠', cost: 5000 },
            { id: 'chef', name: 'Chef Hat', desc: 'Cooking up vibes', icon: '👨‍🍳', cost: 10000 },
            { id: 'wizard', name: 'Wizard Hat', desc: 'Magical capybara', icon: '🧙', cost: 25000 },
            { id: 'astronaut', name: 'Space Helmet', desc: 'To infinity!', icon: '👨‍🚀', cost: 100000 },
        ];

        const ACHIEVEMENTS = [
            { id: 'click10', name: 'First Steps', desc: 'Click 10 times', icon: '👆', check: s => s.totalClicks >= 10 },
            { id: 'click100', name: 'Getting Started', desc: 'Click 100 times', icon: '✌️', check: s => s.totalClicks >= 100 },
            { id: 'click1000', name: 'Dedicated Clicker', desc: 'Click 1,000 times', icon: '💪', check: s => s.totalClicks >= 1000 },
            { id: 'click10000', name: 'Click Master', desc: 'Click 10,000 times', icon: '🏆', check: s => s.totalClicks >= 10000 },
            { id: 'points1000', name: 'Thousand Chills', desc: 'Earn 1,000 points', icon: '💰', check: s => s.totalEarned >= 1000 },
            { id: 'points100000', name: 'Chill Millionaire', desc: 'Earn 100,000 points', icon: '💎', check: s => s.totalEarned >= 100000 },
            { id: 'points1000000', name: 'Chill Billionaire', desc: 'Earn 1,000,000 points', icon: '🌟', check: s => s.totalEarned >= 1000000 },
            { id: 'friend1', name: 'First Friend', desc: 'Buy your first friend', icon: '🤝', check: s => Object.values(s.friends).some(v => v > 0) },
            { id: 'friend10', name: 'Popular Capybara', desc: 'Have 10 total friends', icon: '👥', check: s => Object.values(s.friends).reduce((a,b) => a+b, 0) >= 10 },
            { id: 'hat1', name: 'Fashion Forward', desc: 'Buy a hat', icon: '🎩', check: s => s.ownedHats.length > 1 },
            { id: 'prestige1', name: 'Rebirth', desc: 'Prestige once', icon: '✨', check: s => s.prestiges >= 1 },
            { id: 'crit1', name: 'Lucky!', desc: 'Get a critical click', icon: '🍀', check: s => s.critHits >= 1 },
        ];

        // ============================================
        // GAME STATE
        // ============================================
        let state = {
            points: 0,
            totalEarned: 0,
            totalClicks: 0,
            critHits: 0,
            clickPower: 1,
            multiplier: 1,
            critChance: 0,
            perSecond: 0,
            upgrades: {},
            friends: {},
            ownedHats: ['none'],
            equippedHat: 'none',
            achievements: [],
            prestiges: 0,
            prestigeBonus: 1
        };

        // ============================================
        // DOM ELEMENTS
        // ============================================
        const pointsEl = document.getElementById('points');
        const perClickEl = document.getElementById('perClick');
        const perSecondEl = document.getElementById('perSecond');
        const totalClicksEl = document.getElementById('totalClicks');
        const shopContent = document.getElementById('shopContent');
        const hatDisplay = document.getElementById('hatDisplay');
        const achievementsList = document.getElementById('achievementsList');
        const prestigeBtn = document.getElementById('prestigeBtn');
        const prestigeInfo = document.getElementById('prestigeInfo');
        const capyCanvas = document.getElementById('capyCanvas');
        const capyCtx = capyCanvas.getContext('2d');

        let currentTab = 'upgrades';
        let floatingFriends = [];

        // ============================================
        // DRAWING THE CAPYBARA
        // ============================================
        function drawCapybara() {
            const ctx = capyCtx;
            const w = capyCanvas.width;
            const h = capyCanvas.height;
            ctx.clearRect(0, 0, w, h);

            const cx = w / 2;
            const cy = h / 2 + 20;

            // Body (big oval)
            ctx.fillStyle = '#8B7355';
            ctx.beginPath();
            ctx.ellipse(cx, cy + 20, 70, 45, 0, 0, Math.PI * 2);
            ctx.fill();

            // Head
            ctx.fillStyle = '#9C8565';
            ctx.beginPath();
            ctx.ellipse(cx, cy - 30, 50, 40, 0, 0, Math.PI * 2);
            ctx.fill();

            // Snout
            ctx.fillStyle = '#A08060';
            ctx.beginPath();
            ctx.ellipse(cx, cy - 5, 30, 22, 0, 0, Math.PI * 2);
            ctx.fill();

            // Nose
            ctx.fillStyle = '#5D4037';
            ctx.beginPath();
            ctx.ellipse(cx, cy - 15, 12, 8, 0, 0, Math.PI * 2);
            ctx.fill();

            // Nostrils
            ctx.fillStyle = '#3E2723';
            ctx.beginPath();
            ctx.ellipse(cx - 5, cy - 15, 3, 2, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.ellipse(cx + 5, cy - 15, 3, 2, 0, 0, Math.PI * 2);
            ctx.fill();

            // Eyes
            ctx.fillStyle = '#000';
            ctx.beginPath();
            ctx.arc(cx - 20, cy - 45, 8, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(cx + 20, cy - 45, 8, 0, Math.PI * 2);
            ctx.fill();

            // Eye shine
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.arc(cx - 18, cy - 47, 3, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(cx + 22, cy - 47, 3, 0, Math.PI * 2);
            ctx.fill();

            // Ears
            ctx.fillStyle = '#8B7355';
            ctx.beginPath();
            ctx.ellipse(cx - 40, cy - 55, 12, 8, -0.5, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.ellipse(cx + 40, cy - 55, 12, 8, 0.5, 0, Math.PI * 2);
            ctx.fill();

            // Inner ears
            ctx.fillStyle = '#D7CCC8';
            ctx.beginPath();
            ctx.ellipse(cx - 40, cy - 55, 6, 4, -0.5, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.ellipse(cx + 40, cy - 55, 6, 4, 0.5, 0, Math.PI * 2);
            ctx.fill();

            // Legs
            ctx.fillStyle = '#7A6550';
            ctx.fillRect(cx - 50, cy + 50, 25, 30);
            ctx.fillRect(cx + 25, cy + 50, 25, 30);
            ctx.fillRect(cx - 35, cy + 55, 20, 25);
            ctx.fillRect(cx + 15, cy + 55, 20, 25);

            // Cute blush
            ctx.fillStyle = 'rgba(255, 150, 150, 0.4)';
            ctx.beginPath();
            ctx.ellipse(cx - 35, cy - 25, 12, 6, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.ellipse(cx + 35, cy - 25, 12, 6, 0, 0, Math.PI * 2);
            ctx.fill();

            // Smile
            ctx.strokeStyle = '#5D4037';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(cx, cy - 5, 15, 0.2, Math.PI - 0.2);
            ctx.stroke();
        }

        // ============================================
        // GAME LOGIC
        // ============================================
        function formatNumber(n) {
            if (n >= 1000000000) return (n / 1000000000).toFixed(1) + 'B';
            if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M';
            if (n >= 1000) return (n / 1000).toFixed(1) + 'K';
            return Math.floor(n).toString();
        }

        function calculateClickPower() {
            let power = 1;
            UPGRADES.forEach(u => {
                if (u.clickBonus && state.upgrades[u.id]) {
                    power += u.clickBonus * state.upgrades[u.id];
                }
            });
            return power;
        }

        function calculateMultiplier() {
            let mult = state.prestigeBonus;
            UPGRADES.forEach(u => {
                if (u.multiplier && state.upgrades[u.id]) {
                    mult *= u.multiplier;
                }
            });
            return mult;
        }

        function calculateCritChance() {
            let crit = 0;
            UPGRADES.forEach(u => {
                if (u.critChance && state.upgrades[u.id]) {
                    crit += u.critChance;
                }
            });
            return Math.min(crit, 0.5);
        }

        function calculatePerSecond() {
            let ps = 0;
            FRIENDS.forEach(f => {
                if (state.friends[f.id]) {
                    ps += f.perSec * state.friends[f.id];
                }
            });
            return ps * state.multiplier;
        }

        function updateStats() {
            state.clickPower = calculateClickPower();
            state.multiplier = calculateMultiplier();
            state.critChance = calculateCritChance();
            state.perSecond = calculatePerSecond();

            pointsEl.textContent = formatNumber(state.points);
            perClickEl.textContent = formatNumber(state.clickPower * state.multiplier);
            perSecondEl.textContent = formatNumber(state.perSecond);
            totalClicksEl.textContent = formatNumber(state.totalClicks);

            // Update hat display
            const hat = HATS.find(h => h.id === state.equippedHat);
            hatDisplay.textContent = hat ? hat.icon : '';

            // Prestige button
            prestigeBtn.disabled = state.points < 1000000;
            const nextBonus = (state.prestiges + 1) * 0.5 + 1;
            prestigeInfo.textContent = state.prestiges > 0
                ? `Prestige bonus: x${state.prestigeBonus.toFixed(1)} | Next: x${nextBonus.toFixed(1)}`
                : 'Reach 1M points to prestige!';
        }

        function click(e) {
            state.totalClicks++;

            let amount = state.clickPower * state.multiplier;
            let isCrit = false;

            // Critical hit check
            if (Math.random() < state.critChance) {
                amount *= 5;
                isCrit = true;
                state.critHits++;
            }

            state.points += amount;
            state.totalEarned += amount;

            // Spawn floating text
            spawnClickText(e, amount, isCrit);
            spawnSplash(e);

            updateStats();
            checkAchievements();
            saveGame();
        }

        function spawnClickText(e, amount, isCrit) {
            const rect = capyCanvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            const text = document.createElement('div');
            text.className = 'click-text';
            text.textContent = (isCrit ? '🌟 ' : '+') + formatNumber(amount);
            text.style.left = x + 'px';
            text.style.top = y + 'px';
            text.style.fontSize = isCrit ? '1.5rem' : '1rem';
            text.style.color = isCrit ? '#FFD700' : '#4CAF50';

            document.querySelector('.click-area').appendChild(text);
            setTimeout(() => text.remove(), 1000);
        }

        function spawnSplash(e) {
            const rect = capyCanvas.getBoundingClientRect();
            for (let i = 0; i < 5; i++) {
                const splash = document.createElement('div');
                splash.className = 'splash';
                splash.style.left = (e.clientX - rect.left + (Math.random() - 0.5) * 40) + 'px';
                splash.style.top = (e.clientY - rect.top + (Math.random() - 0.5) * 40) + 'px';
                document.querySelector('.click-area').appendChild(splash);
                setTimeout(() => splash.remove(), 600);
            }
        }

        // ============================================
        // SHOP
        // ============================================
        function renderShop() {
            shopContent.innerHTML = '';

            if (currentTab === 'upgrades') {
                UPGRADES.forEach(u => {
                    const owned = state.upgrades[u.id] || 0;
                    const cost = Math.floor(u.cost * Math.pow(1.5, owned));
                    const canAfford = state.points >= cost;

                    const item = document.createElement('div');
                    item.className = 'shop-item' + (canAfford ? '' : ' disabled');
                    item.innerHTML = `
                        <div class="shop-item-icon">⬆️</div>
                        <div class="shop-item-info">
                            <div class="shop-item-name">${u.name}</div>
                            <div class="shop-item-desc">${u.desc}</div>
                            <div class="shop-item-effect">${u.effect}</div>
                        </div>
                        <div class="shop-item-count">${owned}</div>
                        <div class="shop-item-cost">${formatNumber(cost)}</div>
                    `;
                    item.onclick = () => buyUpgrade(u, cost);
                    shopContent.appendChild(item);
                });
            } else if (currentTab === 'friends') {
                FRIENDS.forEach(f => {
                    const owned = state.friends[f.id] || 0;
                    const cost = Math.floor(f.cost * Math.pow(1.15, owned));
                    const canAfford = state.points >= cost;

                    const item = document.createElement('div');
                    item.className = 'shop-item' + (canAfford ? '' : ' disabled');
                    item.innerHTML = `
                        <div class="shop-item-icon">${f.icon}</div>
                        <div class="shop-item-info">
                            <div class="shop-item-name">${f.name}</div>
                            <div class="shop-item-desc">${f.desc}</div>
                            <div class="shop-item-effect">${f.effect}</div>
                        </div>
                        <div class="shop-item-count">${owned}</div>
                        <div class="shop-item-cost">${formatNumber(cost)}</div>
                    `;
                    item.onclick = () => buyFriend(f, cost);
                    shopContent.appendChild(item);
                });
            } else if (currentTab === 'hats') {
                HATS.forEach(h => {
                    const owned = state.ownedHats.includes(h.id);
                    const equipped = state.equippedHat === h.id;
                    const canAfford = state.points >= h.cost;

                    const item = document.createElement('div');
                    item.className = 'shop-item' +
                        (equipped ? ' equipped' : owned ? ' owned' : !canAfford ? ' disabled' : '');
                    item.innerHTML = `
                        <div class="shop-item-icon">${h.icon || '❌'}</div>
                        <div class="shop-item-info">
                            <div class="shop-item-name">${h.name}</div>
                            <div class="shop-item-desc">${h.desc}</div>
                        </div>
                        ${owned
                            ? `<div class="shop-item-count">${equipped ? 'Worn' : 'Owned'}</div>`
                            : `<div class="shop-item-cost">${formatNumber(h.cost)}</div>`
                        }
                    `;
                    item.onclick = () => owned ? equipHat(h) : buyHat(h);
                    shopContent.appendChild(item);
                });
            }
        }

        function buyUpgrade(u, cost) {
            if (state.points < cost) return;
            state.points -= cost;
            state.upgrades[u.id] = (state.upgrades[u.id] || 0) + 1;
            updateStats();
            renderShop();
            checkAchievements();
            saveGame();
        }

        function buyFriend(f, cost) {
            if (state.points < cost) return;
            state.points -= cost;
            state.friends[f.id] = (state.friends[f.id] || 0) + 1;
            spawnFloatingFriend(f);
            updateStats();
            renderShop();
            checkAchievements();
            saveGame();
        }

        function buyHat(h) {
            if (state.points < h.cost) return;
            if (state.ownedHats.includes(h.id)) return;
            state.points -= h.cost;
            state.ownedHats.push(h.id);
            state.equippedHat = h.id;
            updateStats();
            renderShop();
            checkAchievements();
            saveGame();
        }

        function equipHat(h) {
            state.equippedHat = h.id;
            updateStats();
            renderShop();
            saveGame();
        }

        function spawnFloatingFriend(f) {
            const friend = document.createElement('div');
            friend.className = 'orange-friend';
            friend.textContent = f.icon;
            friend.style.left = Math.random() * (window.innerWidth - 50) + 'px';
            friend.style.top = Math.random() * (window.innerHeight - 50) + 'px';
            friend.style.animationDelay = Math.random() * 2 + 's';
            document.body.appendChild(friend);
            floatingFriends.push(friend);

            // Limit floating friends
            if (floatingFriends.length > 20) {
                floatingFriends[0].remove();
                floatingFriends.shift();
            }
        }

        // ============================================
        // ACHIEVEMENTS
        // ============================================
        function renderAchievements() {
            achievementsList.innerHTML = '';
            ACHIEVEMENTS.forEach(a => {
                const unlocked = state.achievements.includes(a.id);
                const div = document.createElement('div');
                div.className = 'achievement' + (unlocked ? ' unlocked' : '');
                div.innerHTML = `
                    <div class="achievement-icon">${a.icon}</div>
                    <div class="achievement-info">
                        <div class="achievement-name">${a.name}</div>
                        <div class="achievement-desc">${a.desc}</div>
                    </div>
                `;
                achievementsList.appendChild(div);
            });
        }

        function checkAchievements() {
            ACHIEVEMENTS.forEach(a => {
                if (!state.achievements.includes(a.id) && a.check(state)) {
                    state.achievements.push(a.id);
                    showNotification(`🏆 Achievement: ${a.name}!`);
                    renderAchievements();
                }
            });
        }

        function showNotification(text) {
            const notif = document.createElement('div');
            notif.className = 'notification';
            notif.textContent = text;
            document.body.appendChild(notif);
            setTimeout(() => notif.remove(), 3000);
        }

        // ============================================
        // PRESTIGE
        // ============================================
        function prestige() {
            if (state.points < 1000000) return;

            state.prestiges++;
            state.prestigeBonus = state.prestiges * 0.5 + 1;

            // Reset progress but keep prestige bonuses
            state.points = 0;
            state.totalClicks = 0;
            state.upgrades = {};
            state.friends = {};

            // Remove floating friends
            floatingFriends.forEach(f => f.remove());
            floatingFriends = [];

            showNotification(`✨ Prestige ${state.prestiges}! Bonus: x${state.prestigeBonus.toFixed(1)}`);

            updateStats();
            renderShop();
            saveGame();
        }

        // ============================================
        // AUTO GENERATION
        // ============================================
        function autoGenerate() {
            if (state.perSecond > 0) {
                const gain = state.perSecond / 20; // 50ms ticks
                state.points += gain;
                state.totalEarned += gain;
                updateStats();
            }
        }

        // ============================================
        // SAVE/LOAD
        // ============================================
        function saveGame() {
            localStorage.setItem('capybaraClicker', JSON.stringify(state));
        }

        function loadGame() {
            const saved = localStorage.getItem('capybaraClicker');
            if (saved) {
                const loaded = JSON.parse(saved);
                state = { ...state, ...loaded };

                // Recreate floating friends
                FRIENDS.forEach(f => {
                    const count = state.friends[f.id] || 0;
                    for (let i = 0; i < Math.min(count, 3); i++) {
                        spawnFloatingFriend(f);
                    }
                });
            }
        }

        // ============================================
        // INIT
        // ============================================
        function init() {
            loadGame();
            drawCapybara();
            updateStats();
            renderShop();
            renderAchievements();

            // Click handler
            document.getElementById('capybara').addEventListener('click', click);

            // Shop tabs
            document.querySelectorAll('.shop-tab').forEach(tab => {
                tab.addEventListener('click', () => {
                    document.querySelectorAll('.shop-tab').forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    currentTab = tab.dataset.tab;
                    renderShop();
                });
            });

            // Prestige button
            prestigeBtn.addEventListener('click', prestige);

            // Auto generation
            setInterval(autoGenerate, 50);

            // Auto save
            setInterval(saveGame, 10000);

            // Check achievements periodically
            setInterval(checkAchievements, 1000);
        }

        init();
    </script>
</body>
</html>
