<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Invaders - Learning Sandbox</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background: #000;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            overflow: hidden;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 5px;
            color: #0f0;
            text-shadow: 0 0 10px #0f0;
            letter-spacing: 4px;
        }

        .subtitle {
            color: #0a0;
            margin-bottom: 15px;
            font-size: 0.8rem;
        }

        /* Stats bar */
        .stats {
            display: flex;
            justify-content: space-between;
            width: 600px;
            max-width: 100%;
            margin-bottom: 10px;
            padding: 10px 20px;
            background: #111;
            border: 2px solid #0f0;
        }

        .stat {
            color: #0f0;
        }

        .stat-label {
            color: #080;
        }

        /* Game Canvas */
        #gameCanvas {
            border: 2px solid #0f0;
            background: #000;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.3);
        }

        /* Controls info */
        .controls {
            margin-top: 15px;
            color: #080;
            font-size: 0.8rem;
            text-align: center;
        }

        .controls span {
            color: #0f0;
            background: #111;
            padding: 3px 8px;
            border: 1px solid #0f0;
            margin: 0 5px;
        }

        /* Overlays */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .overlay.hidden {
            display: none;
        }

        .overlay h2 {
            font-size: 3rem;
            color: #0f0;
            text-shadow: 0 0 20px #0f0;
            margin-bottom: 20px;
        }

        .overlay .final-score {
            font-size: 1.5rem;
            color: #0f0;
            margin-bottom: 30px;
        }

        .overlay .high-score {
            color: #f00;
            margin-bottom: 30px;
        }

        .btn {
            padding: 15px 40px;
            font-size: 1.2rem;
            font-family: 'Courier New', monospace;
            background: transparent;
            color: #0f0;
            border: 2px solid #0f0;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.3s;
        }

        .btn:hover {
            background: #0f0;
            color: #000;
            box-shadow: 0 0 20px #0f0;
        }

        /* Start screen aliens */
        .start-aliens {
            font-size: 2rem;
            margin-bottom: 20px;
            animation: float 2s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* Mobile controls */
        .mobile-controls {
            display: none;
            gap: 20px;
            margin-top: 15px;
        }

        .mobile-btn {
            width: 70px;
            height: 70px;
            font-size: 2rem;
            background: #111;
            border: 2px solid #0f0;
            color: #0f0;
            border-radius: 10px;
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
        }

        .mobile-btn:active {
            background: #0f0;
            color: #000;
        }

        .fire-btn {
            width: 150px;
            background: #200;
            border-color: #f00;
            color: #f00;
        }

        .fire-btn:active {
            background: #f00;
            color: #000;
        }

        @media (max-width: 650px) {
            #gameCanvas {
                width: 100%;
                height: auto;
            }
            .stats {
                width: 100%;
            }
            .mobile-controls {
                display: flex;
            }
        }
    </style>
</head>
<body>
    <h1>SPACE INVADERS</h1>
    <p class="subtitle">DEFEND EARTH FROM THE ALIEN INVASION</p>

    <!-- Stats -->
    <div class="stats">
        <div class="stat">
            <span class="stat-label">SCORE:</span>
            <span id="score">0</span>
        </div>
        <div class="stat">
            <span class="stat-label">LIVES:</span>
            <span id="lives">3</span>
        </div>
        <div class="stat">
            <span class="stat-label">WAVE:</span>
            <span id="wave">1</span>
        </div>
        <div class="stat">
            <span class="stat-label">HIGH:</span>
            <span id="highScore">0</span>
        </div>
    </div>

    <!-- Game Canvas -->
    <canvas id="gameCanvas" width="600" height="500"></canvas>

    <!-- Controls -->
    <div class="controls">
        <span>←</span> <span>→</span> Move
        &nbsp;&nbsp;
        <span>SPACE</span> Fire
        &nbsp;&nbsp;
        <span>P</span> Pause
        &nbsp;&nbsp;
        <button id="soundBtn" style="background: #111; border: 1px solid #0f0; color: #0f0; padding: 3px 8px; cursor: pointer;">🔊</button>
    </div>

    <!-- Mobile Controls -->
    <div class="mobile-controls">
        <button class="mobile-btn" id="leftBtn">←</button>
        <button class="mobile-btn fire-btn" id="fireBtn">FIRE</button>
        <button class="mobile-btn" id="rightBtn">→</button>
    </div>

    <!-- Start Screen -->
    <div class="overlay" id="startScreen">
        <div class="start-aliens">👾 👾 👾 👾 👾</div>
        <h2>SPACE INVADERS</h2>
        <p style="color: #0f0; margin-bottom: 30px;">Destroy all aliens before they reach Earth!</p>
        <button class="btn" id="startBtn">START GAME</button>
    </div>

    <!-- Game Over Screen -->
    <div class="overlay hidden" id="gameOverScreen">
        <h2 id="gameOverTitle">GAME OVER</h2>
        <div class="final-score">SCORE: <span id="finalScore">0</span></div>
        <div class="high-score">HIGH SCORE: <span id="finalHighScore">0</span></div>
        <button class="btn" id="restartBtn">PLAY AGAIN</button>
    </div>

    <script>
        // ============================================
        // AUDIO SYSTEM
        // ============================================
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx = null;
        let soundEnabled = true;

        function initAudio() {
            if (!audioCtx) audioCtx = new AudioContext();
        }

        function playSound(type) {
            if (!soundEnabled || !audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            const now = audioCtx.currentTime;

            if (type === 'shoot') {
                osc.type = 'square';
                osc.frequency.setValueAtTime(600, now);
                osc.frequency.exponentialRampToValueAtTime(200, now + 0.1);
                gain.gain.setValueAtTime(0.15, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                osc.start(now);
                osc.stop(now + 0.1);
            } else if (type === 'explosion') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(200, now);
                osc.frequency.exponentialRampToValueAtTime(50, now + 0.2);
                gain.gain.setValueAtTime(0.2, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
                osc.start(now);
                osc.stop(now + 0.2);
            } else if (type === 'hit') {
                osc.type = 'square';
                osc.frequency.setValueAtTime(150, now);
                osc.frequency.exponentialRampToValueAtTime(50, now + 0.3);
                gain.gain.setValueAtTime(0.25, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                osc.start(now);
                osc.stop(now + 0.3);
            } else if (type === 'bossHit') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(100, now);
                osc.frequency.exponentialRampToValueAtTime(300, now + 0.1);
                gain.gain.setValueAtTime(0.3, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
                osc.start(now);
                osc.stop(now + 0.15);
            } else if (type === 'bossExplode') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(300, now);
                osc.frequency.exponentialRampToValueAtTime(30, now + 0.8);
                gain.gain.setValueAtTime(0.3, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.8);
                osc.start(now);
                osc.stop(now + 0.8);
            } else if (type === 'gameOver') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(300, now);
                osc.frequency.exponentialRampToValueAtTime(80, now + 0.6);
                gain.gain.setValueAtTime(0.2, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.6);
                osc.start(now);
                osc.stop(now + 0.6);
            }
        }

        // ============================================
        // CANVAS SETUP
        // ============================================
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // ============================================
        // GAME CONSTANTS
        // ============================================
        const PLAYER_WIDTH = 50;
        const PLAYER_HEIGHT = 20;
        const PLAYER_SPEED = 7;
        const BULLET_SPEED = 8;
        const BULLET_WIDTH = 4;
        const BULLET_HEIGHT = 15;
        const ALIEN_ROWS = 4;
        const ALIEN_COLS = 8;
        const ALIEN_WIDTH = 40;
        const ALIEN_HEIGHT = 30;
        const ALIEN_PADDING = 15;
        const ALIEN_START_Y = 60;

        // ============================================
        // GAME STATE
        // ============================================
        let gameRunning = false;
        let gamePaused = false;
        let score = 0;
        let lives = 3;
        let wave = 1;
        let highScore = localStorage.getItem('spaceInvadersHigh') || 0;

        // Boss
        let boss = null;
        let bossActive = false;
        const BOSS_WAVE_INTERVAL = 3; // Boss every 3 waves

        // Player
        let player = {
            x: canvas.width / 2 - PLAYER_WIDTH / 2,
            y: canvas.height - 40,
            width: PLAYER_WIDTH,
            height: PLAYER_HEIGHT,
            speed: PLAYER_SPEED,
            movingLeft: false,
            movingRight: false
        };

        // Bullets
        let bullets = [];
        let alienBullets = [];
        let canShoot = true;
        let shootCooldown = 300;

        // Aliens
        let aliens = [];
        let alienDirection = 1;
        let alienSpeed = 1;
        let alienDropAmount = 20;
        let alienShootChance = 0.005;

        // DOM Elements
        const scoreDisplay = document.getElementById('score');
        const livesDisplay = document.getElementById('lives');
        const waveDisplay = document.getElementById('wave');
        const highScoreDisplay = document.getElementById('highScore');
        const startScreen = document.getElementById('startScreen');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const gameOverTitle = document.getElementById('gameOverTitle');
        const finalScoreDisplay = document.getElementById('finalScore');
        const finalHighScoreDisplay = document.getElementById('finalHighScore');

        highScoreDisplay.textContent = highScore;

        // ============================================
        // INITIALIZE ALIENS
        // ============================================
        function createAliens() {
            aliens = [];
            const totalWidth = ALIEN_COLS * (ALIEN_WIDTH + ALIEN_PADDING) - ALIEN_PADDING;
            const startX = (canvas.width - totalWidth) / 2;

            for (let row = 0; row < ALIEN_ROWS; row++) {
                for (let col = 0; col < ALIEN_COLS; col++) {
                    aliens.push({
                        x: startX + col * (ALIEN_WIDTH + ALIEN_PADDING),
                        y: ALIEN_START_Y + row * (ALIEN_HEIGHT + ALIEN_PADDING),
                        width: ALIEN_WIDTH,
                        height: ALIEN_HEIGHT,
                        alive: true,
                        type: row // Different types for different rows
                    });
                }
            }
        }

        // ============================================
        // BOSS FUNCTIONS
        // ============================================
        function createBoss() {
            boss = {
                x: canvas.width / 2 - 80,
                y: 40,
                width: 160,
                height: 60,
                health: 20 + wave * 5,
                maxHealth: 20 + wave * 5,
                direction: 1,
                speed: 2,
                shootTimer: 0,
                phase: 1
            };
            bossActive = true;
        }

        function drawBoss() {
            if (!boss) return;

            // Boss body (large menacing ship)
            const gradient = ctx.createLinearGradient(boss.x, boss.y, boss.x, boss.y + boss.height);
            gradient.addColorStop(0, '#f00');
            gradient.addColorStop(0.5, '#a00');
            gradient.addColorStop(1, '#600');
            ctx.fillStyle = gradient;

            // Main body
            ctx.fillRect(boss.x + 30, boss.y, boss.width - 60, boss.height);

            // Wings
            ctx.fillRect(boss.x, boss.y + 15, 40, 30);
            ctx.fillRect(boss.x + boss.width - 40, boss.y + 15, 40, 30);

            // Cockpit
            ctx.fillStyle = '#ff0';
            ctx.fillRect(boss.x + boss.width/2 - 15, boss.y + 10, 30, 20);

            // Cannons
            ctx.fillStyle = '#f00';
            ctx.fillRect(boss.x + 20, boss.y + boss.height - 10, 15, 15);
            ctx.fillRect(boss.x + boss.width - 35, boss.y + boss.height - 10, 15, 15);
            ctx.fillRect(boss.x + boss.width/2 - 7, boss.y + boss.height - 5, 14, 10);

            // Health bar
            ctx.fillStyle = '#333';
            ctx.fillRect(boss.x, boss.y - 15, boss.width, 10);
            ctx.fillStyle = boss.health > boss.maxHealth * 0.3 ? '#0f0' : '#f00';
            ctx.fillRect(boss.x, boss.y - 15, boss.width * (boss.health / boss.maxHealth), 10);

            // Boss label
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 12px Courier New';
            ctx.textAlign = 'center';
            ctx.fillText('BOSS', boss.x + boss.width/2, boss.y - 20);
        }

        function updateBoss() {
            if (!boss) return;

            // Move side to side
            boss.x += boss.speed * boss.direction;
            if (boss.x <= 10 || boss.x + boss.width >= canvas.width - 10) {
                boss.direction *= -1;
            }

            // Shooting patterns
            boss.shootTimer++;
            const shootRate = boss.health < boss.maxHealth * 0.5 ? 20 : 40; // Faster when damaged

            if (boss.shootTimer >= shootRate) {
                boss.shootTimer = 0;

                // Different attack patterns based on health
                if (boss.health > boss.maxHealth * 0.5) {
                    // Phase 1: Single shots from cannons
                    alienBullets.push({ x: boss.x + 27, y: boss.y + boss.height });
                    alienBullets.push({ x: boss.x + boss.width - 28, y: boss.y + boss.height });
                } else {
                    // Phase 2: Triple shot spread
                    alienBullets.push({ x: boss.x + boss.width/2 - 2, y: boss.y + boss.height, dx: 0 });
                    alienBullets.push({ x: boss.x + 27, y: boss.y + boss.height, dx: -1 });
                    alienBullets.push({ x: boss.x + boss.width - 28, y: boss.y + boss.height, dx: 1 });
                }
            }
        }

        // ============================================
        // DRAWING FUNCTIONS
        // ============================================
        function drawPlayer() {
            ctx.fillStyle = '#0f0';

            // Ship body
            ctx.fillRect(player.x, player.y, player.width, player.height);

            // Ship cannon
            ctx.fillRect(player.x + player.width/2 - 4, player.y - 10, 8, 10);

            // Ship details
            ctx.fillStyle = '#080';
            ctx.fillRect(player.x + 5, player.y + 5, 10, 10);
            ctx.fillRect(player.x + player.width - 15, player.y + 5, 10, 10);
        }

        function drawAlien(alien) {
            if (!alien.alive) return;

            // Different colors for different rows
            const colors = ['#f00', '#f80', '#ff0', '#0ff'];
            ctx.fillStyle = colors[alien.type] || '#f00';

            // Alien body (pixelated style)
            const x = alien.x;
            const y = alien.y;
            const w = alien.width;
            const h = alien.height;

            // Main body
            ctx.fillRect(x + w*0.2, y, w*0.6, h*0.7);

            // Head bumps
            ctx.fillRect(x + w*0.1, y + h*0.1, w*0.2, h*0.3);
            ctx.fillRect(x + w*0.7, y + h*0.1, w*0.2, h*0.3);

            // Legs/tentacles
            ctx.fillRect(x, y + h*0.5, w*0.2, h*0.5);
            ctx.fillRect(x + w*0.8, y + h*0.5, w*0.2, h*0.5);
            ctx.fillRect(x + w*0.35, y + h*0.7, w*0.1, h*0.3);
            ctx.fillRect(x + w*0.55, y + h*0.7, w*0.1, h*0.3);

            // Eyes
            ctx.fillStyle = '#000';
            ctx.fillRect(x + w*0.3, y + h*0.25, w*0.15, h*0.15);
            ctx.fillRect(x + w*0.55, y + h*0.25, w*0.15, h*0.15);
        }

        function drawBullet(bullet, color = '#0f0') {
            ctx.fillStyle = color;
            ctx.fillRect(bullet.x, bullet.y, BULLET_WIDTH, BULLET_HEIGHT);

            // Glow effect
            ctx.shadowColor = color;
            ctx.shadowBlur = 10;
            ctx.fillRect(bullet.x, bullet.y, BULLET_WIDTH, BULLET_HEIGHT);
            ctx.shadowBlur = 0;
        }

        function drawExplosion(x, y) {
            ctx.fillStyle = '#ff0';
            ctx.beginPath();
            ctx.arc(x, y, 20, 0, Math.PI * 2);
            ctx.fill();
        }

        // ============================================
        // UPDATE FUNCTIONS
        // ============================================
        function updatePlayer() {
            if (player.movingLeft && player.x > 0) {
                player.x -= player.speed;
            }
            if (player.movingRight && player.x < canvas.width - player.width) {
                player.x += player.speed;
            }
        }

        function updateBullets() {
            // Player bullets
            bullets = bullets.filter(bullet => {
                bullet.y -= BULLET_SPEED;
                return bullet.y > -BULLET_HEIGHT;
            });

            // Alien bullets (some may have dx for spread shots)
            alienBullets = alienBullets.filter(bullet => {
                bullet.y += BULLET_SPEED * 0.6;
                if (bullet.dx) bullet.x += bullet.dx;
                return bullet.y < canvas.height && bullet.x > 0 && bullet.x < canvas.width;
            });
        }

        function updateAliens() {
            let hitEdge = false;
            let lowestAlien = 0;

            // Check if any alien hit the edge
            aliens.forEach(alien => {
                if (!alien.alive) return;

                if (alien.y + alien.height > lowestAlien) {
                    lowestAlien = alien.y + alien.height;
                }

                if (alienDirection === 1 && alien.x + alien.width >= canvas.width - 10) {
                    hitEdge = true;
                } else if (alienDirection === -1 && alien.x <= 10) {
                    hitEdge = true;
                }
            });

            // Move aliens
            if (hitEdge) {
                alienDirection *= -1;
                aliens.forEach(alien => {
                    alien.y += alienDropAmount;
                });
            } else {
                aliens.forEach(alien => {
                    alien.x += alienSpeed * alienDirection;
                });
            }

            // Check if aliens reached the bottom
            if (lowestAlien >= player.y - 20) {
                gameOver(false);
            }

            // Random alien shooting
            const aliveAliens = aliens.filter(a => a.alive);
            if (aliveAliens.length > 0 && Math.random() < alienShootChance * (1 + wave * 0.2)) {
                const shooter = aliveAliens[Math.floor(Math.random() * aliveAliens.length)];
                alienBullets.push({
                    x: shooter.x + shooter.width / 2 - BULLET_WIDTH / 2,
                    y: shooter.y + shooter.height
                });
            }
        }

        // ============================================
        // COLLISION DETECTION
        // ============================================
        function checkCollisions() {
            // Player bullets hitting aliens
            bullets.forEach((bullet, bulletIndex) => {
                aliens.forEach(alien => {
                    if (!alien.alive) return;

                    if (bullet.x < alien.x + alien.width &&
                        bullet.x + BULLET_WIDTH > alien.x &&
                        bullet.y < alien.y + alien.height &&
                        bullet.y + BULLET_HEIGHT > alien.y) {

                        // Hit!
                        alien.alive = false;
                        bullets.splice(bulletIndex, 1);
                        playSound('explosion');

                        // Score based on row (top rows worth more)
                        const points = (ALIEN_ROWS - alien.type) * 10;
                        score += points;
                        scoreDisplay.textContent = score;

                        // Speed up remaining aliens
                        const remaining = aliens.filter(a => a.alive).length;
                        alienSpeed = 1 + (ALIEN_ROWS * ALIEN_COLS - remaining) * 0.05;
                    }
                });

                // Player bullets hitting boss
                if (boss && bullet.x < boss.x + boss.width &&
                    bullet.x + BULLET_WIDTH > boss.x &&
                    bullet.y < boss.y + boss.height &&
                    bullet.y + BULLET_HEIGHT > boss.y) {

                    bullets.splice(bulletIndex, 1);
                    boss.health--;
                    playSound('bossHit');

                    if (boss.health <= 0) {
                        // Boss defeated!
                        playSound('bossExplode');
                        score += 500 * wave;
                        scoreDisplay.textContent = score;
                        boss = null;
                        bossActive = false;
                        nextWave();
                    }
                }
            });

            // Alien bullets hitting player
            alienBullets.forEach((bullet, index) => {
                if (bullet.x < player.x + player.width &&
                    bullet.x + BULLET_WIDTH > player.x &&
                    bullet.y < player.y + player.height &&
                    bullet.y + BULLET_HEIGHT > player.y) {

                    // Hit!
                    alienBullets.splice(index, 1);
                    lives--;
                    livesDisplay.textContent = lives;
                    playSound('hit');

                    if (lives <= 0) {
                        gameOver(false);
                    } else {
                        // Flash player
                        player.x = canvas.width / 2 - PLAYER_WIDTH / 2;
                    }
                }
            });

            // Check if all aliens destroyed (only when not in boss fight)
            if (!bossActive && aliens.every(alien => !alien.alive)) {
                nextWave();
            }
        }

        // ============================================
        // GAME FLOW
        // ============================================
        function nextWave() {
            wave++;
            waveDisplay.textContent = wave;

            // Increase difficulty
            alienShootChance += 0.002;
            alienSpeed = 1 + wave * 0.2;

            // Clear bullets
            bullets = [];
            alienBullets = [];

            // Boss wave every BOSS_WAVE_INTERVAL waves
            if (wave % BOSS_WAVE_INTERVAL === 0) {
                createBoss();
                aliens = []; // No regular aliens during boss fight
            } else {
                // Create new aliens
                createAliens();
            }
        }

        function gameOver(won) {
            gameRunning = false;
            boss = null;
            bossActive = false;
            playSound('gameOver');

            // Update high score
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('spaceInvadersHigh', highScore);
                highScoreDisplay.textContent = highScore;
            }

            // Show game over screen
            gameOverTitle.textContent = won ? 'VICTORY!' : 'GAME OVER';
            gameOverTitle.style.color = won ? '#0f0' : '#f00';
            finalScoreDisplay.textContent = score;
            finalHighScoreDisplay.textContent = highScore;
            gameOverScreen.classList.remove('hidden');
        }

        function startGame() {
            initAudio();

            // Reset everything
            score = 0;
            lives = 3;
            wave = 1;
            alienSpeed = 1;
            alienShootChance = 0.005;
            bullets = [];
            alienBullets = [];
            boss = null;
            bossActive = false;
            gamePaused = false;

            player.x = canvas.width / 2 - PLAYER_WIDTH / 2;

            scoreDisplay.textContent = score;
            livesDisplay.textContent = lives;
            waveDisplay.textContent = wave;

            createAliens();

            startScreen.classList.add('hidden');
            gameOverScreen.classList.add('hidden');
            gameRunning = true;

            gameLoop();
        }

        // ============================================
        // SHOOTING
        // ============================================
        function shoot() {
            if (!canShoot || !gameRunning || gamePaused) return;

            bullets.push({
                x: player.x + player.width / 2 - BULLET_WIDTH / 2,
                y: player.y - BULLET_HEIGHT
            });
            playSound('shoot');

            canShoot = false;
            setTimeout(() => canShoot = true, shootCooldown);
        }

        // ============================================
        // PAUSE
        // ============================================
        function togglePause() {
            if (!gameRunning) return;
            gamePaused = !gamePaused;
        }

        // ============================================
        // GAME LOOP
        // ============================================
        function gameLoop() {
            if (!gameRunning) return;

            // Clear canvas
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw starfield background
            ctx.fillStyle = '#333';
            for (let i = 0; i < 50; i++) {
                const x = (i * 73) % canvas.width;
                const y = (i * 47 + Date.now() * 0.02) % canvas.height;
                ctx.fillRect(x, y, 2, 2);
            }

            if (!gamePaused) {
                // Update
                updatePlayer();
                updateBullets();
                updateAliens();
                if (bossActive) updateBoss();
                checkCollisions();
            }

            // Draw
            drawPlayer();
            aliens.forEach(drawAlien);
            if (bossActive) drawBoss();
            bullets.forEach(b => drawBullet(b, '#0f0'));
            alienBullets.forEach(b => drawBullet(b, '#f00'));

            // Pause overlay
            if (gamePaused) {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#0f0';
                ctx.font = 'bold 40px Courier New';
                ctx.textAlign = 'center';
                ctx.fillText('PAUSED', canvas.width/2, canvas.height/2);
                ctx.font = '16px Courier New';
                ctx.fillText('Press P to resume', canvas.width/2, canvas.height/2 + 30);
            }

            requestAnimationFrame(gameLoop);
        }

        // ============================================
        // INPUT HANDLING
        // ============================================
        document.addEventListener('keydown', (e) => {
            if (e.code === 'ArrowLeft' || e.code === 'KeyA') {
                player.movingLeft = true;
            }
            if (e.code === 'ArrowRight' || e.code === 'KeyD') {
                player.movingRight = true;
            }
            if (e.code === 'Space') {
                e.preventDefault();
                shoot();
            }
            if (e.code === 'KeyP' || e.code === 'Escape') {
                togglePause();
            }
        });

        document.addEventListener('keyup', (e) => {
            if (e.code === 'ArrowLeft' || e.code === 'KeyA') {
                player.movingLeft = false;
            }
            if (e.code === 'ArrowRight' || e.code === 'KeyD') {
                player.movingRight = false;
            }
        });

        // Mobile controls
        document.getElementById('leftBtn').addEventListener('touchstart', (e) => {
            e.preventDefault();
            player.movingLeft = true;
        });
        document.getElementById('leftBtn').addEventListener('touchend', () => {
            player.movingLeft = false;
        });
        document.getElementById('rightBtn').addEventListener('touchstart', (e) => {
            e.preventDefault();
            player.movingRight = true;
        });
        document.getElementById('rightBtn').addEventListener('touchend', () => {
            player.movingRight = false;
        });
        document.getElementById('fireBtn').addEventListener('touchstart', (e) => {
            e.preventDefault();
            shoot();
        });

        // Start/Restart buttons
        document.getElementById('startBtn').addEventListener('click', startGame);
        document.getElementById('restartBtn').addEventListener('click', startGame);

        // Sound toggle
        document.getElementById('soundBtn').addEventListener('click', () => {
            soundEnabled = !soundEnabled;
            document.getElementById('soundBtn').textContent = soundEnabled ? '🔊' : '🔇';
        });
    </script>
</body>
</html>
