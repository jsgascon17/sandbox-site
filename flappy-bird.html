<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flappy Bird - Learning Sandbox</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background: linear-gradient(to bottom, #4EC0CA 0%, #4EC0CA 60%, #DED895 60%, #DED895 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow: hidden;
        }

        h1 {
            font-size: 2rem;
            color: #fff;
            text-shadow: 3px 3px 0 #543847;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        .score-display {
            font-size: 1.5rem;
            color: #fff;
            text-shadow: 2px 2px 0 #543847;
            margin-bottom: 10px;
        }

        #gameCanvas {
            border: 4px solid #543847;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            cursor: pointer;
        }

        .instructions {
            margin-top: 15px;
            color: #543847;
            font-size: 0.9rem;
            text-align: center;
        }

        .instructions span {
            background: #fff;
            padding: 5px 15px;
            border-radius: 5px;
            border: 2px solid #543847;
        }

        /* Overlays */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .overlay.hidden {
            display: none;
        }

        .overlay h2 {
            font-size: 3rem;
            color: #FFD700;
            text-shadow: 3px 3px 0 #543847;
            margin-bottom: 20px;
        }

        .overlay p {
            color: #fff;
            margin-bottom: 15px;
            font-size: 1.2rem;
        }

        .overlay .final-score {
            font-size: 4rem;
            color: #fff;
            margin-bottom: 10px;
        }

        .overlay .high-score {
            color: #FFD700;
            margin-bottom: 30px;
            font-size: 1.2rem;
        }

        .overlay .bird-icon {
            font-size: 4rem;
            margin-bottom: 20px;
            animation: bounce 0.5s ease-in-out infinite alternate;
        }

        @keyframes bounce {
            from { transform: translateY(0); }
            to { transform: translateY(-15px); }
        }

        .btn {
            padding: 15px 40px;
            font-size: 1.2rem;
            font-family: 'Courier New', monospace;
            background: linear-gradient(to bottom, #8BC34A, #689F38);
            color: #fff;
            border: 3px solid #33691E;
            border-radius: 10px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 5px 0 #33691E;
            transition: all 0.1s;
        }

        .btn:hover {
            transform: translateY(2px);
            box-shadow: 0 3px 0 #33691E;
        }

        .btn:active {
            transform: translateY(5px);
            box-shadow: none;
        }

        .medal {
            font-size: 3rem;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <h1>FLAPPY BIRD</h1>
    <div class="score-display">Score: <span id="score">0</span> | Best: <span id="highScore">0</span></div>

    <canvas id="gameCanvas" width="400" height="600"></canvas>

    <div class="instructions">
        <span>SPACE</span> or <span>CLICK</span> to Flap | <span>P</span> Pause
        <button id="soundBtn" style="background: #543847; border: 2px solid #fff; color: #fff; padding: 3px 8px; border-radius: 5px; cursor: pointer; margin-left: 10px;">🔊</button>
    </div>

    <!-- Start Screen -->
    <div class="overlay" id="startScreen">
        <div class="bird-icon">🐤</div>
        <h2>FLAPPY BIRD</h2>
        <p>Tap to flap! Avoid the pipes!</p>
        <button class="btn" id="startBtn">START</button>
    </div>

    <!-- Game Over Screen -->
    <div class="overlay hidden" id="gameOverScreen">
        <h2 style="color: #ff6b6b;">GAME OVER</h2>
        <div class="medal" id="medal"></div>
        <div class="final-score" id="finalScore">0</div>
        <div class="high-score">BEST: <span id="finalHighScore">0</span></div>
        <button class="btn" id="restartBtn">TRY AGAIN</button>
    </div>

    <script>
        // ============================================
        // AUDIO SYSTEM
        // ============================================
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx = null;
        let soundEnabled = true;

        function initAudio() {
            if (!audioCtx) audioCtx = new AudioContext();
        }

        function playSound(type) {
            if (!soundEnabled || !audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            const now = audioCtx.currentTime;

            if (type === 'flap') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(400, now);
                osc.frequency.exponentialRampToValueAtTime(600, now + 0.08);
                gain.gain.setValueAtTime(0.15, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.08);
                osc.start(now); osc.stop(now + 0.08);
            } else if (type === 'score') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(600, now);
                osc.frequency.setValueAtTime(800, now + 0.1);
                gain.gain.setValueAtTime(0.15, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
                osc.start(now); osc.stop(now + 0.15);
            } else if (type === 'hit') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(200, now);
                osc.frequency.exponentialRampToValueAtTime(50, now + 0.3);
                gain.gain.setValueAtTime(0.2, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                osc.start(now); osc.stop(now + 0.3);
            }
        }

        // ============================================
        // CANVAS SETUP
        // ============================================
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // ============================================
        // GAME CONSTANTS
        // ============================================
        const GRAVITY = 0.5;
        const FLAP_POWER = -9;
        const PIPE_SPEED = 3;
        const PIPE_WIDTH = 70;
        const PIPE_GAP = 160;
        const PIPE_SPAWN_RATE = 100; // frames

        // ============================================
        // GAME STATE
        // ============================================
        let gameRunning = false;
        let gameStarted = false;
        let gamePaused = false;
        let score = 0;
        let highScore = localStorage.getItem('flappyHigh') || 0;
        let frameCount = 0;

        // Bird
        let bird = {
            x: 80,
            y: canvas.height / 2,
            width: 40,
            height: 30,
            velocity: 0,
            rotation: 0
        };

        // Pipes
        let pipes = [];

        // Ground
        const groundHeight = 100;
        let groundX = 0;

        // Clouds
        let clouds = [
            { x: 50, y: 80 },
            { x: 200, y: 120 },
            { x: 350, y: 60 }
        ];

        // DOM Elements
        const scoreDisplay = document.getElementById('score');
        const highScoreDisplay = document.getElementById('highScore');
        const startScreen = document.getElementById('startScreen');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const finalScoreDisplay = document.getElementById('finalScore');
        const finalHighScoreDisplay = document.getElementById('finalHighScore');
        const medalDisplay = document.getElementById('medal');

        highScoreDisplay.textContent = highScore;

        // ============================================
        // DRAWING FUNCTIONS
        // ============================================
        function drawBackground() {
            // Sky
            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height - groundHeight);
            gradient.addColorStop(0, '#4EC0CA');
            gradient.addColorStop(1, '#71C5CF');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height - groundHeight);

            // Clouds
            ctx.fillStyle = '#fff';
            clouds.forEach(cloud => {
                drawCloud(cloud.x, cloud.y);
            });
        }

        function drawCloud(x, y) {
            ctx.beginPath();
            ctx.arc(x, y, 20, 0, Math.PI * 2);
            ctx.arc(x + 20, y - 10, 25, 0, Math.PI * 2);
            ctx.arc(x + 45, y, 20, 0, Math.PI * 2);
            ctx.arc(x + 20, y + 5, 15, 0, Math.PI * 2);
            ctx.fill();
        }

        function drawGround() {
            // Ground base
            ctx.fillStyle = '#DED895';
            ctx.fillRect(0, canvas.height - groundHeight, canvas.width, groundHeight);

            // Grass top
            ctx.fillStyle = '#8BC34A';
            ctx.fillRect(0, canvas.height - groundHeight, canvas.width, 20);

            // Ground pattern
            ctx.fillStyle = '#C4B67A';
            for (let x = groundX % 40 - 40; x < canvas.width; x += 40) {
                ctx.fillRect(x, canvas.height - groundHeight + 25, 20, 10);
                ctx.fillRect(x + 20, canvas.height - groundHeight + 45, 20, 10);
            }
        }

        function drawBird() {
            ctx.save();
            ctx.translate(bird.x + bird.width / 2, bird.y + bird.height / 2);

            // Rotate based on velocity
            bird.rotation = Math.min(Math.PI / 4, Math.max(-Math.PI / 4, bird.velocity * 0.05));
            ctx.rotate(bird.rotation);

            // Body
            ctx.fillStyle = '#F7DC6F';
            ctx.beginPath();
            ctx.ellipse(0, 0, bird.width / 2, bird.height / 2, 0, 0, Math.PI * 2);
            ctx.fill();

            // Wing
            ctx.fillStyle = '#F4D03F';
            ctx.beginPath();
            const wingY = Math.sin(frameCount * 0.3) * 3;
            ctx.ellipse(-5, wingY, 12, 8, -0.3, 0, Math.PI * 2);
            ctx.fill();

            // Eye
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.arc(10, -5, 8, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = '#000';
            ctx.beginPath();
            ctx.arc(12, -5, 4, 0, Math.PI * 2);
            ctx.fill();

            // Beak
            ctx.fillStyle = '#E74C3C';
            ctx.beginPath();
            ctx.moveTo(18, 0);
            ctx.lineTo(28, 3);
            ctx.lineTo(18, 8);
            ctx.closePath();
            ctx.fill();

            ctx.restore();
        }

        function drawPipe(pipe) {
            const pipeColor = '#73BF2E';
            const pipeDark = '#558B2F';
            const pipeLight = '#8BC34A';

            // Top pipe
            // Main body
            ctx.fillStyle = pipeColor;
            ctx.fillRect(pipe.x, 0, PIPE_WIDTH, pipe.topHeight);

            // Cap
            ctx.fillRect(pipe.x - 5, pipe.topHeight - 30, PIPE_WIDTH + 10, 30);

            // Shading
            ctx.fillStyle = pipeDark;
            ctx.fillRect(pipe.x + PIPE_WIDTH - 10, 0, 10, pipe.topHeight);
            ctx.fillRect(pipe.x + PIPE_WIDTH - 5, pipe.topHeight - 30, 10, 30);

            ctx.fillStyle = pipeLight;
            ctx.fillRect(pipe.x, 0, 10, pipe.topHeight - 30);
            ctx.fillRect(pipe.x - 5, pipe.topHeight - 30, 10, 30);

            // Bottom pipe
            const bottomY = pipe.topHeight + PIPE_GAP;
            const bottomHeight = canvas.height - groundHeight - bottomY;

            // Main body
            ctx.fillStyle = pipeColor;
            ctx.fillRect(pipe.x, bottomY, PIPE_WIDTH, bottomHeight);

            // Cap
            ctx.fillRect(pipe.x - 5, bottomY, PIPE_WIDTH + 10, 30);

            // Shading
            ctx.fillStyle = pipeDark;
            ctx.fillRect(pipe.x + PIPE_WIDTH - 10, bottomY, 10, bottomHeight);
            ctx.fillRect(pipe.x + PIPE_WIDTH - 5, bottomY, 10, 30);

            ctx.fillStyle = pipeLight;
            ctx.fillRect(pipe.x, bottomY + 30, 10, bottomHeight - 30);
            ctx.fillRect(pipe.x - 5, bottomY, 10, 30);
        }

        function drawScore() {
            ctx.fillStyle = '#fff';
            ctx.strokeStyle = '#543847';
            ctx.lineWidth = 3;
            ctx.font = 'bold 48px Courier New';
            ctx.textAlign = 'center';
            ctx.strokeText(score, canvas.width / 2, 60);
            ctx.fillText(score, canvas.width / 2, 60);
        }

        // ============================================
        // UPDATE FUNCTIONS
        // ============================================
        function updateBird() {
            bird.velocity += GRAVITY;
            bird.y += bird.velocity;

            // Ceiling
            if (bird.y < 0) {
                bird.y = 0;
                bird.velocity = 0;
            }

            // Ground collision
            if (bird.y + bird.height > canvas.height - groundHeight) {
                gameOver();
            }
        }

        function updatePipes() {
            // Move pipes
            pipes.forEach(pipe => {
                pipe.x -= PIPE_SPEED;
            });

            // Remove off-screen pipes
            pipes = pipes.filter(pipe => pipe.x + PIPE_WIDTH > 0);

            // Spawn new pipes
            if (frameCount % PIPE_SPAWN_RATE === 0) {
                const minHeight = 80;
                const maxHeight = canvas.height - groundHeight - PIPE_GAP - minHeight;
                const topHeight = minHeight + Math.random() * (maxHeight - minHeight);

                pipes.push({
                    x: canvas.width,
                    topHeight: topHeight,
                    passed: false
                });
            }

            // Check for score
            pipes.forEach(pipe => {
                if (!pipe.passed && pipe.x + PIPE_WIDTH < bird.x) {
                    pipe.passed = true;
                    score++;
                    scoreDisplay.textContent = score;
                    playSound('score');
                }
            });
        }

        function updateClouds() {
            clouds.forEach(cloud => {
                cloud.x -= 0.5;
                if (cloud.x < -60) {
                    cloud.x = canvas.width + 60;
                    cloud.y = 50 + Math.random() * 100;
                }
            });
        }

        function updateGround() {
            groundX -= PIPE_SPEED;
            if (groundX <= -40) {
                groundX = 0;
            }
        }

        function checkCollision() {
            pipes.forEach(pipe => {
                // Top pipe collision
                if (bird.x + bird.width > pipe.x &&
                    bird.x < pipe.x + PIPE_WIDTH &&
                    bird.y < pipe.topHeight) {
                    gameOver();
                }

                // Bottom pipe collision
                const bottomY = pipe.topHeight + PIPE_GAP;
                if (bird.x + bird.width > pipe.x &&
                    bird.x < pipe.x + PIPE_WIDTH &&
                    bird.y + bird.height > bottomY) {
                    gameOver();
                }
            });
        }

        // ============================================
        // GAME FLOW
        // ============================================
        function flap() {
            if (!gameRunning || gamePaused) return;
            bird.velocity = FLAP_POWER;
            playSound('flap');
        }

        function togglePause() {
            if (!gameRunning) return;
            gamePaused = !gamePaused;
        }

        function gameOver() {
            gameRunning = false;
            playSound('hit');

            // Update high score
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('flappyHigh', highScore);
                highScoreDisplay.textContent = highScore;
            }

            // Medal based on score
            let medal = '';
            if (score >= 40) medal = '🏆';
            else if (score >= 30) medal = '🥇';
            else if (score >= 20) medal = '🥈';
            else if (score >= 10) medal = '🥉';
            medalDisplay.textContent = medal;

            finalScoreDisplay.textContent = score;
            finalHighScoreDisplay.textContent = highScore;
            gameOverScreen.classList.remove('hidden');
        }

        function startGame() {
            initAudio();

            // Reset
            score = 0;
            frameCount = 0;
            pipes = [];
            bird.y = canvas.height / 2;
            bird.velocity = 0;
            bird.rotation = 0;
            gamePaused = false;

            scoreDisplay.textContent = score;

            startScreen.classList.add('hidden');
            gameOverScreen.classList.add('hidden');
            gameRunning = true;
            gameStarted = true;

            gameLoop();
        }

        // ============================================
        // GAME LOOP
        // ============================================
        function gameLoop() {
            frameCount++;

            // Clear
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw
            drawBackground();
            pipes.forEach(drawPipe);
            drawGround();
            drawBird();
            drawScore();

            if (gameRunning) {
                if (!gamePaused) {
                    // Update
                    updateBird();
                    updatePipes();
                    updateClouds();
                    updateGround();
                    checkCollision();
                }

                // Pause overlay
                if (gamePaused) {
                    ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    ctx.fillStyle = '#fff';
                    ctx.font = 'bold 40px Courier New';
                    ctx.textAlign = 'center';
                    ctx.fillText('PAUSED', canvas.width/2, canvas.height/2);
                    ctx.font = '16px Courier New';
                    ctx.fillText('Press P to resume', canvas.width/2, canvas.height/2 + 30);
                }

                requestAnimationFrame(gameLoop);
            }
        }

        // Idle animation before game starts
        function idleLoop() {
            if (gameStarted) return;

            frameCount++;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawBackground();
            drawGround();

            // Hovering bird
            bird.y = canvas.height / 2 + Math.sin(frameCount * 0.05) * 20;
            drawBird();

            updateClouds();

            requestAnimationFrame(idleLoop);
        }

        // Start idle animation
        idleLoop();

        // ============================================
        // INPUT
        // ============================================
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                flap();
            }
            if (e.code === 'KeyP' || e.code === 'Escape') {
                togglePause();
            }
        });

        canvas.addEventListener('click', flap);
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            flap();
        });

        document.getElementById('startBtn').addEventListener('click', startGame);
        document.getElementById('restartBtn').addEventListener('click', startGame);

        // Sound toggle
        document.getElementById('soundBtn').addEventListener('click', () => {
            soundEnabled = !soundEnabled;
            document.getElementById('soundBtn').textContent = soundEnabled ? '🔊' : '🔇';
        });
    </script>
</body>
</html>
