<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Knife Hit</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
        }

        .hud {
            position: fixed; top: 20px; left: 0; right: 0;
            display: flex; justify-content: center; gap: 30px;
            z-index: 100;
        }
        .hud-item {
            background: rgba(255,255,255,0.1); padding: 10px 20px; border-radius: 15px;
            text-align: center; color: #fff;
        }
        .hud-label { font-size: 0.7rem; color: #888; text-transform: uppercase; }
        .hud-value { font-size: 1.5rem; font-weight: bold; }

        canvas {
            display: block;
            margin-top: 80px;
        }

        .knives-remaining {
            position: fixed; bottom: 150px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 8px; z-index: 100;
        }
        .knife-dot {
            width: 12px; height: 12px; background: #fff; border-radius: 50%;
            transition: all 0.2s;
        }
        .knife-dot.used { background: #333; transform: scale(0.7); }

        .instructions {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            color: #666; font-size: 0.9rem; text-align: center;
        }

        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 200;
        }
        .overlay.hidden { display: none; }
        .overlay h1 { color: #fff; font-size: 2.5rem; margin-bottom: 20px; }
        .overlay h2 { color: #e94560; font-size: 2rem; margin-bottom: 20px; }
        .overlay p { color: #888; font-size: 1.1rem; margin-bottom: 30px; }
        .overlay .score-display { color: #00d9ff; font-size: 3rem; margin-bottom: 30px; }

        .btn {
            padding: 15px 50px; background: linear-gradient(135deg, #e94560, #ff6b6b);
            color: #fff; border: none; border-radius: 30px; font-size: 1.2rem;
            font-weight: bold; cursor: pointer; text-transform: uppercase;
            letter-spacing: 2px; transition: all 0.2s;
            box-shadow: 0 5px 20px rgba(233, 69, 96, 0.4);
        }
        .btn:hover { transform: translateY(-3px); box-shadow: 0 8px 30px rgba(233, 69, 96, 0.6); }

        .stats-row {
            display: flex; gap: 40px; margin-bottom: 30px;
        }
        .stat-box {
            text-align: center;
        }
        .stat-box .value { color: #fff; font-size: 2rem; font-weight: bold; }
        .stat-box .label { color: #666; font-size: 0.8rem; }

        .shop-btn {
            position: fixed; top: 20px; right: 20px;
            background: rgba(255,255,255,0.1); color: #fff; padding: 10px 20px;
            border: none; border-radius: 10px; cursor: pointer; font-weight: bold;
            z-index: 100;
        }
        .shop-btn:hover { background: rgba(255,255,255,0.2); }

        .back-btn {
            position: fixed; top: 20px; left: 20px;
            background: rgba(255,255,255,0.1); color: #fff; padding: 10px 20px;
            border-radius: 10px; text-decoration: none; font-weight: bold;
            z-index: 100;
        }
        .back-btn:hover { background: rgba(255,255,255,0.2); }

        .shop-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 300;
        }
        .shop-overlay.hidden { display: none; }
        .shop-grid {
            display: grid; grid-template-columns: repeat(4, 80px); gap: 15px; margin: 30px 0;
        }
        .skin-item {
            width: 80px; height: 80px; background: rgba(255,255,255,0.1);
            border-radius: 15px; display: flex; flex-direction: column;
            align-items: center; justify-content: center; cursor: pointer;
            border: 3px solid transparent; transition: all 0.2s;
        }
        .skin-item:hover { background: rgba(255,255,255,0.2); }
        .skin-item.owned { border-color: #4CAF50; }
        .skin-item.equipped { border-color: #FFD700; background: rgba(255,215,0,0.2); }
        .skin-item.locked { opacity: 0.5; }
        .skin-icon { font-size: 2rem; margin-bottom: 5px; }
        .skin-cost { color: #FFD700; font-size: 0.8rem; }

        .boss-warning {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: #e94560; font-size: 3rem; font-weight: bold;
            text-shadow: 0 0 20px #e94560; animation: bossFlash 0.5s ease-in-out 3;
            z-index: 150; pointer-events: none;
        }
        @keyframes bossFlash { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    </style>
</head>
<body>
    <a href="index.html" class="back-btn">← Back</a>
    <button class="shop-btn" onclick="showShop()">🔪 Skins</button>

    <div class="hud">
        <div class="hud-item">
            <div class="hud-label">Stage</div>
            <div class="hud-value" id="stage">1</div>
        </div>
        <div class="hud-item">
            <div class="hud-label">Score</div>
            <div class="hud-value" id="score">0</div>
        </div>
        <div class="hud-item">
            <div class="hud-label">Coins</div>
            <div class="hud-value" id="coins">0</div>
        </div>
    </div>

    <canvas id="gameCanvas" width="400" height="600"></canvas>

    <div class="knives-remaining" id="knivesRemaining"></div>

    <div class="instructions">Click or press SPACE to throw knife</div>

    <!-- Start Screen -->
    <div class="overlay" id="startScreen">
        <h1>🔪 Knife Hit</h1>
        <p>Throw knives at the spinning log without hitting other knives!</p>
        <button class="btn" onclick="startGame()">PLAY</button>
    </div>

    <!-- Game Over Screen -->
    <div class="overlay hidden" id="gameOverScreen">
        <h2>Game Over!</h2>
        <div class="score-display" id="finalScore">0</div>
        <div class="stats-row">
            <div class="stat-box">
                <div class="value" id="finalStage">1</div>
                <div class="label">Stage Reached</div>
            </div>
            <div class="stat-box">
                <div class="value" id="coinsEarned">0</div>
                <div class="label">Coins Earned</div>
            </div>
        </div>
        <button class="btn" onclick="startGame()">TRY AGAIN</button>
    </div>

    <!-- Shop -->
    <div class="shop-overlay hidden" id="shopScreen">
        <h1 style="color: #fff;">🔪 Knife Skins</h1>
        <p style="color: #888;">Coins: <span id="shopCoins">0</span></p>
        <div class="shop-grid" id="skinGrid"></div>
        <button class="btn" onclick="hideShop()">CLOSE</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Audio
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx = null;
        function initAudio() { if (!audioCtx) audioCtx = new AudioContext(); }

        function playSound(type) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            const now = audioCtx.currentTime;

            switch(type) {
                case 'throw':
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(200, now);
                    osc.frequency.exponentialRampToValueAtTime(100, now + 0.1);
                    gain.gain.setValueAtTime(0.15, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                    osc.start(now);
                    osc.stop(now + 0.1);
                    break;
                case 'hit':
                    osc.type = 'square';
                    osc.frequency.setValueAtTime(150, now);
                    gain.gain.setValueAtTime(0.2, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
                    osc.start(now);
                    osc.stop(now + 0.15);
                    break;
                case 'apple':
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(880, now);
                    osc.frequency.setValueAtTime(1100, now + 0.1);
                    gain.gain.setValueAtTime(0.1, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
                    osc.start(now);
                    osc.stop(now + 0.2);
                    break;
                case 'fail':
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(200, now);
                    osc.frequency.exponentialRampToValueAtTime(50, now + 0.3);
                    gain.gain.setValueAtTime(0.2, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                    osc.start(now);
                    osc.stop(now + 0.3);
                    break;
                case 'stage':
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(523, now);
                    osc.frequency.setValueAtTime(659, now + 0.1);
                    osc.frequency.setValueAtTime(784, now + 0.2);
                    osc.frequency.setValueAtTime(1047, now + 0.3);
                    gain.gain.setValueAtTime(0.1, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
                    osc.start(now);
                    osc.stop(now + 0.5);
                    break;
            }
        }

        // Skins
        const SKINS = [
            { id: 'default', name: 'Classic', icon: '🔪', color: '#888', price: 0 },
            { id: 'golden', name: 'Golden', icon: '🗡️', color: '#FFD700', price: 100 },
            { id: 'flame', name: 'Flame', icon: '🔥', color: '#ff6b35', price: 150 },
            { id: 'ice', name: 'Ice', icon: '❄️', color: '#00d4ff', price: 150 },
            { id: 'toxic', name: 'Toxic', icon: '☠️', color: '#00ff00', price: 200 },
            { id: 'royal', name: 'Royal', icon: '👑', color: '#9b59b6', price: 250 },
            { id: 'rainbow', name: 'Rainbow', icon: '🌈', color: '#ff69b4', price: 300 },
            { id: 'shadow', name: 'Shadow', icon: '🌑', color: '#1a1a1a', price: 400 },
        ];

        // Game state
        let saveData = {
            coins: 0,
            highScore: 0,
            highStage: 0,
            ownedSkins: ['default'],
            equippedSkin: 'default',
            totalGames: 0
        };

        let gameState = {
            score: 0,
            stage: 1,
            knivesLeft: 5,
            totalKnives: 5,
            logAngle: 0,
            logSpeed: 0.02,
            logRadius: 60,
            stuckKnives: [],
            apples: [],
            flyingKnife: null,
            gameOver: false,
            isBoss: false,
            coinsThisGame: 0
        };

        // Load/Save
        function loadSaveData() {
            const saved = localStorage.getItem('knifeHit');
            if (saved) saveData = { ...saveData, ...JSON.parse(saved) };
        }

        function saveSaveData() {
            localStorage.setItem('knifeHit', JSON.stringify(saveData));
        }

        // Get current skin
        function getCurrentSkin() {
            return SKINS.find(s => s.id === saveData.equippedSkin) || SKINS[0];
        }

        // Start game
        function startGame() {
            initAudio();
            document.getElementById('startScreen').classList.add('hidden');
            document.getElementById('gameOverScreen').classList.add('hidden');

            gameState = {
                score: 0,
                stage: 1,
                knivesLeft: 5,
                totalKnives: 5,
                logAngle: 0,
                logSpeed: 0.02,
                logRadius: 60,
                stuckKnives: [],
                apples: [],
                flyingKnife: null,
                gameOver: false,
                isBoss: false,
                coinsThisGame: 0
            };

            setupStage();
            updateUI();
            gameLoop();
        }

        // Setup stage
        function setupStage() {
            gameState.stuckKnives = [];
            gameState.apples = [];
            gameState.flyingKnife = null;
            gameState.isBoss = gameState.stage % 5 === 0;

            // Difficulty scaling
            const baseKnives = 5;
            const extraKnives = Math.floor(gameState.stage / 3);
            gameState.totalKnives = Math.min(baseKnives + extraKnives, 12);
            gameState.knivesLeft = gameState.totalKnives;

            // Log speed increases
            gameState.logSpeed = 0.02 + (gameState.stage * 0.003);
            if (gameState.isBoss) {
                gameState.logSpeed *= 1.5;
                gameState.logRadius = 80;
                showBossWarning();
            } else {
                gameState.logRadius = 60;
            }

            // Pre-stuck knives on higher stages
            if (gameState.stage > 3) {
                const preStuck = Math.min(Math.floor((gameState.stage - 3) / 2), 4);
                for (let i = 0; i < preStuck; i++) {
                    gameState.stuckKnives.push({
                        angle: (Math.PI * 2 / preStuck) * i
                    });
                }
            }

            // Random apples
            if (Math.random() < 0.3 + gameState.stage * 0.05) {
                const numApples = Math.random() < 0.3 ? 2 : 1;
                for (let i = 0; i < numApples; i++) {
                    let angle;
                    do {
                        angle = Math.random() * Math.PI * 2;
                    } while (gameState.stuckKnives.some(k => Math.abs(k.angle - angle) < 0.3));
                    gameState.apples.push({ angle });
                }
            }

            updateKnivesUI();
        }

        function showBossWarning() {
            const warning = document.createElement('div');
            warning.className = 'boss-warning';
            warning.textContent = 'BOSS!';
            document.body.appendChild(warning);
            setTimeout(() => warning.remove(), 1500);
        }

        // Update UI
        function updateUI() {
            document.getElementById('stage').textContent = gameState.stage;
            document.getElementById('score').textContent = gameState.score;
            document.getElementById('coins').textContent = saveData.coins;
        }

        function updateKnivesUI() {
            const container = document.getElementById('knivesRemaining');
            container.innerHTML = '';
            for (let i = 0; i < gameState.totalKnives; i++) {
                const dot = document.createElement('div');
                dot.className = 'knife-dot' + (i >= gameState.knivesLeft ? ' used' : '');
                container.appendChild(dot);
            }
        }

        // Throw knife
        function throwKnife() {
            if (gameState.gameOver || gameState.flyingKnife || gameState.knivesLeft <= 0) return;

            initAudio();
            playSound('throw');

            gameState.flyingKnife = {
                x: canvas.width / 2,
                y: canvas.height - 80,
                speed: 20
            };
        }

        // Game loop
        let lastTime = 0;
        function gameLoop(timestamp) {
            if (gameState.gameOver) return;

            const dt = timestamp - lastTime;
            lastTime = timestamp;

            update();
            render();

            requestAnimationFrame(gameLoop);
        }

        function update() {
            // Rotate log (with direction changes for boss)
            if (gameState.isBoss && Math.random() < 0.01) {
                gameState.logSpeed *= -1;
            }
            gameState.logAngle += gameState.logSpeed;

            // Move flying knife
            if (gameState.flyingKnife) {
                gameState.flyingKnife.y -= gameState.flyingKnife.speed;

                const logCenterX = canvas.width / 2;
                const logCenterY = 180;
                const knifeY = gameState.flyingKnife.y;

                // Check if knife reached log
                if (knifeY <= logCenterY + gameState.logRadius + 40) {
                    // Check collision with existing knives
                    const knifeAngle = -Math.PI / 2; // Coming from bottom
                    const hitKnife = gameState.stuckKnives.some(stuck => {
                        const stuckAngle = stuck.angle + gameState.logAngle;
                        const normalizedStuck = ((stuckAngle % (Math.PI * 2)) + Math.PI * 2) % (Math.PI * 2);
                        const normalizedNew = ((knifeAngle % (Math.PI * 2)) + Math.PI * 2) % (Math.PI * 2);
                        const diff = Math.abs(normalizedStuck - normalizedNew);
                        return diff < 0.25 || diff > Math.PI * 2 - 0.25;
                    });

                    if (hitKnife) {
                        // Game over
                        playSound('fail');
                        endGame();
                        return;
                    }

                    // Stick knife to log
                    playSound('hit');
                    gameState.stuckKnives.push({
                        angle: -Math.PI / 2 - gameState.logAngle
                    });

                    // Check apple collision
                    gameState.apples = gameState.apples.filter(apple => {
                        const appleAngle = apple.angle + gameState.logAngle;
                        const normalizedApple = ((appleAngle % (Math.PI * 2)) + Math.PI * 2) % (Math.PI * 2);
                        const knifeNorm = ((-Math.PI / 2 % (Math.PI * 2)) + Math.PI * 2) % (Math.PI * 2);
                        const diff = Math.abs(normalizedApple - knifeNorm);
                        if (diff < 0.3 || diff > Math.PI * 2 - 0.3) {
                            playSound('apple');
                            gameState.score += 5;
                            gameState.coinsThisGame += 2;
                            saveData.coins += 2;
                            return false;
                        }
                        return true;
                    });

                    gameState.flyingKnife = null;
                    gameState.knivesLeft--;
                    gameState.score++;
                    updateKnivesUI();
                    updateUI();

                    // Check stage complete
                    if (gameState.knivesLeft <= 0) {
                        playSound('stage');
                        gameState.stage++;
                        const stageBonus = gameState.isBoss ? 10 : 5;
                        gameState.coinsThisGame += stageBonus;
                        saveData.coins += stageBonus;
                        setTimeout(setupStage, 500);
                    }
                }
            }
        }

        function render() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const centerX = canvas.width / 2;
            const centerY = 180;

            // Draw log
            ctx.save();
            ctx.translate(centerX, centerY);
            ctx.rotate(gameState.logAngle);

            // Log body
            const gradient = ctx.createRadialGradient(0, 0, 0, 0, 0, gameState.logRadius);
            gradient.addColorStop(0, gameState.isBoss ? '#8B0000' : '#8B4513');
            gradient.addColorStop(0.7, gameState.isBoss ? '#5c0000' : '#654321');
            gradient.addColorStop(1, gameState.isBoss ? '#3d0000' : '#3d2314');
            ctx.beginPath();
            ctx.arc(0, 0, gameState.logRadius, 0, Math.PI * 2);
            ctx.fillStyle = gradient;
            ctx.fill();

            // Tree rings
            ctx.strokeStyle = gameState.isBoss ? 'rgba(139, 0, 0, 0.3)' : 'rgba(101, 67, 33, 0.5)';
            ctx.lineWidth = 2;
            for (let r = 15; r < gameState.logRadius; r += 15) {
                ctx.beginPath();
                ctx.arc(0, 0, r, 0, Math.PI * 2);
                ctx.stroke();
            }

            // Draw stuck knives
            const skin = getCurrentSkin();
            gameState.stuckKnives.forEach(knife => {
                ctx.save();
                ctx.rotate(knife.angle);
                ctx.translate(0, -gameState.logRadius - 30);

                // Knife blade
                ctx.fillStyle = skin.color;
                ctx.beginPath();
                ctx.moveTo(0, -25);
                ctx.lineTo(-6, 10);
                ctx.lineTo(6, 10);
                ctx.closePath();
                ctx.fill();

                // Knife handle
                ctx.fillStyle = '#333';
                ctx.fillRect(-5, 10, 10, 20);

                ctx.restore();
            });

            // Draw apples
            gameState.apples.forEach(apple => {
                ctx.save();
                ctx.rotate(apple.angle);
                ctx.translate(0, -gameState.logRadius - 25);
                ctx.font = '30px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('🍎', 0, 10);
                ctx.restore();
            });

            ctx.restore();

            // Draw flying knife
            if (gameState.flyingKnife) {
                const k = gameState.flyingKnife;
                ctx.fillStyle = skin.color;
                ctx.beginPath();
                ctx.moveTo(k.x, k.y - 25);
                ctx.lineTo(k.x - 6, k.y + 10);
                ctx.lineTo(k.x + 6, k.y + 10);
                ctx.closePath();
                ctx.fill();

                ctx.fillStyle = '#333';
                ctx.fillRect(k.x - 5, k.y + 10, 10, 20);
            }

            // Draw waiting knife
            if (!gameState.flyingKnife && gameState.knivesLeft > 0) {
                const waitX = centerX;
                const waitY = canvas.height - 80;

                ctx.fillStyle = skin.color;
                ctx.beginPath();
                ctx.moveTo(waitX, waitY - 25);
                ctx.lineTo(waitX - 6, waitY + 10);
                ctx.lineTo(waitX + 6, waitY + 10);
                ctx.closePath();
                ctx.fill();

                ctx.fillStyle = '#333';
                ctx.fillRect(waitX - 5, waitY + 10, 10, 20);
            }
        }

        function endGame() {
            gameState.gameOver = true;

            saveData.totalGames++;
            if (gameState.score > saveData.highScore) saveData.highScore = gameState.score;
            if (gameState.stage > saveData.highStage) saveData.highStage = gameState.stage;
            saveSaveData();

            document.getElementById('finalScore').textContent = gameState.score;
            document.getElementById('finalStage').textContent = gameState.stage;
            document.getElementById('coinsEarned').textContent = gameState.coinsThisGame;
            document.getElementById('gameOverScreen').classList.remove('hidden');
        }

        // Shop
        function showShop() {
            document.getElementById('shopCoins').textContent = saveData.coins;
            const grid = document.getElementById('skinGrid');
            grid.innerHTML = SKINS.map(skin => {
                const owned = saveData.ownedSkins.includes(skin.id);
                const equipped = saveData.equippedSkin === skin.id;
                return `
                    <div class="skin-item ${owned ? 'owned' : 'locked'} ${equipped ? 'equipped' : ''}"
                         onclick="buySkin('${skin.id}')">
                        <div class="skin-icon">${skin.icon}</div>
                        ${!owned ? `<div class="skin-cost">${skin.price} 🪙</div>` : ''}
                        ${equipped ? '<div style="color: #FFD700; font-size: 0.7rem;">Equipped</div>' : ''}
                    </div>
                `;
            }).join('');
            document.getElementById('shopScreen').classList.remove('hidden');
        }

        function hideShop() {
            document.getElementById('shopScreen').classList.add('hidden');
        }

        function buySkin(id) {
            const skin = SKINS.find(s => s.id === id);
            if (saveData.ownedSkins.includes(id)) {
                saveData.equippedSkin = id;
            } else if (saveData.coins >= skin.price) {
                saveData.coins -= skin.price;
                saveData.ownedSkins.push(id);
                saveData.equippedSkin = id;
            }
            saveSaveData();
            updateUI();
            showShop();
        }

        // Input
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.overlay') && !e.target.closest('.shop-btn') && !e.target.closest('.back-btn')) {
                throwKnife();
            }
        });

        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                throwKnife();
            }
        });

        // Init
        loadSaveData();
        updateUI();
    </script>
</body>
</html>
