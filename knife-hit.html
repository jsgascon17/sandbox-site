<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Knife Hit</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
        }

        .hud {
            position: fixed; top: 20px; left: 0; right: 0;
            display: flex; justify-content: center; gap: 30px;
            z-index: 100;
        }
        .hud-item {
            background: rgba(255,255,255,0.1); padding: 10px 20px; border-radius: 15px;
            text-align: center; color: #fff;
        }
        .hud-label { font-size: 0.7rem; color: #888; text-transform: uppercase; }
        .hud-value { font-size: 1.5rem; font-weight: bold; }

        canvas {
            display: block;
            margin-top: 80px;
        }

        .knives-remaining {
            position: fixed; bottom: 150px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 8px; z-index: 100;
        }
        .knife-dot {
            width: 12px; height: 12px; background: #fff; border-radius: 50%;
            transition: all 0.2s;
        }
        .knife-dot.used { background: #333; transform: scale(0.7); }

        .instructions {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            color: #666; font-size: 0.9rem; text-align: center;
        }

        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 200;
        }
        .overlay.hidden { display: none; }
        .overlay h1 { color: #fff; font-size: 2.5rem; margin-bottom: 20px; }
        .overlay h2 { color: #e94560; font-size: 2rem; margin-bottom: 20px; }
        .overlay p { color: #888; font-size: 1.1rem; margin-bottom: 30px; }
        .overlay .score-display { color: #00d9ff; font-size: 3rem; margin-bottom: 30px; }

        .btn {
            padding: 15px 50px; background: linear-gradient(135deg, #e94560, #ff6b6b);
            color: #fff; border: none; border-radius: 30px; font-size: 1.2rem;
            font-weight: bold; cursor: pointer; text-transform: uppercase;
            letter-spacing: 2px; transition: all 0.2s;
            box-shadow: 0 5px 20px rgba(233, 69, 96, 0.4);
        }
        .btn:hover { transform: translateY(-3px); box-shadow: 0 8px 30px rgba(233, 69, 96, 0.6); }

        .stats-row {
            display: flex; gap: 40px; margin-bottom: 30px;
        }
        .stat-box {
            text-align: center;
        }
        .stat-box .value { color: #fff; font-size: 2rem; font-weight: bold; }
        .stat-box .label { color: #666; font-size: 0.8rem; }

        .shop-btn {
            position: fixed; top: 20px; right: 20px;
            background: rgba(255,255,255,0.1); color: #fff; padding: 10px 20px;
            border: none; border-radius: 10px; cursor: pointer; font-weight: bold;
            z-index: 250;
        }
        .shop-btn:hover { background: rgba(255,255,255,0.2); }

        .back-btn {
            position: fixed; top: 20px; left: 20px;
            background: rgba(255,255,255,0.1); color: #fff; padding: 10px 20px;
            border-radius: 10px; text-decoration: none; font-weight: bold;
            z-index: 250;
        }
        .back-btn:hover { background: rgba(255,255,255,0.2); }

        .shop-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 300;
        }
        .shop-overlay.hidden { display: none; }
        .shop-grid {
            display: grid; grid-template-columns: repeat(4, 80px); gap: 15px; margin: 30px 0;
        }
        .skin-item {
            width: 80px; height: 80px; background: rgba(255,255,255,0.1);
            border-radius: 15px; display: flex; flex-direction: column;
            align-items: center; justify-content: center; cursor: pointer;
            border: 3px solid transparent; transition: all 0.2s;
        }
        .skin-item:hover { background: rgba(255,255,255,0.2); }
        .skin-item.owned { border-color: #4CAF50; }
        .skin-item.equipped { border-color: #FFD700; background: rgba(255,215,0,0.2); }
        .skin-item.locked { opacity: 0.5; }
        .skin-icon { font-size: 2rem; margin-bottom: 5px; }
        .skin-cost { color: #FFD700; font-size: 0.8rem; }

        .boss-warning {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: #e94560; font-size: 3rem; font-weight: bold;
            text-shadow: 0 0 20px #e94560; animation: bossFlash 0.5s ease-in-out 3;
            z-index: 150; pointer-events: none;
        }
        @keyframes bossFlash { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        .combo-display {
            position: fixed; top: 120px; left: 50%; transform: translateX(-50%);
            color: #FFD700; font-size: 2rem; font-weight: bold;
            text-shadow: 0 0 20px #FFD700; z-index: 150; pointer-events: none;
            opacity: 0; transition: opacity 0.3s;
        }
        .combo-display.active { opacity: 1; animation: comboPulse 0.3s ease-out; }
        @keyframes comboPulse { 0% { transform: translateX(-50%) scale(1.5); } 100% { transform: translateX(-50%) scale(1); } }

        .achievement-popup {
            position: fixed; top: 80px; right: 20px;
            background: linear-gradient(135deg, #f39c12, #e67e22);
            color: #fff; padding: 15px 25px; border-radius: 15px;
            box-shadow: 0 5px 30px rgba(243, 156, 18, 0.5);
            animation: slideInRight 0.5s ease-out, slideOutRight 0.5s ease-in 2.5s forwards;
            z-index: 200;
        }
        .achievement-popup h3 { font-size: 0.8rem; margin-bottom: 5px; opacity: 0.8; }
        .achievement-popup p { font-size: 1.1rem; font-weight: bold; }
        @keyframes slideInRight { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes slideOutRight { from { transform: translateX(0); opacity: 1; } to { transform: translateX(100%); opacity: 0; } }

        .sound-btn {
            position: fixed; top: 60px; right: 20px;
            background: rgba(255,255,255,0.1); color: #fff; padding: 8px 15px;
            border: none; border-radius: 10px; cursor: pointer; font-size: 1.2rem;
            z-index: 250;
        }
        .sound-btn:hover { background: rgba(255,255,255,0.2); }

        .stats-btn {
            position: fixed; top: 60px; left: 20px;
            background: rgba(255,255,255,0.1); color: #fff; padding: 10px 20px;
            border: none; border-radius: 10px; cursor: pointer; font-weight: bold;
            z-index: 250;
        }
        .stats-btn:hover { background: rgba(255,255,255,0.2); }

        .codes-btn {
            position: fixed; top: 100px; left: 20px;
            background: rgba(255,255,255,0.1); color: #fff; padding: 10px 20px;
            border: none; border-radius: 10px; cursor: pointer; font-weight: bold;
            z-index: 250;
        }
        .codes-btn:hover { background: rgba(255,255,255,0.2); }

        .codes-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 300;
        }
        .codes-overlay.hidden { display: none; }
        .code-input {
            background: rgba(255,255,255,0.1); border: 2px solid #444;
            color: #fff; padding: 15px 20px; border-radius: 10px;
            font-size: 1.2rem; text-align: center; width: 250px;
            margin: 20px 0;
        }
        .code-input:focus { outline: none; border-color: #e94560; }
        .code-message {
            color: #4CAF50; font-size: 1.1rem; min-height: 30px; margin-bottom: 20px;
        }
        .code-message.error { color: #e94560; }

        .stats-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 300;
            overflow-y: auto; padding: 20px;
        }
        .stats-overlay.hidden { display: none; }
        .stats-grid {
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px;
            margin: 20px 0; max-width: 400px;
        }
        .stat-card {
            background: rgba(255,255,255,0.1); padding: 20px; border-radius: 15px; text-align: center;
        }
        .stat-card .icon { font-size: 2rem; margin-bottom: 10px; }
        .stat-card .value { font-size: 1.8rem; font-weight: bold; color: #00d9ff; }
        .stat-card .label { font-size: 0.8rem; color: #888; margin-top: 5px; }

        .achievements-grid {
            display: grid; grid-template-columns: repeat(3, 80px); gap: 10px; margin: 20px 0;
        }
        .achievement-item {
            width: 80px; height: 80px; background: rgba(255,255,255,0.05);
            border-radius: 15px; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            border: 2px solid transparent; opacity: 0.4;
        }
        .achievement-item.unlocked { opacity: 1; border-color: #f39c12; background: rgba(243,156,18,0.1); }
        .achievement-item .icon { font-size: 2rem; }
        .achievement-item .name { font-size: 0.6rem; color: #888; margin-top: 5px; text-align: center; }
    </style>
</head>
<body>
    <a href="index.html" class="back-btn">← Back</a>
    <button class="stats-btn" onclick="showStats()">📊 Stats</button>
    <button class="codes-btn" onclick="showCodes()">🎁 Codes</button>
    <button class="shop-btn" onclick="showShop()">🔪 Skins</button>
    <button class="sound-btn" id="soundBtn" onclick="toggleSound()">🔊</button>

    <div class="combo-display" id="comboDisplay">5x COMBO!</div>

    <div class="hud">
        <div class="hud-item">
            <div class="hud-label">Stage</div>
            <div class="hud-value" id="stage">1</div>
        </div>
        <div class="hud-item">
            <div class="hud-label">Score</div>
            <div class="hud-value" id="score">0</div>
        </div>
        <div class="hud-item">
            <div class="hud-label">Coins</div>
            <div class="hud-value" id="coins">0</div>
        </div>
    </div>

    <canvas id="gameCanvas" width="400" height="600"></canvas>

    <div class="knives-remaining" id="knivesRemaining"></div>

    <div class="instructions">Click or press SPACE to throw knife</div>

    <!-- Start Screen -->
    <div class="overlay" id="startScreen">
        <h1>🔪 Knife Hit</h1>
        <p>Throw knives at the spinning log without hitting other knives!</p>
        <button class="btn" onclick="startGame()">PLAY</button>
    </div>

    <!-- Game Over Screen -->
    <div class="overlay hidden" id="gameOverScreen">
        <h2>Game Over!</h2>
        <div class="score-display" id="finalScore">0</div>
        <div class="stats-row">
            <div class="stat-box">
                <div class="value" id="finalStage">1</div>
                <div class="label">Stage Reached</div>
            </div>
            <div class="stat-box">
                <div class="value" id="coinsEarned">0</div>
                <div class="label">Coins Earned</div>
            </div>
        </div>
        <button class="btn" onclick="startGame()">TRY AGAIN</button>
    </div>

    <!-- Shop -->
    <div class="shop-overlay hidden" id="shopScreen">
        <h1 style="color: #fff;">🔪 Knife Skins</h1>
        <p style="color: #888;">Coins: <span id="shopCoins">0</span></p>
        <div class="shop-grid" id="skinGrid"></div>
        <button class="btn" onclick="hideShop()">CLOSE</button>
    </div>

    <!-- Stats -->
    <div class="stats-overlay hidden" id="statsScreen">
        <h1 style="color: #fff;">📊 Statistics</h1>
        <div class="stats-grid" id="statsGrid"></div>
        <h2 style="color: #f39c12; margin-top: 20px;">🏆 Achievements</h2>
        <div class="achievements-grid" id="achievementsGrid"></div>
        <button class="btn" onclick="hideStats()" style="margin-top: 20px;">CLOSE</button>
    </div>

    <!-- Codes -->
    <div class="codes-overlay hidden" id="codesScreen">
        <h1 style="color: #fff;">🎁 Redeem Code</h1>
        <p style="color: #888;">Enter a code to get rewards!</p>
        <input type="text" class="code-input" id="codeInput" placeholder="Enter code..." maxlength="30">
        <div class="code-message" id="codeMessage"></div>
        <div style="display: flex; gap: 15px;">
            <button class="btn" onclick="redeemCode()">REDEEM</button>
            <button class="btn" onclick="hideCodes()" style="background: linear-gradient(135deg, #666, #888);">CLOSE</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Audio
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx = null;
        function initAudio() { if (!audioCtx) audioCtx = new AudioContext(); }

        function playSound(type) {
            if (!audioCtx || !saveData.soundEnabled) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            const now = audioCtx.currentTime;

            switch(type) {
                case 'throw':
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(200, now);
                    osc.frequency.exponentialRampToValueAtTime(100, now + 0.1);
                    gain.gain.setValueAtTime(0.15, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                    osc.start(now);
                    osc.stop(now + 0.1);
                    break;
                case 'hit':
                    osc.type = 'square';
                    osc.frequency.setValueAtTime(150, now);
                    gain.gain.setValueAtTime(0.2, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
                    osc.start(now);
                    osc.stop(now + 0.15);
                    break;
                case 'apple':
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(880, now);
                    osc.frequency.setValueAtTime(1100, now + 0.1);
                    gain.gain.setValueAtTime(0.1, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
                    osc.start(now);
                    osc.stop(now + 0.2);
                    break;
                case 'fail':
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(200, now);
                    osc.frequency.exponentialRampToValueAtTime(50, now + 0.3);
                    gain.gain.setValueAtTime(0.2, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                    osc.start(now);
                    osc.stop(now + 0.3);
                    break;
                case 'stage':
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(523, now);
                    osc.frequency.setValueAtTime(659, now + 0.1);
                    osc.frequency.setValueAtTime(784, now + 0.2);
                    osc.frequency.setValueAtTime(1047, now + 0.3);
                    gain.gain.setValueAtTime(0.1, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
                    osc.start(now);
                    osc.stop(now + 0.5);
                    break;
                case 'combo':
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(600, now);
                    osc.frequency.setValueAtTime(800, now + 0.05);
                    osc.frequency.setValueAtTime(1000, now + 0.1);
                    gain.gain.setValueAtTime(0.12, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
                    osc.start(now);
                    osc.stop(now + 0.2);
                    break;
                case 'achievement':
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(440, now);
                    osc.frequency.setValueAtTime(550, now + 0.15);
                    osc.frequency.setValueAtTime(660, now + 0.3);
                    osc.frequency.setValueAtTime(880, now + 0.45);
                    gain.gain.setValueAtTime(0.15, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.6);
                    osc.start(now);
                    osc.stop(now + 0.6);
                    break;
            }
        }

        // Skins
        const SKINS = [
            { id: 'default', name: 'Classic', icon: '🔪', color: '#888', price: 0 },
            { id: 'golden', name: 'Golden', icon: '🗡️', color: '#FFD700', price: 100 },
            { id: 'flame', name: 'Flame', icon: '🔥', color: '#ff6b35', price: 150 },
            { id: 'ice', name: 'Ice', icon: '❄️', color: '#00d4ff', price: 150 },
            { id: 'toxic', name: 'Toxic', icon: '☠️', color: '#00ff00', price: 200 },
            { id: 'royal', name: 'Royal', icon: '👑', color: '#9b59b6', price: 250 },
            { id: 'rainbow', name: 'Rainbow', icon: '🌈', color: '#ff69b4', price: 300 },
            { id: 'shadow', name: 'Shadow', icon: '🌑', color: '#1a1a1a', price: 400 },
            { id: 'karambit', name: 'Karambit', icon: '🦂', color: '#c0392b', price: 500 },
            { id: 'balisong', name: 'Balisong', icon: '🦋', color: '#3498db', price: 600 },
            { id: 'slipper', name: "Mom's Slipper", icon: '🩴', color: '#e67e22', price: 999 },
        ];

        // Log types (changes every 10 stages)
        const LOG_TYPES = [
            { id: 'wood', name: 'Wood', colors: ['#8B4513', '#654321', '#3d2314'], bossColors: ['#8B0000', '#5c0000', '#3d0000'] },
            { id: 'ice', name: 'Ice', colors: ['#a8d8ea', '#61c0bf', '#3d8b8b'], bossColors: ['#4a69bd', '#1e3799', '#0c2461'] },
            { id: 'metal', name: 'Metal', colors: ['#95a5a6', '#7f8c8d', '#566573'], bossColors: ['#d35400', '#a04000', '#6e2c00'] },
            { id: 'neon', name: 'Neon', colors: ['#ff00ff', '#cc00cc', '#990099'], bossColors: ['#00ffff', '#00cccc', '#009999'] },
        ];

        // Achievements
        const ACHIEVEMENTS = [
            { id: 'first_throw', name: 'First Blood', icon: '🎯', desc: 'Land your first knife', check: s => s.totalKnivesThrown >= 1 },
            { id: 'apple_hunter', name: 'Apple Hunter', icon: '🍎', desc: 'Hit 10 apples', check: s => s.totalApples >= 10 },
            { id: 'apple_master', name: 'Apple Master', icon: '🍏', desc: 'Hit 100 apples', check: s => s.totalApples >= 100 },
            { id: 'stage_10', name: 'Getting Serious', icon: '🔟', desc: 'Reach stage 10', check: s => s.highStage >= 10 },
            { id: 'stage_25', name: 'Knife Expert', icon: '🏅', desc: 'Reach stage 25', check: s => s.highStage >= 25 },
            { id: 'stage_50', name: 'Blade Master', icon: '🏆', desc: 'Reach stage 50', check: s => s.highStage >= 50 },
            { id: 'boss_slayer', name: 'Boss Slayer', icon: '👹', desc: 'Beat 5 boss stages', check: s => s.bossesBeaten >= 5 },
            { id: 'combo_5', name: 'Combo Starter', icon: '⚡', desc: 'Get a 5x combo', check: s => s.bestCombo >= 5 },
            { id: 'combo_10', name: 'Combo King', icon: '👑', desc: 'Get a 10x combo', check: s => s.bestCombo >= 10 },
            { id: 'rich', name: 'Coin Collector', icon: '💰', desc: 'Earn 1000 total coins', check: s => s.totalCoinsEarned >= 1000 },
            { id: 'veteran', name: 'Veteran', icon: '🎖️', desc: 'Play 50 games', check: s => s.totalGames >= 50 },
            { id: 'perfectionist', name: 'Perfectionist', icon: '💎', desc: 'Complete a boss without missing', check: s => s.perfectBosses >= 1 },
        ];

        // Codes
        const CODES = {
            'sharp': { coins: 100, message: 'You got 100 coins!' },
            'knifeparty': { coins: 500, message: 'You got 500 coins!' },
            'bossmode': { coins: 1000, message: 'You got 1000 coins!' },
            'goldenknife': { skin: 'golden', message: 'You unlocked the Golden knife!' },
            'shadowblade': { skin: 'shadow', message: 'You unlocked the Shadow knife!' },
        };

        // Game state
        let saveData = {
            coins: 0,
            highScore: 0,
            highStage: 0,
            ownedSkins: ['default'],
            equippedSkin: 'default',
            totalGames: 0,
            totalKnivesThrown: 0,
            totalApples: 0,
            totalCoinsEarned: 0,
            bossesBeaten: 0,
            bestCombo: 0,
            perfectBosses: 0,
            achievements: [],
            soundEnabled: true,
            redeemedCodes: []
        };

        let gameState = {
            score: 0,
            stage: 1,
            knivesLeft: 5,
            totalKnives: 5,
            logAngle: 0,
            logSpeed: 0.02,
            logRadius: 60,
            stuckKnives: [],
            apples: [],
            flyingKnife: null,
            gameOver: false,
            isBoss: false,
            coinsThisGame: 0,
            combo: 0,
            maxComboThisGame: 0,
            particles: [],
            screenShake: 0,
            perfectStage: true
        };

        // Load/Save
        function loadSaveData() {
            const saved = localStorage.getItem('knifeHit');
            if (saved) saveData = { ...saveData, ...JSON.parse(saved) };
        }

        function saveSaveData() {
            localStorage.setItem('knifeHit', JSON.stringify(saveData));
        }

        // Get current skin
        function getCurrentSkin() {
            return SKINS.find(s => s.id === saveData.equippedSkin) || SKINS[0];
        }

        // Get current log type based on stage
        function getLogType() {
            const index = Math.floor((gameState.stage - 1) / 10) % LOG_TYPES.length;
            return LOG_TYPES[index];
        }

        // Toggle sound
        function toggleSound() {
            saveData.soundEnabled = !saveData.soundEnabled;
            document.getElementById('soundBtn').textContent = saveData.soundEnabled ? '🔊' : '🔇';
            saveSaveData();
        }

        // Update sound button on load
        function updateSoundButton() {
            document.getElementById('soundBtn').textContent = saveData.soundEnabled ? '🔊' : '🔇';
        }

        // Draw knife based on skin
        function drawKnife(ctx, x, y, skin) {
            ctx.save();
            ctx.translate(x, y);

            switch(skin.id) {
                case 'golden':
                    // Golden dagger with shine
                    const goldGrad = ctx.createLinearGradient(-6, -25, 6, 10);
                    goldGrad.addColorStop(0, '#FFD700');
                    goldGrad.addColorStop(0.5, '#FFF8DC');
                    goldGrad.addColorStop(1, '#DAA520');
                    ctx.fillStyle = goldGrad;
                    ctx.beginPath();
                    ctx.moveTo(0, -28);
                    ctx.lineTo(-7, 8);
                    ctx.lineTo(0, 5);
                    ctx.lineTo(7, 8);
                    ctx.closePath();
                    ctx.fill();
                    ctx.strokeStyle = '#B8860B';
                    ctx.lineWidth = 1;
                    ctx.stroke();
                    // Gold handle
                    ctx.fillStyle = '#8B4513';
                    ctx.fillRect(-5, 8, 10, 18);
                    ctx.fillStyle = '#FFD700';
                    ctx.fillRect(-6, 8, 12, 3);
                    ctx.fillRect(-6, 23, 12, 3);
                    break;

                case 'flame':
                    // Flaming blade
                    const flameGrad = ctx.createLinearGradient(0, -30, 0, 10);
                    flameGrad.addColorStop(0, '#ff0000');
                    flameGrad.addColorStop(0.3, '#ff6600');
                    flameGrad.addColorStop(0.6, '#ffcc00');
                    flameGrad.addColorStop(1, '#ff6600');
                    ctx.fillStyle = flameGrad;
                    ctx.beginPath();
                    ctx.moveTo(0, -30);
                    ctx.quadraticCurveTo(-10, -15, -8, 0);
                    ctx.quadraticCurveTo(-6, 8, 0, 10);
                    ctx.quadraticCurveTo(6, 8, 8, 0);
                    ctx.quadraticCurveTo(10, -15, 0, -30);
                    ctx.fill();
                    // Dark handle
                    ctx.fillStyle = '#222';
                    ctx.fillRect(-5, 10, 10, 20);
                    ctx.fillStyle = '#ff4400';
                    ctx.fillRect(-6, 10, 12, 3);
                    break;

                case 'ice':
                    // Crystal ice blade
                    const iceGrad = ctx.createLinearGradient(-8, -25, 8, 10);
                    iceGrad.addColorStop(0, '#e0ffff');
                    iceGrad.addColorStop(0.5, '#00d4ff');
                    iceGrad.addColorStop(1, '#0099cc');
                    ctx.fillStyle = iceGrad;
                    ctx.beginPath();
                    ctx.moveTo(0, -28);
                    ctx.lineTo(-4, -20);
                    ctx.lineTo(-8, -10);
                    ctx.lineTo(-6, 0);
                    ctx.lineTo(-7, 10);
                    ctx.lineTo(0, 8);
                    ctx.lineTo(7, 10);
                    ctx.lineTo(6, 0);
                    ctx.lineTo(8, -10);
                    ctx.lineTo(4, -20);
                    ctx.closePath();
                    ctx.fill();
                    ctx.strokeStyle = '#fff';
                    ctx.lineWidth = 1;
                    ctx.stroke();
                    // Ice handle
                    ctx.fillStyle = '#4a90a4';
                    ctx.fillRect(-5, 10, 10, 18);
                    break;

                case 'toxic':
                    // Toxic dripping blade
                    ctx.fillStyle = '#00ff00';
                    ctx.beginPath();
                    ctx.moveTo(0, -25);
                    ctx.lineTo(-6, 10);
                    ctx.lineTo(6, 10);
                    ctx.closePath();
                    ctx.fill();
                    // Drip effects
                    ctx.fillStyle = '#00cc00';
                    ctx.beginPath();
                    ctx.ellipse(-4, 12, 3, 5, 0, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.ellipse(3, 15, 2, 4, 0, 0, Math.PI * 2);
                    ctx.fill();
                    // Handle
                    ctx.fillStyle = '#1a1a1a';
                    ctx.fillRect(-5, 10, 10, 20);
                    ctx.fillStyle = '#00ff00';
                    ctx.fillRect(-3, 12, 6, 2);
                    ctx.fillRect(-3, 18, 6, 2);
                    ctx.fillRect(-3, 24, 6, 2);
                    break;

                case 'royal':
                    // Ornate royal dagger
                    const royalGrad = ctx.createLinearGradient(-6, -25, 6, 10);
                    royalGrad.addColorStop(0, '#9b59b6');
                    royalGrad.addColorStop(0.5, '#8e44ad');
                    royalGrad.addColorStop(1, '#6c3483');
                    ctx.fillStyle = royalGrad;
                    ctx.beginPath();
                    ctx.moveTo(0, -28);
                    ctx.lineTo(-8, -5);
                    ctx.lineTo(-6, 10);
                    ctx.lineTo(6, 10);
                    ctx.lineTo(8, -5);
                    ctx.closePath();
                    ctx.fill();
                    ctx.strokeStyle = '#FFD700';
                    ctx.lineWidth = 2;
                    ctx.stroke();
                    // Gem
                    ctx.fillStyle = '#e74c3c';
                    ctx.beginPath();
                    ctx.arc(0, -5, 4, 0, Math.PI * 2);
                    ctx.fill();
                    // Fancy handle
                    ctx.fillStyle = '#4a235a';
                    ctx.fillRect(-6, 10, 12, 20);
                    ctx.fillStyle = '#FFD700';
                    ctx.fillRect(-7, 10, 14, 3);
                    ctx.fillRect(-7, 27, 14, 3);
                    break;

                case 'rainbow':
                    // Rainbow blade
                    const rainbowGrad = ctx.createLinearGradient(0, -25, 0, 10);
                    rainbowGrad.addColorStop(0, '#ff0000');
                    rainbowGrad.addColorStop(0.2, '#ff9900');
                    rainbowGrad.addColorStop(0.4, '#ffff00');
                    rainbowGrad.addColorStop(0.6, '#00ff00');
                    rainbowGrad.addColorStop(0.8, '#0099ff');
                    rainbowGrad.addColorStop(1, '#9900ff');
                    ctx.fillStyle = rainbowGrad;
                    ctx.beginPath();
                    ctx.moveTo(0, -25);
                    ctx.lineTo(-6, 10);
                    ctx.lineTo(6, 10);
                    ctx.closePath();
                    ctx.fill();
                    // Sparkly handle
                    ctx.fillStyle = '#ff69b4';
                    ctx.fillRect(-5, 10, 10, 20);
                    ctx.fillStyle = '#fff';
                    ctx.fillRect(-2, 14, 4, 4);
                    ctx.fillRect(-2, 22, 4, 4);
                    break;

                case 'shadow':
                    // Dark shadow blade
                    const shadowGrad = ctx.createRadialGradient(0, -5, 0, 0, -5, 30);
                    shadowGrad.addColorStop(0, '#333');
                    shadowGrad.addColorStop(1, '#000');
                    ctx.fillStyle = shadowGrad;
                    ctx.beginPath();
                    ctx.moveTo(0, -28);
                    ctx.lineTo(-7, 8);
                    ctx.lineTo(0, 12);
                    ctx.lineTo(7, 8);
                    ctx.closePath();
                    ctx.fill();
                    // Shadow aura
                    ctx.strokeStyle = 'rgba(100, 0, 150, 0.5)';
                    ctx.lineWidth = 4;
                    ctx.stroke();
                    // Dark handle
                    ctx.fillStyle = '#1a1a1a';
                    ctx.fillRect(-5, 12, 10, 18);
                    ctx.fillStyle = '#4a0080';
                    ctx.fillRect(-6, 12, 12, 2);
                    break;

                case 'karambit':
                    // Curved karambit blade
                    ctx.fillStyle = skin.color;
                    ctx.beginPath();
                    ctx.moveTo(0, -20);
                    ctx.quadraticCurveTo(-20, -10, -15, 10);
                    ctx.quadraticCurveTo(-10, 15, 0, 10);
                    ctx.quadraticCurveTo(-5, 0, 0, -20);
                    ctx.fill();
                    ctx.strokeStyle = '#8B0000';
                    ctx.lineWidth = 1;
                    ctx.stroke();
                    // Ring handle
                    ctx.fillStyle = '#222';
                    ctx.beginPath();
                    ctx.arc(5, 18, 8, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.fillStyle = '#444';
                    ctx.beginPath();
                    ctx.arc(5, 18, 5, 0, Math.PI * 2);
                    ctx.fill();
                    break;

                case 'balisong':
                    // Butterfly knife
                    ctx.fillStyle = skin.color;
                    ctx.beginPath();
                    ctx.moveTo(0, -25);
                    ctx.lineTo(-5, 5);
                    ctx.lineTo(5, 5);
                    ctx.closePath();
                    ctx.fill();
                    // Two handles
                    ctx.fillStyle = '#2c3e50';
                    ctx.save();
                    ctx.translate(-3, 8);
                    ctx.rotate(-0.2);
                    ctx.fillRect(-4, 0, 8, 22);
                    ctx.restore();
                    ctx.save();
                    ctx.translate(3, 8);
                    ctx.rotate(0.2);
                    ctx.fillRect(-4, 0, 8, 22);
                    ctx.restore();
                    // Hinges
                    ctx.fillStyle = '#7f8c8d';
                    ctx.beginPath();
                    ctx.arc(-3, 8, 3, 0, Math.PI * 2);
                    ctx.arc(3, 8, 3, 0, Math.PI * 2);
                    ctx.fill();
                    break;

                case 'slipper':
                    // Mom's slipper (chancla)
                    ctx.fillStyle = skin.color;
                    // Sole
                    ctx.beginPath();
                    ctx.ellipse(0, -5, 10, 20, 0, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.strokeStyle = '#c0392b';
                    ctx.lineWidth = 2;
                    ctx.stroke();
                    // Strap
                    ctx.fillStyle = '#d35400';
                    ctx.beginPath();
                    ctx.moveTo(-8, -10);
                    ctx.quadraticCurveTo(0, -20, 8, -10);
                    ctx.quadraticCurveTo(0, -5, -8, -10);
                    ctx.fill();
                    // Texture dots
                    ctx.fillStyle = '#f39c12';
                    for (let i = -5; i <= 5; i += 5) {
                        for (let j = -15; j <= 10; j += 8) {
                            ctx.beginPath();
                            ctx.arc(i, j, 1.5, 0, Math.PI * 2);
                            ctx.fill();
                        }
                    }
                    break;

                default:
                    // Classic knife
                    ctx.fillStyle = skin.color;
                    ctx.beginPath();
                    ctx.moveTo(0, -25);
                    ctx.lineTo(-6, 10);
                    ctx.lineTo(6, 10);
                    ctx.closePath();
                    ctx.fill();
                    // Handle
                    ctx.fillStyle = '#333';
                    ctx.fillRect(-5, 10, 10, 20);
            }

            ctx.restore();
        }

        // Show combo

            if (gameState.combo >= 3) {
                const comboEl = document.getElementById('comboDisplay');
                comboEl.textContent = `${gameState.combo}x COMBO!`;
                comboEl.classList.remove('active');
                void comboEl.offsetWidth; // Trigger reflow
                comboEl.classList.add('active');
                playSound('combo');
            }
        }

        // Spawn particles
        function spawnParticles(x, y, color, count = 10) {
            for (let i = 0; i < count; i++) {
                gameState.particles.push({
                    x: x,
                    y: y,
                    vx: (Math.random() - 0.5) * 10,
                    vy: (Math.random() - 0.5) * 10,
                    life: 30,
                    color: color,
                    size: 3 + Math.random() * 4
                });
            }
        }

        // Screen shake

            gameState.screenShake = intensity;
        }

        // Codes
        function showCodes() {
            document.getElementById('codeInput').value = '';
            document.getElementById('codeMessage').textContent = '';
            document.getElementById('codeMessage').className = 'code-message';
            document.getElementById('codesScreen').classList.remove('hidden');
        }

        function hideCodes() {
            document.getElementById('codesScreen').classList.add('hidden');
        }

        function redeemCode() {
            const input = document.getElementById('codeInput');
            const messageEl = document.getElementById('codeMessage');
            const code = input.value.toLowerCase().trim();

            if (!code) {
                messageEl.textContent = 'Please enter a code!';
                messageEl.className = 'code-message error';
                return;
            }

            if (saveData.redeemedCodes.includes(code)) {
                messageEl.textContent = 'Code already redeemed!';
                messageEl.className = 'code-message error';
                return;
            }

            const codeData = CODES[code];
            if (!codeData) {
                messageEl.textContent = 'Invalid code!';
                messageEl.className = 'code-message error';
                return;
            }

            // Redeem the code
            saveData.redeemedCodes.push(code);

            if (codeData.coins) {
                saveData.coins += codeData.coins;
                saveData.totalCoinsEarned += codeData.coins;
            }

            if (codeData.skin && !saveData.ownedSkins.includes(codeData.skin)) {
                saveData.ownedSkins.push(codeData.skin);
            }

            saveSaveData();
            updateUI();
            playSound('achievement');

            messageEl.textContent = codeData.message;
            messageEl.className = 'code-message';
            input.value = '';
        }

        // Update background based on stage
        function updateBackground() {
            const stage = gameState.stage;
            let gradient;
            if (stage < 10) {
                gradient = 'linear-gradient(180deg, #1a1a2e 0%, #16213e 100%)';
            } else if (stage < 20) {
                gradient = 'linear-gradient(180deg, #1a1a2e 0%, #2d3436 100%)';
            } else if (stage < 30) {
                gradient = 'linear-gradient(180deg, #0c0c1e 0%, #1e3799 100%)';
            } else if (stage < 40) {
                gradient = 'linear-gradient(180deg, #1e0a0a 0%, #6b2d2d 100%)';
            } else {
                gradient = 'linear-gradient(180deg, #0a001a 0%, #2d0a4e 100%)';
            }
            document.body.style.background = gradient;
        }

        // Start game
        function startGame() {
            initAudio();
            document.getElementById('startScreen').classList.add('hidden');
            document.getElementById('gameOverScreen').classList.add('hidden');

            gameState = {
                score: 0,
                stage: 1,
                knivesLeft: 5,
                totalKnives: 5,
                logAngle: 0,
                logSpeed: 0.02,
                logRadius: 60,
                stuckKnives: [],
                apples: [],
                flyingKnife: null,
                gameOver: false,
                isBoss: false,
                coinsThisGame: 0,
                combo: 0,
                maxComboThisGame: 0,
                particles: [],
                screenShake: 0,
                perfectStage: true
            };

            updateBackground();
            setupStage();
            updateUI();
            gameLoop();
        }

        // Setup stage
        function setupStage() {
            gameState.stuckKnives = [];
            gameState.apples = [];
            gameState.flyingKnife = null;
            gameState.isBoss = gameState.stage % 5 === 0;

            // Difficulty scaling
            const baseKnives = 5;
            const extraKnives = Math.floor(gameState.stage / 3);
            gameState.totalKnives = Math.min(baseKnives + extraKnives, 12);
            gameState.knivesLeft = gameState.totalKnives;

            // Log speed increases
            gameState.logSpeed = 0.02 + (gameState.stage * 0.003);
            if (gameState.isBoss) {
                gameState.logSpeed *= 1.5;
                gameState.logRadius = 80;
                showBossWarning();
            } else {
                gameState.logRadius = 60;
            }

            // Pre-stuck knives on higher stages
            if (gameState.stage > 3) {
                const preStuck = Math.min(Math.floor((gameState.stage - 3) / 2), 4);
                for (let i = 0; i < preStuck; i++) {
                    gameState.stuckKnives.push({
                        angle: (Math.PI * 2 / preStuck) * i
                    });
                }
            }

            // Random apples
            if (Math.random() < 0.3 + gameState.stage * 0.05) {
                const numApples = Math.random() < 0.3 ? 2 : 1;
                for (let i = 0; i < numApples; i++) {
                    let angle;
                    do {
                        angle = Math.random() * Math.PI * 2;
                    } while (gameState.stuckKnives.some(k => Math.abs(k.angle - angle) < 0.3));
                    gameState.apples.push({ angle });
                }
            }

            updateKnivesUI();
        }

        function showBossWarning() {
            const warning = document.createElement('div');
            warning.className = 'boss-warning';
            warning.textContent = 'BOSS!';
            document.body.appendChild(warning);
            setTimeout(() => warning.remove(), 1500);
        }

        // Update UI
        function updateUI() {
            document.getElementById('stage').textContent = gameState.stage;
            document.getElementById('score').textContent = gameState.score;
            document.getElementById('coins').textContent = saveData.coins;
        }

        function updateKnivesUI() {
            const container = document.getElementById('knivesRemaining');
            container.innerHTML = '';
            for (let i = 0; i < gameState.totalKnives; i++) {
                const dot = document.createElement('div');
                dot.className = 'knife-dot' + (i >= gameState.knivesLeft ? ' used' : '');
                container.appendChild(dot);
            }
        }

        // Throw knife
        function throwKnife() {
            if (gameState.gameOver || gameState.flyingKnife || gameState.knivesLeft <= 0) return;

            initAudio();
            playSound('throw');

            gameState.flyingKnife = {
                x: canvas.width / 2,
                y: canvas.height - 80,
                speed: 20
            };
        }

        // Game loop
        let lastTime = 0;
        function gameLoop(timestamp) {
            if (gameState.gameOver) return;

            const dt = timestamp - lastTime;
            lastTime = timestamp;

            update();
            render();

            requestAnimationFrame(gameLoop);
        }

        function update() {
            // Update screen shake
            if (gameState.screenShake > 0) {
                gameState.screenShake *= 0.9;
                if (gameState.screenShake < 0.5) gameState.screenShake = 0;
            }

            // Update particles
            gameState.particles = gameState.particles.filter(p => {
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.3; // gravity
                p.life--;
                return p.life > 0;
            });

            // Rotate log (with direction changes for boss)
            if (gameState.isBoss && Math.random() < 0.01) {
                gameState.logSpeed *= -1;
            }
            gameState.logAngle += gameState.logSpeed;

            // Move flying knife
            if (gameState.flyingKnife) {
                gameState.flyingKnife.y -= gameState.flyingKnife.speed;

                const logCenterX = canvas.width / 2;
                const logCenterY = 180;
                const knifeY = gameState.flyingKnife.y;

                // Check if knife reached log
                if (knifeY <= logCenterY + gameState.logRadius + 40) {
                    // Normalize angle to 0-2π range
                    const normalize = (angle) => {
                        let a = angle % (Math.PI * 2);
                        if (a < 0) a += Math.PI * 2;
                        return a;
                    };

                    // The knife enters at the bottom of the log (world angle 3π/2)
                    const entryAngle = Math.PI * 1.5; // 3π/2 = bottom of log

                    // Check collision - only with knives currently on the FRONT (visible) half
                    const hitKnife = gameState.stuckKnives.some(stuck => {
                        // Get world-space position of this stuck knife
                        const worldAngle = normalize(stuck.angle + gameState.logAngle);

                        // Only check knives on the front half (bottom half, from π to 2π)
                        // This is the visible side facing the player
                        const isOnFrontHalf = worldAngle > Math.PI * 0.75 && worldAngle < Math.PI * 2.25;
                        // Handle wrap-around: also include 0 to π/4 (which is 2π to 2.25π wrapped)
                        const isOnFront = isOnFrontHalf || worldAngle < Math.PI * 0.25;

                        if (!isOnFront) return false; // Ignore knives on the back

                        // Check if this knife is at the entry point
                        let diff = Math.abs(worldAngle - entryAngle);
                        if (diff > Math.PI) diff = Math.PI * 2 - diff;
                        return diff < 0.2; // Tighter collision (~11 degrees)
                    });

                    // Store the knife angle for later
                    const newKnifeAngle = -Math.PI / 2 - gameState.logAngle;
                    const normalizedNew = normalize(newKnifeAngle);

                    if (hitKnife) {
                        // Game over - reset combo
                        gameState.combo = 0;
                        gameState.perfectStage = false;
                        playSound('fail');
                        triggerScreenShake(15);
                        spawnParticles(logCenterX, logCenterY, '#e94560', 20);
                        endGame();
                        return;
                    }

                    // Stick knife to log - success!
                    playSound('hit');
                    triggerScreenShake(3);
                    const skin = getCurrentSkin();
                    spawnParticles(logCenterX, logCenterY - gameState.logRadius, skin.color, 8);

                    // Store with normalized angle
                    gameState.stuckKnives.push({
                        angle: normalizedNew
                    });

                    // Increment combo
                    gameState.combo++;
                    if (gameState.combo > gameState.maxComboThisGame) {
                        gameState.maxComboThisGame = gameState.combo;
                    }
                    if (gameState.combo > saveData.bestCombo) {
                        saveData.bestCombo = gameState.combo;
                    }
                    showCombo();

                    // Track stats
                    saveData.totalKnivesThrown++;

                    // Check apple collision
                    let hitApple = false;
                    gameState.apples = gameState.apples.filter(apple => {
                        const appleAngle = apple.angle + gameState.logAngle;
                        const normalizedApple = ((appleAngle % (Math.PI * 2)) + Math.PI * 2) % (Math.PI * 2);
                        const knifeNorm = ((-Math.PI / 2 % (Math.PI * 2)) + Math.PI * 2) % (Math.PI * 2);
                        const diff = Math.abs(normalizedApple - knifeNorm);
                        if (diff < 0.3 || diff > Math.PI * 2 - 0.3) {
                            playSound('apple');
                            hitApple = true;
                            gameState.score += 5;
                            gameState.coinsThisGame += 2;
                            saveData.coins += 2;
                            saveData.totalApples++;
                            saveData.totalCoinsEarned += 2;
                            spawnParticles(logCenterX, logCenterY - gameState.logRadius - 25, '#ff0000', 12);
                            return false;
                        }
                        return true;
                    });

                    gameState.flyingKnife = null;
                    gameState.knivesLeft--;
                    gameState.score++;
                    updateKnivesUI();
                    updateUI();

                    // Check stage complete
                    if (gameState.knivesLeft <= 0) {
                        playSound('stage');

                        // Track boss completion
                        if (gameState.isBoss) {
                            saveData.bossesBeaten++;
                            if (gameState.perfectStage) {
                                saveData.perfectBosses++;
                            }
                        }

                        gameState.stage++;
                        const stageBonus = gameState.isBoss ? 10 : 5;
                        gameState.coinsThisGame += stageBonus;
                        saveData.coins += stageBonus;
                        saveData.totalCoinsEarned += stageBonus;

                        // Reset for next stage
                        gameState.perfectStage = true;

                        updateBackground();
                        checkAchievements();
                        saveSaveData();
                        setTimeout(setupStage, 500);
                    }
                }
            }
        }

        function render() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Apply screen shake
            ctx.save();
            if (gameState.screenShake > 0) {
                const shakeX = (Math.random() - 0.5) * gameState.screenShake * 2;
                const shakeY = (Math.random() - 0.5) * gameState.screenShake * 2;
                ctx.translate(shakeX, shakeY);
            }

            const centerX = canvas.width / 2;
            const centerY = 180;

            // Get log type for current stage
            const logType = getLogType();
            const logColors = gameState.isBoss ? logType.bossColors : logType.colors;

            // Draw log
            ctx.save();
            ctx.translate(centerX, centerY);
            ctx.rotate(gameState.logAngle);

            // Log body
            const gradient = ctx.createRadialGradient(0, 0, 0, 0, 0, gameState.logRadius);
            gradient.addColorStop(0, logColors[0]);
            gradient.addColorStop(0.7, logColors[1]);
            gradient.addColorStop(1, logColors[2]);
            ctx.beginPath();
            ctx.arc(0, 0, gameState.logRadius, 0, Math.PI * 2);
            ctx.fillStyle = gradient;
            ctx.fill();

            // Tree rings
            ctx.strokeStyle = `${logColors[1]}80`;
            ctx.lineWidth = 2;
            for (let r = 15; r < gameState.logRadius; r += 15) {
                ctx.beginPath();
                ctx.arc(0, 0, r, 0, Math.PI * 2);
                ctx.stroke();
            }

            // Draw stuck knives
            const skin = getCurrentSkin();
            gameState.stuckKnives.forEach(knife => {
                ctx.save();
                ctx.rotate(knife.angle);
                drawKnife(ctx, 0, -gameState.logRadius - 30, skin);
                ctx.restore();
            });

            // Draw apples
            gameState.apples.forEach(apple => {
                ctx.save();
                ctx.rotate(apple.angle);
                ctx.translate(0, -gameState.logRadius - 25);
                ctx.font = '30px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('🍎', 0, 10);
                ctx.restore();
            });

            ctx.restore();

            // Draw flying knife
            if (gameState.flyingKnife) {
                const k = gameState.flyingKnife;
                drawKnife(ctx, k.x, k.y, skin);
            }

            // Draw waiting knife
            if (!gameState.flyingKnife && gameState.knivesLeft > 0) {
                drawKnife(ctx, centerX, canvas.height - 80, skin);
            }

            // Draw particles
            gameState.particles.forEach(p => {
                ctx.globalAlpha = p.life / 30;
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
            });
            ctx.globalAlpha = 1;

            // Restore from screen shake
            ctx.restore();
        }

        function endGame() {
            gameState.gameOver = true;

            saveData.totalGames++;
            if (gameState.score > saveData.highScore) saveData.highScore = gameState.score;
            if (gameState.stage > saveData.highStage) saveData.highStage = gameState.stage;
            saveSaveData();

            document.getElementById('finalScore').textContent = gameState.score;
            document.getElementById('finalStage').textContent = gameState.stage;
            document.getElementById('coinsEarned').textContent = gameState.coinsThisGame;
            document.getElementById('gameOverScreen').classList.remove('hidden');
        }

        // Shop
        function showShop() {
            document.getElementById('shopCoins').textContent = saveData.coins;
            const grid = document.getElementById('skinGrid');
            grid.innerHTML = SKINS.map(skin => {
                const owned = saveData.ownedSkins.includes(skin.id);
                const equipped = saveData.equippedSkin === skin.id;
                return `
                    <div class="skin-item ${owned ? 'owned' : 'locked'} ${equipped ? 'equipped' : ''}"
                         onclick="buySkin('${skin.id}')">
                        <div class="skin-icon">${skin.icon}</div>
                        ${!owned ? `<div class="skin-cost">${skin.price} 🪙</div>` : ''}
                        ${equipped ? '<div style="color: #FFD700; font-size: 0.7rem;">Equipped</div>' : ''}
                    </div>
                `;
            }).join('');
            document.getElementById('shopScreen').classList.remove('hidden');
        }

        function hideShop() {
            document.getElementById('shopScreen').classList.add('hidden');
        }

        function buySkin(id) {
            const skin = SKINS.find(s => s.id === id);
            if (saveData.ownedSkins.includes(id)) {
                saveData.equippedSkin = id;
            } else if (saveData.coins >= skin.price) {
                saveData.coins -= skin.price;
                saveData.ownedSkins.push(id);
                saveData.equippedSkin = id;
            }
            saveSaveData();
            updateUI();
            showShop();
        }

        // Input
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.overlay') &&
                !e.target.closest('.shop-overlay') &&
                !e.target.closest('.stats-overlay') &&
                !e.target.closest('.codes-overlay') &&
                !e.target.closest('.shop-btn') &&
                !e.target.closest('.stats-btn') &&
                !e.target.closest('.codes-btn') &&
                !e.target.closest('.sound-btn') &&
                !e.target.closest('.back-btn')) {
                throwKnife();
            }
        });

        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                throwKnife();
            }
        });

        // Init
        loadSaveData();
        updateSoundButton();
        updateUI();
    </script>
</body>
</html>
