<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doodle Jump</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: linear-gradient(180deg, #87CEEB 0%, #98D8C8 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
        }

        .hud {
            position: fixed; top: 20px; left: 0; right: 0;
            display: flex; justify-content: center; gap: 30px;
            z-index: 100;
        }
        .hud-item {
            background: rgba(255,255,255,0.9); padding: 10px 20px; border-radius: 15px;
            text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .hud-label { font-size: 0.7rem; color: #888; text-transform: uppercase; }
        .hud-value { font-size: 1.5rem; font-weight: bold; color: #2e7d32; }

        canvas {
            display: block;
            margin-top: 80px;
            background: linear-gradient(180deg,
                #e8f5e9 0%,
                #c8e6c9 20%,
                #a5d6a7 40%,
                #81c784 60%,
                #66bb6a 80%,
                #4caf50 100%
            );
            border: 4px solid #2e7d32;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }

        .instructions {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            color: #2e7d32; font-size: 0.9rem; text-align: center;
            background: rgba(255,255,255,0.9); padding: 10px 20px; border-radius: 10px;
        }

        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(46, 125, 50, 0.95); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 200;
        }
        .overlay.hidden { display: none; }
        .overlay h1 { color: #fff; font-size: 2.5rem; margin-bottom: 10px; }
        .overlay h2 { color: #ffeb3b; font-size: 2rem; margin-bottom: 20px; }
        .overlay p { color: rgba(255,255,255,0.8); font-size: 1.1rem; margin-bottom: 30px; text-align: center; }
        .overlay .score-display { color: #ffeb3b; font-size: 4rem; margin-bottom: 20px; font-weight: bold; }

        .btn {
            padding: 15px 50px; background: linear-gradient(135deg, #ffeb3b, #ffc107);
            color: #2e7d32; border: none; border-radius: 30px; font-size: 1.2rem;
            font-weight: bold; cursor: pointer; text-transform: uppercase;
            letter-spacing: 2px; transition: all 0.2s;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
        }
        .btn:hover { transform: translateY(-3px); box-shadow: 0 8px 30px rgba(0,0,0,0.3); }

        .stats-row {
            display: flex; gap: 40px; margin-bottom: 30px;
        }
        .stat-box {
            text-align: center;
        }
        .stat-box .value { color: #fff; font-size: 2rem; font-weight: bold; }
        .stat-box .label { color: rgba(255,255,255,0.7); font-size: 0.8rem; }

        .shop-btn {
            position: fixed; top: 20px; right: 20px;
            background: rgba(255,255,255,0.9); color: #2e7d32; padding: 10px 20px;
            border: none; border-radius: 10px; cursor: pointer; font-weight: bold;
            z-index: 250; box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .shop-btn:hover { transform: scale(1.05); }

        .back-btn {
            position: fixed; top: 20px; left: 20px;
            background: rgba(255,255,255,0.9); color: #2e7d32; padding: 10px 20px;
            border-radius: 10px; text-decoration: none; font-weight: bold;
            z-index: 250; box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .back-btn:hover { transform: scale(1.05); }

        .shop-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(46, 125, 50, 0.98); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 300;
        }
        .shop-overlay.hidden { display: none; }
        .shop-grid {
            display: grid; grid-template-columns: repeat(5, 80px); gap: 12px; margin: 30px 0;
        }
        .skin-item {
            width: 80px; height: 80px; background: rgba(255,255,255,0.15);
            border-radius: 15px; display: flex; flex-direction: column;
            align-items: center; justify-content: center; cursor: pointer;
            border: 3px solid transparent; transition: all 0.2s;
        }
        .skin-item:hover { background: rgba(255,255,255,0.25); }
        .skin-item.owned { border-color: #81c784; }
        .skin-item.equipped { border-color: #ffeb3b; background: rgba(255,235,59,0.2); }
        .skin-item.locked { opacity: 0.5; }
        .skin-icon { font-size: 2.5rem; margin-bottom: 5px; }
        .skin-cost { color: #ffeb3b; font-size: 0.8rem; }

        .powerup-indicator {
            position: fixed; top: 100px; left: 50%; transform: translateX(-50%);
            background: rgba(255,235,59,0.9); color: #2e7d32; padding: 8px 20px;
            border-radius: 20px; font-weight: bold; z-index: 150;
            animation: pulse 0.5s ease-in-out infinite alternate;
        }
        @keyframes pulse { from { transform: translateX(-50%) scale(1); } to { transform: translateX(-50%) scale(1.1); } }

        .stats-btn {
            position: fixed; top: 60px; left: 20px;
            background: rgba(255,255,255,0.9); color: #2e7d32; padding: 10px 20px;
            border: none; border-radius: 10px; cursor: pointer; font-weight: bold;
            z-index: 250; box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .stats-btn:hover { transform: scale(1.05); }

        .codes-btn {
            position: fixed; top: 100px; left: 20px;
            background: rgba(255,255,255,0.9); color: #2e7d32; padding: 10px 20px;
            border: none; border-radius: 10px; cursor: pointer; font-weight: bold;
            z-index: 250; box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .codes-btn:hover { transform: scale(1.05); }

        .sound-btn {
            position: fixed; top: 60px; right: 20px;
            background: rgba(255,255,255,0.9); color: #2e7d32; padding: 8px 15px;
            border: none; border-radius: 10px; cursor: pointer; font-size: 1.2rem;
            z-index: 250; box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .sound-btn:hover { transform: scale(1.05); }

        .stats-overlay, .codes-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(46, 125, 50, 0.98); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 300;
            overflow-y: auto; padding: 20px;
        }
        .stats-overlay.hidden, .codes-overlay.hidden { display: none; }

        .stats-grid {
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px;
            margin: 20px 0; max-width: 350px;
        }
        .stat-card {
            background: rgba(255,255,255,0.15); padding: 15px; border-radius: 15px; text-align: center;
        }
        .stat-card .icon { font-size: 1.8rem; margin-bottom: 8px; }
        .stat-card .value { font-size: 1.5rem; font-weight: bold; color: #ffeb3b; }
        .stat-card .label { font-size: 0.75rem; color: rgba(255,255,255,0.8); margin-top: 5px; }

        .achievements-grid {
            display: grid; grid-template-columns: repeat(4, 70px); gap: 10px; margin: 15px 0;
        }
        .achievement-item {
            width: 70px; height: 70px; background: rgba(255,255,255,0.1);
            border-radius: 12px; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            border: 2px solid transparent; opacity: 0.4;
        }
        .achievement-item.unlocked { opacity: 1; border-color: #ffeb3b; background: rgba(255,235,59,0.15); }
        .achievement-item .icon { font-size: 1.5rem; }
        .achievement-item .name { font-size: 0.5rem; color: rgba(255,255,255,0.8); margin-top: 3px; text-align: center; }

        .achievement-popup {
            position: fixed; top: 80px; right: 20px;
            background: linear-gradient(135deg, #ffeb3b, #ffc107);
            color: #2e7d32; padding: 15px 25px; border-radius: 15px;
            box-shadow: 0 5px 30px rgba(0,0,0,0.3);
            animation: slideInRight 0.5s ease-out, slideOutRight 0.5s ease-in 2.5s forwards;
            z-index: 400;
        }
        .achievement-popup h3 { font-size: 0.8rem; margin-bottom: 5px; }
        .achievement-popup p { font-size: 1rem; font-weight: bold; }
        @keyframes slideInRight { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes slideOutRight { from { transform: translateX(0); opacity: 1; } to { transform: translateX(100%); opacity: 0; } }

        .code-input {
            background: rgba(255,255,255,0.2); border: 2px solid rgba(255,255,255,0.3);
            color: #fff; padding: 15px 20px; border-radius: 10px;
            font-size: 1.2rem; text-align: center; width: 250px;
            margin: 20px 0;
        }
        .code-input:focus { outline: none; border-color: #ffeb3b; }
        .code-input::placeholder { color: rgba(255,255,255,0.5); }
        .code-message {
            color: #ffeb3b; font-size: 1.1rem; min-height: 30px; margin-bottom: 20px;
        }
        .code-message.error { color: #ff8a80; }
    </style>
</head>
<body>
    <a href="index.html" class="back-btn">← Back</a>
    <button class="stats-btn" onclick="showStats()">📊 Stats</button>
    <button class="codes-btn" onclick="showCodes()">🎁 Codes</button>
    <button class="shop-btn" onclick="showShop()">🎨 Skins</button>
    <button class="sound-btn" id="soundBtn" onclick="toggleSound()">🔊</button>

    <div class="hud">
        <div class="hud-item">
            <div class="hud-label">Score</div>
            <div class="hud-value" id="score">0</div>
        </div>
        <div class="hud-item">
            <div class="hud-label">High Score</div>
            <div class="hud-value" id="highScore">0</div>
        </div>
        <div class="hud-item">
            <div class="hud-label">Coins</div>
            <div class="hud-value" id="coins">0</div>
        </div>
    </div>

    <canvas id="gameCanvas" width="400" height="600"></canvas>

    <div class="instructions">← → Arrow keys or A/D to move</div>

    <div id="powerupIndicator" class="powerup-indicator" style="display: none;"></div>

    <!-- Start Screen -->
    <div class="overlay" id="startScreen">
        <h1>🐸 Doodle Jump</h1>
        <p>Jump from platform to platform!<br>Don't fall off the bottom!</p>
        <button class="btn" onclick="startGame()">PLAY</button>
    </div>

    <!-- Game Over Screen -->
    <div class="overlay hidden" id="gameOverScreen">
        <h2>Game Over!</h2>
        <div class="score-display" id="finalScore">0</div>
        <div class="stats-row">
            <div class="stat-box">
                <div class="value" id="finalHeight">0m</div>
                <div class="label">Height Reached</div>
            </div>
            <div class="stat-box">
                <div class="value" id="coinsEarned">0</div>
                <div class="label">Coins Earned</div>
            </div>
        </div>
        <button class="btn" onclick="startGame()">TRY AGAIN</button>
    </div>

    <!-- Shop -->
    <div class="shop-overlay hidden" id="shopScreen">
        <h1 style="color: #fff;">🎨 Character Skins</h1>
        <p style="color: rgba(255,255,255,0.8);">Coins: <span id="shopCoins">0</span></p>
        <div class="shop-grid" id="skinGrid"></div>
        <button class="btn" onclick="hideShop()">CLOSE</button>
    </div>

    <!-- Stats -->
    <div class="stats-overlay hidden" id="statsScreen">
        <h1 style="color: #fff;">📊 Statistics</h1>
        <div class="stats-grid" id="statsGrid"></div>
        <h2 style="color: #ffeb3b; margin-top: 15px;">🏆 Achievements</h2>
        <div class="achievements-grid" id="achievementsGrid"></div>
        <button class="btn" onclick="hideStats()" style="margin-top: 20px;">CLOSE</button>
    </div>

    <!-- Codes -->
    <div class="codes-overlay hidden" id="codesScreen">
        <h1 style="color: #fff;">🎁 Redeem Code</h1>
        <p style="color: rgba(255,255,255,0.8);">Enter a code to get rewards!</p>
        <input type="text" class="code-input" id="codeInput" placeholder="Enter code..." maxlength="30">
        <div class="code-message" id="codeMessage"></div>
        <div style="display: flex; gap: 15px;">
            <button class="btn" onclick="redeemCode()">REDEEM</button>
            <button class="btn" onclick="hideCodes()" style="background: linear-gradient(135deg, #81c784, #66bb6a);">CLOSE</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Audio
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx = null;
        function initAudio() { if (!audioCtx) audioCtx = new AudioContext(); }

        function playSound(type) {
            if (!audioCtx || !saveData.soundEnabled) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            const now = audioCtx.currentTime;

            switch(type) {
                case 'jump':
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(400, now);
                    osc.frequency.exponentialRampToValueAtTime(600, now + 0.1);
                    gain.gain.setValueAtTime(0.1, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                    osc.start(now);
                    osc.stop(now + 0.1);
                    break;
                case 'spring':
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(300, now);
                    osc.frequency.exponentialRampToValueAtTime(900, now + 0.2);
                    gain.gain.setValueAtTime(0.12, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
                    osc.start(now);
                    osc.stop(now + 0.2);
                    break;
                case 'jetpack':
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(100, now);
                    gain.gain.setValueAtTime(0.08, now);
                    osc.start(now);
                    osc.stop(now + 0.1);
                    break;
                case 'coin':
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(880, now);
                    osc.frequency.setValueAtTime(1100, now + 0.1);
                    gain.gain.setValueAtTime(0.08, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
                    osc.start(now);
                    osc.stop(now + 0.15);
                    break;
                case 'break':
                    osc.type = 'square';
                    osc.frequency.setValueAtTime(200, now);
                    osc.frequency.exponentialRampToValueAtTime(50, now + 0.2);
                    gain.gain.setValueAtTime(0.1, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
                    osc.start(now);
                    osc.stop(now + 0.2);
                    break;
                case 'fall':
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(300, now);
                    osc.frequency.exponentialRampToValueAtTime(50, now + 0.5);
                    gain.gain.setValueAtTime(0.15, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
                    osc.start(now);
                    osc.stop(now + 0.5);
                    break;
            }
        }

        // Skins
        const SKINS = [
            { id: 'default', name: 'Doodler', icon: '🐸', color: '#4caf50', price: 0 },
            { id: 'bunny', name: 'Bunny', icon: '🐰', color: '#f8bbd9', price: 50 },
            { id: 'robot', name: 'Robot', icon: '🤖', color: '#90a4ae', price: 100 },
            { id: 'alien', name: 'Alien', icon: '👽', color: '#80deea', price: 100 },
            { id: 'ninja', name: 'Ninja', icon: '🥷', color: '#424242', price: 150 },
            { id: 'unicorn', name: 'Unicorn', icon: '🦄', color: '#f48fb1', price: 200 },
            { id: 'dragon', name: 'Dragon', icon: '🐲', color: '#ff7043', price: 250 },
            { id: 'ghost', name: 'Ghost', icon: '👻', color: '#e0e0e0', price: 300 },
            { id: 'cat', name: 'Cat', icon: '🐱', color: '#ffcc80', price: 75 },
            { id: 'dog', name: 'Dog', icon: '🐶', color: '#bcaaa4', price: 75 },
            { id: 'panda', name: 'Panda', icon: '🐼', color: '#ffffff', price: 150 },
            { id: 'penguin', name: 'Penguin', icon: '🐧', color: '#37474f', price: 125 },
            { id: 'chicken', name: 'Chicken', icon: '🐔', color: '#fff9c4', price: 100 },
            { id: 'owl', name: 'Owl', icon: '🦉', color: '#8d6e63', price: 175 },
            { id: 'fox', name: 'Fox', icon: '🦊', color: '#ff8a65', price: 200 },
            { id: 'astronaut', name: 'Astronaut', icon: '👨‍🚀', color: '#eceff1', price: 350 },
            { id: 'wizard', name: 'Wizard', icon: '🧙', color: '#7e57c2', price: 400 },
            { id: 'superhero', name: 'Superhero', icon: '🦸', color: '#e53935', price: 500 },
        ];

        // Codes
        const CODES = {
            'jumpstart': { coins: 100, message: 'You got 100 coins!' },
            'highjump': { coins: 250, message: 'You got 250 coins!' },
            'tothemoon': { coins: 500, message: 'You got 500 coins!' },
            'spacefrog': { skin: 'astronaut', message: 'You unlocked the Astronaut!' },
            'wizardry': { skin: 'wizard', message: 'You unlocked the Wizard!' },
        };

        // Achievements
        const ACHIEVEMENTS = [
            { id: 'first_jump', name: 'First Steps', icon: '👶', desc: 'Play your first game', check: s => s.totalGames >= 1 },
            { id: 'height_100', name: 'Getting High', icon: '📏', desc: 'Reach 100m', check: s => s.highScore >= 100 },
            { id: 'height_500', name: 'Sky High', icon: '☁️', desc: 'Reach 500m', check: s => s.highScore >= 500 },
            { id: 'height_1000', name: 'To The Clouds', icon: '🌤️', desc: 'Reach 1000m', check: s => s.highScore >= 1000 },
            { id: 'height_2500', name: 'Stratosphere', icon: '✈️', desc: 'Reach 2500m', check: s => s.highScore >= 2500 },
            { id: 'height_5000', name: 'Space Bound', icon: '🚀', desc: 'Reach 5000m', check: s => s.highScore >= 5000 },
            { id: 'coins_100', name: 'Coin Collector', icon: '🪙', desc: 'Collect 100 total coins', check: s => s.totalCoins >= 100 },
            { id: 'coins_500', name: 'Coin Hoarder', icon: '💰', desc: 'Collect 500 total coins', check: s => s.totalCoins >= 500 },
            { id: 'games_10', name: 'Regular Jumper', icon: '🎮', desc: 'Play 10 games', check: s => s.totalGames >= 10 },
            { id: 'games_50', name: 'Dedicated', icon: '🏅', desc: 'Play 50 games', check: s => s.totalGames >= 50 },
            { id: 'skins_5', name: 'Fashionista', icon: '👗', desc: 'Own 5 skins', check: s => s.ownedSkins.length >= 5 },
            { id: 'skins_all', name: 'Collector', icon: '🏆', desc: 'Own all skins', check: s => s.ownedSkins.length >= SKINS.length },
        ];

        // Platform types
        const PLATFORM_TYPES = {
            normal: { color: '#4caf50', width: 70 },
            moving: { color: '#2196f3', width: 70 },
            breaking: { color: '#8d6e63', width: 60 },
            spring: { color: '#ff9800', width: 70 },
        };

        // Game state
        let saveData = {
            coins: 0,
            highScore: 0,
            ownedSkins: ['default'],
            equippedSkin: 'default',
            totalGames: 0,
            totalCoins: 0,
            totalHeight: 0,
            totalJumps: 0,
            achievements: [],
            redeemedCodes: [],
            soundEnabled: true
        };

        let gameState = {
            player: { x: 0, y: 0, vx: 0, vy: 0, width: 40, height: 40 },
            platforms: [],
            coins: [],
            powerups: [],
            score: 0,
            maxHeight: 0,
            cameraY: 0,
            gameOver: false,
            coinsThisGame: 0,
            activePowerup: null,
            powerupTimer: 0,
            facingRight: true
        };

        const GRAVITY = 0.4;
        const JUMP_FORCE = -13;
        const SPRING_FORCE = -20;
        const JETPACK_FORCE = -0.8;
        const MOVE_SPEED = 6;

        // Load/Save
        function loadSaveData() {
            const saved = localStorage.getItem('doodleJump');
            if (saved) saveData = { ...saveData, ...JSON.parse(saved) };
        }

        function saveSaveData() {
            localStorage.setItem('doodleJump', JSON.stringify(saveData));
        }

        // Get current skin
        function getCurrentSkin() {
            return SKINS.find(s => s.id === saveData.equippedSkin) || SKINS[0];
        }

        // Generate platforms
        function generatePlatforms(startY, endY) {
            let y = startY;
            while (y > endY) {
                const gap = 60 + Math.random() * 40;
                y -= gap;

                const difficulty = Math.min(gameState.maxHeight / 5000, 1);

                let type = 'normal';
                const rand = Math.random();
                if (rand < 0.1 * difficulty) {
                    type = 'breaking';
                } else if (rand < 0.2 + 0.1 * difficulty) {
                    type = 'moving';
                } else if (rand < 0.25) {
                    type = 'spring';
                }

                const platform = {
                    x: 30 + Math.random() * (canvas.width - 100),
                    y: y,
                    type: type,
                    width: PLATFORM_TYPES[type].width,
                    height: 15,
                    broken: false,
                    moveDir: Math.random() > 0.5 ? 1 : -1,
                    moveSpeed: 1 + Math.random() * 2
                };

                gameState.platforms.push(platform);

                // Add coin sometimes
                if (Math.random() < 0.2) {
                    gameState.coins.push({
                        x: platform.x + platform.width / 2,
                        y: platform.y - 30,
                        collected: false
                    });
                }

                // Add powerup rarely
                if (Math.random() < 0.03 && gameState.maxHeight > 500) {
                    gameState.powerups.push({
                        x: platform.x + platform.width / 2 - 15,
                        y: platform.y - 35,
                        type: Math.random() > 0.5 ? 'jetpack' : 'propeller',
                        collected: false
                    });
                }
            }
        }

        // Start game
        function startGame() {
            initAudio();
            document.getElementById('startScreen').classList.add('hidden');
            document.getElementById('gameOverScreen').classList.add('hidden');

            gameState = {
                player: {
                    x: canvas.width / 2 - 20,
                    y: canvas.height - 100,
                    vx: 0,
                    vy: 0,
                    width: 40,
                    height: 40
                },
                platforms: [],
                coins: [],
                powerups: [],
                score: 0,
                maxHeight: 0,
                cameraY: 0,
                gameOver: false,
                coinsThisGame: 0,
                activePowerup: null,
                powerupTimer: 0,
                facingRight: true
            };

            // Initial platforms
            gameState.platforms.push({
                x: canvas.width / 2 - 35,
                y: canvas.height - 50,
                type: 'normal',
                width: 70,
                height: 15
            });

            generatePlatforms(canvas.height - 100, -200);

            updateUI();
            gameLoop();
        }

        // Update UI
        function updateUI() {
            document.getElementById('score').textContent = gameState.score;
            document.getElementById('highScore').textContent = saveData.highScore;
            document.getElementById('coins').textContent = saveData.coins;
        }

        // Input handling
        const keys = {};
        document.addEventListener('keydown', e => {
            keys[e.code] = true;
            if (['ArrowLeft', 'ArrowRight', 'ArrowUp', 'KeyA', 'KeyD', 'KeyW', 'Space'].includes(e.code)) {
                e.preventDefault();
            }
        });
        document.addEventListener('keyup', e => keys[e.code] = false);

        // Touch/tilt controls for mobile
        let touchX = null;
        canvas.addEventListener('touchstart', e => {
            touchX = e.touches[0].clientX;
        });
        canvas.addEventListener('touchmove', e => {
            if (touchX !== null) {
                const newX = e.touches[0].clientX;
                const diff = newX - touchX;
                gameState.player.vx = diff * 0.3;
                touchX = newX;
            }
        });
        canvas.addEventListener('touchend', () => touchX = null);

        // Game loop
        let lastTime = 0;
        function gameLoop(timestamp) {
            if (gameState.gameOver) return;

            update();
            render();

            requestAnimationFrame(gameLoop);
        }

        function update() {
            const player = gameState.player;

            // Input
            if (keys['ArrowLeft'] || keys['KeyA']) {
                player.vx = -MOVE_SPEED;
                gameState.facingRight = false;
            } else if (keys['ArrowRight'] || keys['KeyD']) {
                player.vx = MOVE_SPEED;
                gameState.facingRight = true;
            } else {
                player.vx *= 0.8;
            }

            // Powerup effect
            if (gameState.activePowerup) {
                gameState.powerupTimer--;
                if (gameState.activePowerup === 'jetpack') {
                    player.vy = Math.max(player.vy + JETPACK_FORCE, -8);
                    if (Math.random() < 0.3) playSound('jetpack');
                } else if (gameState.activePowerup === 'propeller') {
                    player.vy = Math.max(player.vy + JETPACK_FORCE * 0.7, -6);
                }

                if (gameState.powerupTimer <= 0) {
                    gameState.activePowerup = null;
                    document.getElementById('powerupIndicator').style.display = 'none';
                }
            } else {
                // Gravity
                player.vy += GRAVITY;
            }

            // Movement
            player.x += player.vx;
            player.y += player.vy;

            // Wrap around screen
            if (player.x < -player.width) player.x = canvas.width;
            if (player.x > canvas.width) player.x = -player.width;

            // Platform collision (only when falling)
            if (player.vy > 0) {
                gameState.platforms.forEach(plat => {
                    if (plat.broken) return;

                    const platScreenY = plat.y - gameState.cameraY;
                    const playerBottom = player.y + player.height;
                    const playerScreenBottom = playerBottom - gameState.cameraY;

                    if (player.x < plat.x + plat.width &&
                        player.x + player.width > plat.x &&
                        playerBottom >= plat.y &&
                        playerBottom <= plat.y + plat.height + player.vy) {

                        if (plat.type === 'breaking') {
                            plat.broken = true;
                            playSound('break');
                        } else if (plat.type === 'spring') {
                            player.vy = SPRING_FORCE;
                            playSound('spring');
                        } else {
                            player.vy = JUMP_FORCE;
                            playSound('jump');
                        }

                        player.y = plat.y - player.height;
                    }
                });
            }

            // Move moving platforms
            gameState.platforms.forEach(plat => {
                if (plat.type === 'moving') {
                    plat.x += plat.moveDir * plat.moveSpeed;
                    if (plat.x <= 10 || plat.x >= canvas.width - plat.width - 10) {
                        plat.moveDir *= -1;
                    }
                }
            });

            // Collect coins
            gameState.coins.forEach(coin => {
                if (coin.collected) return;
                const coinScreenY = coin.y - gameState.cameraY;
                if (Math.abs(player.x + player.width/2 - coin.x) < 25 &&
                    Math.abs(player.y + player.height/2 - (coinScreenY + gameState.cameraY)) < 25) {
                    coin.collected = true;
                    gameState.coinsThisGame++;
                    saveData.coins++;
                    saveData.totalCoins++;
                    playSound('coin');
                    updateUI();
                    checkAchievements();
                }
            });

            // Collect powerups
            gameState.powerups.forEach(pu => {
                if (pu.collected) return;
                if (Math.abs(player.x + player.width/2 - pu.x - 15) < 30 &&
                    Math.abs(player.y + player.height/2 - (pu.y - gameState.cameraY + gameState.cameraY)) < 30) {
                    pu.collected = true;
                    gameState.activePowerup = pu.type;
                    gameState.powerupTimer = pu.type === 'jetpack' ? 180 : 120;
                    document.getElementById('powerupIndicator').textContent =
                        pu.type === 'jetpack' ? '🚀 Jetpack!' : '🌀 Propeller!';
                    document.getElementById('powerupIndicator').style.display = 'block';
                    playSound('spring');
                }
            });

            // Camera follows player up
            const targetCameraY = Math.min(gameState.cameraY, player.y - canvas.height / 2);
            if (player.y < gameState.cameraY + canvas.height / 3) {
                gameState.cameraY = player.y - canvas.height / 3;
            }

            // Update score based on height
            const currentHeight = Math.floor(-player.y / 10);
            if (currentHeight > gameState.maxHeight) {
                gameState.maxHeight = currentHeight;
                gameState.score = currentHeight;
                updateUI();
            }

            // Generate new platforms as we go up
            const highestPlat = Math.min(...gameState.platforms.map(p => p.y));
            if (highestPlat > gameState.cameraY - 200) {
                generatePlatforms(highestPlat, gameState.cameraY - 600);
            }

            // Remove platforms below screen
            gameState.platforms = gameState.platforms.filter(p => p.y < gameState.cameraY + canvas.height + 100);
            gameState.coins = gameState.coins.filter(c => c.y < gameState.cameraY + canvas.height + 100);
            gameState.powerups = gameState.powerups.filter(p => p.y < gameState.cameraY + canvas.height + 100);

            // Check game over (fall below screen)
            if (player.y > gameState.cameraY + canvas.height + 50) {
                playSound('fall');
                endGame();
            }
        }

        function render() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw background gradient based on height
            const heightRatio = Math.min(gameState.maxHeight / 3000, 1);
            const bgGradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            if (heightRatio < 0.3) {
                bgGradient.addColorStop(0, '#e8f5e9');
                bgGradient.addColorStop(1, '#c8e6c9');
            } else if (heightRatio < 0.6) {
                bgGradient.addColorStop(0, '#e3f2fd');
                bgGradient.addColorStop(1, '#bbdefb');
            } else {
                bgGradient.addColorStop(0, '#1a1a2e');
                bgGradient.addColorStop(1, '#16213e');
            }
            ctx.fillStyle = bgGradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw platforms
            gameState.platforms.forEach(plat => {
                if (plat.broken) return;
                const screenY = plat.y - gameState.cameraY;
                if (screenY < -20 || screenY > canvas.height + 20) return;

                ctx.fillStyle = PLATFORM_TYPES[plat.type].color;
                ctx.beginPath();
                ctx.roundRect(plat.x, screenY, plat.width, plat.height, 5);
                ctx.fill();

                // Draw spring
                if (plat.type === 'spring') {
                    ctx.fillStyle = '#fff';
                    ctx.beginPath();
                    ctx.arc(plat.x + plat.width/2, screenY - 5, 8, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.fillStyle = '#ff5722';
                    ctx.beginPath();
                    ctx.arc(plat.x + plat.width/2, screenY - 5, 5, 0, Math.PI * 2);
                    ctx.fill();
                }

                // Cracks for breaking platforms
                if (plat.type === 'breaking') {
                    ctx.strokeStyle = '#5d4037';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.moveTo(plat.x + 10, screenY + 5);
                    ctx.lineTo(plat.x + 25, screenY + 10);
                    ctx.moveTo(plat.x + 40, screenY + 3);
                    ctx.lineTo(plat.x + 50, screenY + 12);
                    ctx.stroke();
                }
            });

            // Draw coins
            gameState.coins.forEach(coin => {
                if (coin.collected) return;
                const screenY = coin.y - gameState.cameraY;
                if (screenY < -20 || screenY > canvas.height + 20) return;

                ctx.font = '24px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('🪙', coin.x, screenY + 8);
            });

            // Draw powerups
            gameState.powerups.forEach(pu => {
                if (pu.collected) return;
                const screenY = pu.y - gameState.cameraY;
                if (screenY < -20 || screenY > canvas.height + 20) return;

                ctx.font = '30px Arial';
                ctx.textAlign = 'center';
                ctx.fillText(pu.type === 'jetpack' ? '🚀' : '🌀', pu.x + 15, screenY + 10);
            });

            // Draw player
            const skin = getCurrentSkin();
            const playerScreenY = gameState.player.y - gameState.cameraY;

            // Jetpack flames
            if (gameState.activePowerup === 'jetpack') {
                ctx.font = '20px Arial';
                ctx.fillText('🔥', gameState.player.x + 20, playerScreenY + 50);
            }

            ctx.font = '40px Arial';
            ctx.textAlign = 'center';
            ctx.save();
            if (!gameState.facingRight) {
                ctx.translate(gameState.player.x + 20, 0);
                ctx.scale(-1, 1);
                ctx.fillText(skin.icon, 0, playerScreenY + 35);
            } else {
                ctx.fillText(skin.icon, gameState.player.x + 20, playerScreenY + 35);
            }
            ctx.restore();
        }

        function endGame() {
            gameState.gameOver = true;

            saveData.totalGames++;
            saveData.totalHeight += gameState.maxHeight;
            if (gameState.score > saveData.highScore) {
                saveData.highScore = gameState.score;
            }
            saveSaveData();
            checkAchievements();

            document.getElementById('finalScore').textContent = gameState.score;
            document.getElementById('finalHeight').textContent = gameState.maxHeight + 'm';
            document.getElementById('coinsEarned').textContent = gameState.coinsThisGame;
            document.getElementById('powerupIndicator').style.display = 'none';
            document.getElementById('gameOverScreen').classList.remove('hidden');
        }

        // Shop
        function showShop() {
            document.getElementById('shopCoins').textContent = saveData.coins;
            const grid = document.getElementById('skinGrid');
            grid.innerHTML = SKINS.map(skin => {
                const owned = saveData.ownedSkins.includes(skin.id);
                const equipped = saveData.equippedSkin === skin.id;
                return `
                    <div class="skin-item ${owned ? 'owned' : 'locked'} ${equipped ? 'equipped' : ''}"
                         onclick="buySkin('${skin.id}')">
                        <div class="skin-icon">${skin.icon}</div>
                        ${!owned ? `<div class="skin-cost">${skin.price} 🪙</div>` : ''}
                        ${equipped ? '<div style="color: #ffeb3b; font-size: 0.7rem;">Equipped</div>' : ''}
                    </div>
                `;
            }).join('');
            document.getElementById('shopScreen').classList.remove('hidden');
        }

        function hideShop() {
            document.getElementById('shopScreen').classList.add('hidden');
        }

        function buySkin(id) {
            const skin = SKINS.find(s => s.id === id);
            if (saveData.ownedSkins.includes(id)) {
                saveData.equippedSkin = id;
            } else if (saveData.coins >= skin.price) {
                saveData.coins -= skin.price;
                saveData.ownedSkins.push(id);
                saveData.equippedSkin = id;
                checkAchievements();
            }
            saveSaveData();
            updateUI();
            showShop();
        }

        // Sound toggle
        function toggleSound() {
            saveData.soundEnabled = !saveData.soundEnabled;
            document.getElementById('soundBtn').textContent = saveData.soundEnabled ? '🔊' : '🔇';
            saveSaveData();
        }

        function updateSoundButton() {
            document.getElementById('soundBtn').textContent = saveData.soundEnabled ? '🔊' : '🔇';
        }

        // Stats
        function showStats() {
            const statsGrid = document.getElementById('statsGrid');
            statsGrid.innerHTML = `
                <div class="stat-card"><div class="icon">🎮</div><div class="value">${saveData.totalGames}</div><div class="label">Games Played</div></div>
                <div class="stat-card"><div class="icon">🏆</div><div class="value">${saveData.highScore}m</div><div class="label">Best Height</div></div>
                <div class="stat-card"><div class="icon">📏</div><div class="value">${saveData.totalHeight}m</div><div class="label">Total Height</div></div>
                <div class="stat-card"><div class="icon">🪙</div><div class="value">${saveData.totalCoins}</div><div class="label">Total Coins</div></div>
                <div class="stat-card"><div class="icon">💰</div><div class="value">${saveData.coins}</div><div class="label">Current Coins</div></div>
                <div class="stat-card"><div class="icon">🎨</div><div class="value">${saveData.ownedSkins.length}/${SKINS.length}</div><div class="label">Skins Owned</div></div>
            `;

            const achievementsGrid = document.getElementById('achievementsGrid');
            achievementsGrid.innerHTML = ACHIEVEMENTS.map(a => {
                const unlocked = saveData.achievements.includes(a.id);
                return `
                    <div class="achievement-item ${unlocked ? 'unlocked' : ''}" title="${a.desc}">
                        <div class="icon">${unlocked ? a.icon : '🔒'}</div>
                        <div class="name">${a.name}</div>
                    </div>
                `;
            }).join('');

            document.getElementById('statsScreen').classList.remove('hidden');
        }

        function hideStats() {
            document.getElementById('statsScreen').classList.add('hidden');
        }

        // Codes
        function showCodes() {
            document.getElementById('codeInput').value = '';
            document.getElementById('codeMessage').textContent = '';
            document.getElementById('codeMessage').className = 'code-message';
            document.getElementById('codesScreen').classList.remove('hidden');
        }

        function hideCodes() {
            document.getElementById('codesScreen').classList.add('hidden');
        }

        function redeemCode() {
            const input = document.getElementById('codeInput');
            const messageEl = document.getElementById('codeMessage');
            const code = input.value.toLowerCase().trim();

            if (!code) {
                messageEl.textContent = 'Please enter a code!';
                messageEl.className = 'code-message error';
                return;
            }

            if (saveData.redeemedCodes.includes(code)) {
                messageEl.textContent = 'Code already redeemed!';
                messageEl.className = 'code-message error';
                return;
            }

            const codeData = CODES[code];
            if (!codeData) {
                messageEl.textContent = 'Invalid code!';
                messageEl.className = 'code-message error';
                return;
            }

            saveData.redeemedCodes.push(code);

            if (codeData.coins) {
                saveData.coins += codeData.coins;
                saveData.totalCoins += codeData.coins;
            }

            if (codeData.skin && !saveData.ownedSkins.includes(codeData.skin)) {
                saveData.ownedSkins.push(codeData.skin);
            }

            saveSaveData();
            updateUI();
            checkAchievements();
            playSound('coin');

            messageEl.textContent = codeData.message;
            messageEl.className = 'code-message';
            input.value = '';
        }

        // Achievements
        function showAchievementPopup(achievement) {
            const popup = document.createElement('div');
            popup.className = 'achievement-popup';
            popup.innerHTML = `<h3>🏆 Achievement Unlocked!</h3><p>${achievement.icon} ${achievement.name}</p>`;
            document.body.appendChild(popup);
            playSound('spring');
            setTimeout(() => popup.remove(), 3000);
        }

        function checkAchievements() {
            ACHIEVEMENTS.forEach(a => {
                if (!saveData.achievements.includes(a.id) && a.check(saveData)) {
                    saveData.achievements.push(a.id);
                    showAchievementPopup(a);
                    saveSaveData();
                }
            });
        }

        // Polyfill for roundRect
        if (!ctx.roundRect) {
            ctx.roundRect = function(x, y, w, h, r) {
                if (w < 2 * r) r = w / 2;
                if (h < 2 * r) r = h / 2;
                this.beginPath();
                this.moveTo(x + r, y);
                this.arcTo(x + w, y, x + w, y + h, r);
                this.arcTo(x + w, y + h, x, y + h, r);
                this.arcTo(x, y + h, x, y, r);
                this.arcTo(x, y, x + w, y, r);
                this.closePath();
            };
        }

        // Init
        loadSaveData();
        updateSoundButton();
        updateUI();
    </script>
</body>
</html>
